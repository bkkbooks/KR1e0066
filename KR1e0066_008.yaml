body:
  text: 春秋集傳卷八元趙汸撰宣公元年春王正月公即位穀梁傳曰繼故言即位與聞乎故也公子遂如齊逆女三月遂以夫人婦姜至自齊穀梁傳曰大夫不以夫人以夫人非正也刺不親迎也公羊傳曰遂何以不稱公子一事而再見者卒名也其稱婦有姑之辭也髙抑崇曰稱婦姜見敬嬴妾也而姑之也夏季孫行父如齊請㑹也晉放其大夫胥甲父于衞大夫非殺不言其大夫此放也則其大夫何諸侯無專放放與殺一體也曰放其大夫者譏其專也或稱國以放或稱人以放義與殺其大夫同也榖梁傳曰放猶屏也髙抑崇曰放者投之逺方也晉與衞同為列國而放其有罪之臣於衞是鄙衞也衞人受晉之逐臣而不辭迫於勢也公㑹齊侯于平州宣公簒立而請㑹于齊求列於諸侯免於討也公子遂如齊左氏傳曰拜成也六月齊人取濟西田左氏傳曰為立公故以賂齊也陳氏傳曰外取邑不書雖取諸我不書據傳襄二十六年齊取我髙魚必有歸之者也然後書是故濟西田書取讙闡書取秋邾子來朝齊故也楚子鄭人侵陳遂侵宋陳氏傳曰書遂侵宋言不在陳也南北之勢於是始也後十五年而宋楚平後五十年而晉趙武楚屈建同盟于宋諸夏之君分為晉楚之從矣南北之勢於是始故謹而書之也自是訖春秋師再有事無言遂者矣言遂者非與國伐盟主齊侯伐衞遂伐晉事在襄二十二年則盟主伐與國也晉士鞅侵鄭遂侵衞傳曰衞叛晉也事在定八年晉趙盾帥師救陳宋公陳侯衞侯曹伯㑹晉師于棐林伐鄭靈公之㑹諸侯不序大夫自參以上人之此趙盾之師也則其列數諸侯㑹之何嫌以中國絀於夷狄也自中國無伯而諸侯不序而楚君將稱君是春秋所以辨名實也然晉雖弗伯而中國之大義不以無伯而亡以楚得鄭侵陳遂侵宋稱君將矣而救陳人晉大夫㑹伐鄭不序諸侯是遂無中國也春秋正其義不謀其利明其道不計其功故當楚書君將則中國君大夫禦楚雖無功從其恒稱明晉雖不競而楚終不可以無討所以信大義於天下也公羊傳曰此趙盾之師也曷為不言趙盾之師君不㑹大夫之辭也冬晉趙穿帥師侵崇趙穿者盾之族也晉人宋人伐鄭二年春王二月壬子宋華元帥師及鄭公子歸生帥師戰于大棘宋師敗績獲宋華元鄭伐宋受命于楚也不見伐以及戰見之也大夫生死皆曰獲言獲言敗績師敗績而身又見獲也君獲不言師敗績重君也大夫獲言師敗績師重與大夫等也秦師伐晉以報崇也夏晉人宋人衞人陳人侵鄭此晉趙盾以諸侯之師曷為稱人以罪晉也鄭為楚伐宋獲其大夫晉之恥也盾興諸侯之師以伐鄭而畏楚輒還中國益以卑矣陳氏傳曰以晉為甚不競也楚方圖中國而晉以大夫用諸侯由是兵車之㑹自參以上皆人之而楚皆稱子矣秋九月乙丑晉趙盾弑其君夷臯榖梁傳曰穿弑也盾不弑而曰盾弑何也以罪盾也其以罪盾何也曰靈公朝諸大夫而暴彈之觀其辟丸也趙盾入諫不聽出亡至郊趙穿弑公而後反趙盾史狐書曰趙盾弑君盾曰天乎天乎予無罪孰為盾而忍弑其君者乎史狐曰子為正卿入諫不聽出亡不逺君弑反不討賊則志同志同則書重非子而誰故書之曰晉趙盾弑其君夷臯者過在下也胡侍講曰趙穿弑君而盾首惡是盾與聞乎故也薛士龍曰君將殺盾而穿弑君則主弑者盾也穿受命而行事者也吳先生曰穿盾之族子穿之弑為盾之弑也書曰趙盾弑其君誅首惡也冬十月乙亥天王崩三年春王正月郊牛之口傷改卜牛牛死乃不郊猶三望未牲曰牛牛傷改卜禮也改卜牛又死異也乃不郊重其變不敢瀆也言免牲不言不郊從可知也言牛死則言不郊牛死得再卜須言不郊義乃盡也此何以書記異且言猶三望也葬匡王楚子伐陸渾之戎夷狄相伐不書據文十六年戎伐楚哀四年楚克夷虎蠻氏之類皆不書此何以書近王都也陳氏傳曰窺周室也夏楚人侵鄭鄭即晉也晉侯伐鄭及郔鄭及晉平即何以不書以鄭之反覆乎晉楚之閒非得已也故書晉楚之侵伐則鄭向背可知而凡以侵伐取成者不悉書雖晉君自將亦不書以見春秋雖責備於鄭而察其情也然猶書侵伐者所以譏晉而罪楚也秋赤狄侵齊宋師圍曹冬十月丙戌鄭伯蘭卒葬鄭穆公四年春王正月公及齊侯平莒及郯莒人不肯公伐莒取向榖梁傳曰及者内為志焉爾平者成也不肯者可以肯也莒人辭不受治也伐莒義兵也取向非也乘義而為利也劉侍讀曰平莒及郯義也莒人不肯吾有不義焉伐莒强也取向利也非君子之道也小邾射以邑歸魯魯使大夫盟之辭曰使子路要我無所用盟千乘之國不信其盟而信子路之一言子路可謂能以言信矣推子路之心居郯莒之閒安有不聽者哉秦伯稻卒夏六月乙酉鄭公子歸生弑其君夷弑君者公子宋也則曷為蔽罪歸生歸生正卿也而與聞乎故則歸生固為逆首也然則公子宋無罪與以歸生受誅而宋獲免是春秋為法書之論也法者具獄以定刑故有出入之患春秋立教誅首惡以正人心人心正則君臣父子之分明而禍亂息矣故謂晉趙穿鄭宋為佚罪必欲成盾與歸生為首弑然後無累於春秋是法書之謂也赤狄侵齊秋公如齊公至自齊冬楚子伐鄭五年春公如齊夏公至自齊秋九月齊髙固來逆子叔姬榖梁傳曰諸侯之嫁子於大夫主大夫以與之來者内也陳氏傳曰公自主之也於是公如齊髙固使齊侯止公請叔姬焉則髙固伉也吳先生曰宣公負簒國之罪倚齊以自安數朝數聘猶以為未也甚至齊臣强委禽焉亦與之女而不敢違又且自為之主蓋其身為不義故能忍恥辱而屈於人下彼曹子臧吳季札果何人哉强與之國義不肯受故能不降其志不辱其身而常信於人上叔孫得臣卒不日公弗臨也冬齊髙固及子叔姬來左氏傳曰反馬也家鉉翁氏曰反馬不躬至歸寧無並行髙固卿也而與婦俱來非禮也楚人伐鄭楚將稱君矣此曷為稱人一役而再有事也楚比伐鄭不能服於是楚子再見故畧之也畧之則荀林父救鄭伐陳何以不書陳鄭一體也力不足以保陳而伐陳以救鄭非伯者救中國之道也故書侵陳舉重六年春晉趙盾衞孫免侵陳討貳也夏四月秋八月螽冬十月七年春衞侯使孫良夫來盟謀㑹晉也夏公㑹齊侯伐萊秋公至自伐萊大旱冬公㑹晉侯宋公衞侯鄭伯曹伯于黒壤晉靈之會盟皆不序黒壤而下何以復序諸侯成公初有志於諸侯也晉靈公再合諸侯于扈既失齊又失魯且失陳失鄭晉是以無能為成公立而自將以伐鄭鄭既服則有事於陳於是請王命以合諸侯于黑壤而王叔桓公以涖之庶乎文襄之餘烈矣故晉之盟㑹復序諸侯於是始雖然猶未書君將也八年春公至自㑹夏六月公子遂如齊至黄乃復此有疾而復也曷為不言有疾據昭公如晉有疾乃復義不可言也國君外如有疾而復君禮也人臣不以死生貳君命無以疾還之道也禮賔入竟有疾而死遂也若賔死未得將命則既歛于棺造于朝介將命朝聘而終以尸將命禮也黄齊竟也以疾還非禮也辛巳有事于大廟仲遂卒于垂有事謂禘也大廟曰大事羣公曰有事此大廟也則其言有事何雖大廟也為君事言曰大事為臣事言曰有事各以其故言之譏不在用禘故不言禘也遂公子也其曰仲何也録異恩也垂齊地也陳氏傳曰其不言公子仲遂據公子季友卒公子叔肸卒蒙上文也大夫卒竟内不地竟外地諸侯雖不出境地之壬午猶繹萬入去籥榖梁傳曰猶者可以己之辭繹者祭之旦日之享賔也公羊傳曰萬者何干舞也籥者何籥舞也其言萬入去籥何去其有聲者廢其無聲者知其不可而為之也何休氏曰禮大夫死為廢一時之祭有事于廟而聞之者去樂卒事卒事而聞之者廢繹戊子夫人嬴氏薨以夫人之禮喪妾母也晉師白狄伐秦楚人滅舒蓼羣舒皆東夷之國也據成十七舒庸襄二十五舒鴻秋七月甲子日有食之既冬十月己丑葬我小君敬嬴雨不克葬庚寅日中而克葬己丑葬之日也雨不克葬者禮君葬用四紼執紼五百人遣車七乘其物備其事嚴不可以冐雨而葬也庶人縣窆不封不樹不為雨止則大夫以上葬為雨止矣左氏傳曰雨不克葬禮也禮卜葬先逺日辟不懷也何休氏曰死葬之以禮故不得行禮則不葬也城平陽楚師伐陳九年春王正月公如齊公如不月苟如以四時首月則書其月非王事不敢廢時首也故如京師月公至自齊夏仲孫蔑如京師齊侯伐萊秋取根牟根牟微國也國而曰取不絶其祀也八月滕子卒九月晉侯宋公衞侯鄭伯曹伯㑹于扈晉荀林父帥師伐陳胡邦衡曰成公再合諸侯而以林父帥師大夫猶專伐也辛酉晉侯黑臀卒于扈髙抑崇曰不言卒于會者諸侯已散也冬十月癸酉衞侯鄭卒宋人圍滕楚子伐鄭晉郤缺帥師救鄭陳殺其大夫洩冶殺諌臣也十年春公如齊公至自齊齊人歸我濟西田歸田邑不言我其言歸我何公親受于齊也故不言來歸見公如齊而後反之也胡侍講曰魯宣自卑以事齊齊侯以其能事已而後歸之也夏四月丙辰日有食之己巳齊侯元卒齊崔氏出奔衞榖梁傳曰氏者舉族而出之之辭也公如齊五月公至自齊其月以奔諸侯之喪異之也據成十年公如晉月奔喪臣子之事也諸侯於天子親之者也而公不行於大國使人者也而公親之宣公之事齊恭矣而莫甚於奔其喪是故異之異之者譏之也其後則成公如晉奔晉侯之喪甚則襄公如楚且送其喪又甚則昭公弔少姜晉人不納魯道日以卑矣而其失自宣公始然宣公所以自屈於齊者由其本之不正也癸巳陳夏徴舒弑其君平國六月宋師伐滕春秋舉重前年宋人圍滕今又伐滕其悉書之何間晉之不競也滕小國也介於大國之閒上無天子下無方伯則為之私而已齊桓卒而宋人執其君晉伯衰而宋人圍其國中國之無伯小國之憂也然宋襄執滕子而身亦見執於楚宋文圍滕而國亦見圍於楚諸夏之無道荆楚之資也公孫歸父如齊葬齊惠公晉人宋人衛人曹人伐鄭時鄭及楚平而諸侯之師伐鄭取成而還則必非微者矣其稱人何當九年郤缺救鄭鄭伯敗楚師而子良憂之至是而及楚平豈得已也哉懼晉不足恃也於是伐鄭取成矣俄而楚子遂盟陳鄭于辰陵以晉大夫專伯討罪不能信義以屬諸侯又不能威楚徒紛爭耳故人之也秋天王使王季子來聘王季子先王之子也公羊傳曰天子之大夫也其稱王季子何據叔服不繫王不稱子王札子不稱季貴也其貴何母弟也何休氏曰子者王子也天子不言子弟據卒稱王子殺乃稱弟故上季繫先王以明之陳岳氏曰天王使卿大夫來聘多矣或爵之或字之未有使母弟下聘諸侯者斯母弟矣名之不可也爵之字之則何以别於卿大夫斯不名不爵不字者是貴王母弟之義也陳氏傳曰自頃王而下王室無聘魯者於是再聘而王貴子實來則已尊己公孫歸父帥師伐邾取繹間齊也大水季孫行父如齊聘嗣君也冬公孫歸父如齊伐邾故也齊侯使國佐來聘未踰年稱君以嘉好之事來録其從吉也饑劉侍讀曰凶年補敗不足曰饑死傷流亡曰大饑楚子伐鄭於是晉士㑹救鄭逐楚師于潁北以諸侯之師戍鄭不書晉終不競於楚不足書也十有一年春王正月夏楚子陳侯鄭伯盟于辰陵厥貉不書陳鄭以非其意也盟于辰陵楚猶未得志焉則曷為書之晉終失陳鄭也其不月何凡非夏盟恒不月也據僖二十年二十二年狄盟同不月公孫歸父㑹齊人伐莒秋晉侯㑹狄于欑函晉景紹盟主之業當憤楚伐鄭則救鄭而惟恐其從楚又甞憤鄭従楚則伐鄭必欲其棄楚雖未盡善亦似矣今乃㑹狄攢函此何禮也不能正一身而欲主盟以令諸侯難矣陳氏傳曰楚方倡義于天下而晉汲汲於羣狄至往㑹焉晉卑甚矣冬十月楚人殺陳夏徴舒弑逆之義天子不能討方伯不能誅而楚人能正之夫子雖欲貶而不得故變例書月則其先書殺後書入何據晉侯書入曹執曹伯修春秋之辭也入人之國者楚人之私也討賊者天下之公也不以楚人之私廢天下之公故先正其討賊也榖梁傳曰此入而後殺其不言入何也明楚之討有罪也陳氏傳曰不書入而後殺與之以討賊之義也是討賊一事也入一事也楚亟稱子矣自宋萬而下無討賊者雖討之不以其罪且百年於此則楚之討夏徴舒不曰楚子何春秋之法惟討賊不以内外貴賤恒稱人也公羊傳曰諸侯之義不得專討上無天子下無方伯天下諸侯有為無道者臣弑其君子弑其父力能討之則討之可也丁亥楚子入陳誅其罪義也取其國惡也入者不受百强之也謝氏曰書入罪其因人之亂而利之也納公孫寧儀行父于陳陳氏傳曰凡奔非其罪納之者罪也則但書納公孫寧儀行父與君淫者也則其不書奔何微二子則楚師不出徴舒不討靈公不葬微二子則楚師不出徴舒不討靈公不葬然則宜納者也則其書納何二子足以免於奔而已而納之者楚子之過也十有二年春葬陳靈公楚子圍鄭夏六月乙卯晉荀林父帥師及楚子戰于邲晉師敗績此救鄭而敗績于楚則曷為從其恒稱不絶晉之禦楚也晉率諸侯以扶大義者也當晉大夫自將以禦楚子雖無功猶不奪其恒稱楚終不可以無討也秋七月冬十有二月戊寅楚子滅蕭夷狄滅小國不月大國則日此附庸也其日何危及宋也楚既得陳與鄭即圖宋蕭宋之附庸也滅蕭所以逼宋也晉人宋人衞人曹人同盟于清丘此晉先縠宋華椒衞孔達也曷為稱人楚子圍鄭滅蕭矣而晉大夫區區强三國以同盟由是衞背晉救陳楚圍宋三時而晉師不出晉盟不足賴矣故晉主夏盟恒日畧不序諸侯不日此又不月以異之左氏傳曰於是卿不書不實其言也陳氏傳曰中國無伯也由救鄭之後㑹伐自參以上皆不書大夫㑹盟亦不書矣宋師伐陳衞人救陳十有三年春齊師伐莒夏楚子伐宋秋螽冬晉殺其大夫先縠十有四年春衞殺其大夫孔達為救陳故以説于晉也夏五月壬申曹伯壽卒晉侯伐鄭晉君將嘗不書矣楚入陳得陳圍鄭得鄭且將圍宋也而晉師不出楚之得志於諸侯未有甚於此時也景公為邲故伐鄭告於諸侯蒐焉而還則其書之何中國不可以終無伯也楚之得志於諸侯未有甚於斯時者而晉師不出則諸侯皆楚之從矣上無天子下無方伯諸侯皆楚之從而無伯者以斥之是無中國也景公始有志於文襄之業自伐齊而後一合諸侯伐鄭四同盟皆其君親之於是齊魯從而鄭服楚亦無能為是故晉侯伐鄭始書之予之以復伯也秋九月為下葬月也凡圍國著例不月楚子圍宋葬曹文公冬公孫歸父㑹齊侯于榖十有五年春公孫歸父㑹楚子于宋楚以兵加宋魯常迎而㑹之僖二十一年公㑹諸侯盟于薄二十七年公㑹諸侯盟于宋以宋絀則及魯也夏五月宋人及楚人平陳氏傳曰凡平不書必闗於天下之故也而後書有為楚平者矣於陳不書文九年於鄭不書宣十年至宋始書之宋及楚平矣僖二十四年宋及楚平至莊王始書之必宋從楚必莊王得宋天下將有南北之勢春秋特致意焉六月癸卯晉師滅赤狄潞氏以潞子嬰兒歸此荀林父也曷為稱師以晉人之釋楚而甘心於羣狄也荀舍其大而圖細則中國之威頓而伯業墮非經逺之畧也宋人距楚踰三時庶幾晉之能恤病也晉人以為天方授楚不可與爭顧間赤狄之衰而逞其志是故晉大夫將以禦楚雖無功悉書其人而荀林父滅潞氏不書隨㑹滅甲氏不書凡滅夷狄雖君將不書日此以其君歸故日秦人伐晉此秦桓公也曷為稱人晉秦之不交兵十有四年矣晉既敗績于楚又方有事于狄秦人不懲再世連兵之禍乃乘其隙而伐之以啓釁于晉焉故秦君自將稱人而晉敗秦師于輔氏不書畧晉而罪秦也王札子殺召伯毛伯陳氏傳曰兩下相殺雖王卿士不書據傳昭十二年劉獻公殺甘悼公十八年毛得殺毛伯過之類此何以書斥王之辭也於是王孫蘇與召氏毛氏爭政使王子殺召戴公及毛伯衞王孫家人也而爭政王子一日而殺二卿則譏不但其人也是故終春秋纔一再書之王札子殺召伯毛伯陳侯之弟招殺陳世子偃師皆斥君之辭也榖梁傳曰王札子者當上之辭也殺召伯毛伯不言其何也兩下相殺也兩下相殺不志乎春秋此其志何也矯命以殺之非忿怒相殺也故曰以王命殺也以王命殺則何志焉為天下主者天也繼天者君也君之所存者命也為人臣而侵其君之命而用之是不臣也為人君而失其命是不君也君不君臣不臣此天下所以傾也秋螽仲孫蔑㑹齊髙固于無婁初稅畝初稅畝者何井田之法十取其一今又履其私田之畝復十取其一故哀公曰二吾猶不足蓋十取其二始於宣公也榖梁傳曰初者始也古者十一藉而不稅初稅畝非正也古者三百步為里名曰井田井田者九百畝公田居一私田稼不善則非吏公田稼不善則非民初稅畝非公之去公田而履畝十取一也以公之取民為己悉矣古者公田為居井竈葱韭盡取焉公羊傳曰始履畝而稅也古者什一而藉什一者天下之中正也什一行而頌聲作矣冬蝝生蝝螽子也不月不成螽也不成螽何以書為一歲再生記異也饑十有六年春王正月晉人滅赤狄甲氏及留吁夏成周宣榭災災從公榖經文公羊傳曰成周東周也據成周乃王城下都之總名宣榭者何宣宫之榭也胡侍講曰以宗廟之重書之也據考古圖闕敦稱王格于宣榭秋郯伯姬來歸伯姬始歸于郯何以不書以其見出書來歸重其變故畧其常也冬大有年十有七年春王正月庚子許男錫我卒丁未蔡侯申卒夏葬許昭公葬蔡文公六月癸卯日有食之己未公㑹晉侯衞侯曹伯邾子同盟于斷道魯復事晉也陳氏傳曰同盟至新城而再見斷道而後不曰同盟者寡矣秋公至自㑹冬十有一月壬午公弟叔肸卒先君之子稱公子有謂稱弟肸公子也則其稱弟以卒何以公之喪其母弟舉其重者卒之也非大夫不卒此何以卒喪以大夫之禮也公以大夫之禮喪其弟則卒之記禮之變也蓋内女非夫人不卒卒紀叔姬外夫人非内女不卒卒齊王姬皆禮之變也記禮之變則曷為兼稱字録異恩也宣公以庶簒適於是喪其母弟恩視季友仲遂而得為世卿以比桓莊之族也十有八年春晉侯衞世子臧伐齊晉文公卒齊不復從晉盟魯侯伐莒皆以間晉也晉是以不競于楚而歴三君問不及齊齊東方大國也晉不得齊則諸侯不附景公為斷道之㑹始徴㑹于齊而齊侯不至於是自將以伐齊庶乎知所伐矣公伐把陳氏傳曰自是内不言君將征伐在大夫矣夏四月秋七月邾人戕鄫子于鄫戕弑也左氏傳曰凡自虐其君曰弑自外曰戕其不名鄫子卒不志於魯也例在僖十九年不日以别於在外而罹難者也據邾人執鄫子用之書日何休氏曰刺鄫無守備也范寗氏曰惡其臣子不能距難也甲戌楚子旅卒楚人始告喪而往弔也楚何以卒而不葬卒舉周爵而正其名則來赴以諸侯之禮也喪者以號配諡楚僭王號雖我有往不可言也公羊傳曰吳楚之君不書葬辟其號也公孫歸父如晉冬十月壬戌公薨于路寢歸父還自晉至笙遂奔齊大夫還不至其曰還自晉何為奔言故也奔不言出道亡也不日例見閔二其罪有闗乎一國之故與他大夫之出奔者異也魯自東門遂弑適立庶而大夫益專歸父知三桓之强而公室之弱也欲以晉去之謀於公而遂如晉其濟則仲氏一三桓也不濟則君受其名此亂臣之濟惡者也夫為國者不能以禮馭臣而欲援大國之力以鉏其强宗未有不亂且亡者故公子憖奔齊亦不日憖欲援晉以出季氏也春秋集傳卷八
