body:
  text: 春秋集傳卷五元趙汸撰僖公上元年春王正月榖梁傳曰繼弑君不言即位正也齊師宋師曹師次于聶北救邢曹師從二傳聶北邢地先言次而後言救何為次言故也夏六月邢遷于夷儀邢地自遷不書據文十三年邾遷于繹成六年晉遷于新田之類有遷之者而後書莊元年齊遷紀郱鄑郚十年宋遷宿閔二年齊遷陽非有遷之者而書則必有關於一國之存亡者也狄伐邢邢遷于夷儀狄圍衛衛遷于帝丘皆違難也許遷者四偪於鄭也蔡遷者一避楚仇也皆有關於存亡者也於是狄伐邢邢潰而後遷則其不言邢潰何略之也齊桓公存三亡國以屬諸侯義士猶曰薄徳則不待春秋而有議其非者矣上無天子下無方伯桓公存亡國以屬諸侯而以衛滅而後存衛邢潰而後存邢没其功諸侯誰復以捄患為已任者春秋不以功掩過亦不以過掩功書曰狄伐邢齊人救邢齊師宋師曹師次于聶北救邢邢遷于夷儀齊師宋師曹師城邢所以全伯者之功也狄伐邢邢潰斯一國之事守不以累桓公可也邢衛皆月以别於許之請遷于楚者齊師宋師曹師城邢䝉上事月也以楚丘著例決之其月何據凡城皆不月以伯者存亡國也春秋一役再有事者前目而後凡此向之師也則其再序三國何唯師以國序也本孔氏故文不可言言諸侯師秋七月戊辰夫人姜氏薨于夷齊人以歸榖梁傳曰夫人薨不地地故也公羊傳曰夷齊地也桓公召而縊殺之劉侍讀曰哀姜與乎亂殺二子幾亡國齊桓公討而誅之此伯者所以行乎諸侯之義也魯以臣子不得討而齊以伯主得舉法楚人伐鄭荆始改號曰楚自是有事於諸侯皆稱人其稱人何以楚僭王號時方中國有伯能聲其罪則其侵伐皆人之不使與中國君將稱君者同文所以謹予奪之辯也必中國無伯而後稱君大夫著其彊也雖著其彊然春秋書楚事無一不致其嚴也與待中國諸侯伯主君將稱君不同但其辭㫖精微學者有弗察爾八月公㑹齊侯宋公鄭伯曹伯邾人于檉檉音頳左氏傳曰謀救鄭也公㑹伯主恒不月此其書月何謀救鄭而不成救故月以異之凡盟主之㑹不月雖公若王卿士㑹之不月必有功而後月九月公敗邾師于偃不日略其事也冬十月壬午公子友帥師敗莒師于酈獲莒拏酈音離大夫敗日殊之於公也獲者生得也公羊傳曰莒拏者莒大夫也季子治内難以正禦外難以正其禦外難以正奈何公子慶父弑閔公走而之莒莒人逐之將由乎齊齊人不納郤反舍于汶水之上使公子奚斯入請季子曰公子不可以入入則殺矣奚斯不忍反命于慶父自南涘北面而哭慶父聞之曰此奚斯之聲也吾不得入矣於是抗輈經而死莒人聞之曰吾已得子之賊矣以求賂于魯魯人不與為是興師而伐魯莒無大夫莒拏何以書髙抑崇曰凡小國大夫不名接我則名之十有二月丁巳夫人氏之喪至自齊不稱姜䝉上文也一事而再見者䝉上文魯人諱殺哀姜春秋無文以見義故䝉上文不稱姜見此致夫人之喪即齊人以歸者也孔頴逹氏曰齊人治哀姜之罪取而殺之則位絶於魯矣僖公外欲固齊以居厚内存母子之義故請而葬之諱其殺也劉侍讀曰夫人與於亂桓公正其罪而討之則安可復配宗廟哉曰夫人姜氏薨于夷齊人以歸則上之行乎下也義已矣故臣子可縁伯主之命以尊宗廟伯主亦可縁天子之法以絶魯私請今齊以公義討之而魯以私意請之君子以為非義不可通於春秋二年春王正月城楚丘其月何據城不月以伯者存亡國也此衛邑也不繫之衛有伯主之令也凡伯主之令以内辭書之李堯俞曰號令主於天子則中國為一所以正伯者之事也故縁陵亦不繫杞然則孰城之内之微者也不言諸侯城之離至不可得而序也榖梁傳曰其不城衛何也衛未遷也夏五月辛巳葬我小君哀姜虞師晉師滅下陽虞曷為序大國之上三公封國先庶邦也此虢邑也何以不繫之虢古者王畿千里天子親制之寰内諸侯不與列國同也非國而言滅者重取天子之地故變其文也林少頴曰天子之地非諸侯所得取故云滅使若國然秋九月齊侯宋公江人黄人盟于貫左氏傳曰服江黄也張主一曰江黄近楚之國也惟宋與盟不煩諸侯也冬十月不雨一時不雨書時據莊公十一年踰時不雨書首月每時一書者告廟也穀梁傳曰不雨者勤雨也楚人侵鄭三年春王正月不雨夏四月不雨榖梁傳曰一時言不雨者閔雨也閔雨者有志乎民者也徐人取舒公羊傳曰其言取之何易也孫莘老曰取國不言滅不絶其祀也許翰氏曰舒楚與國徐人取之倚諸齊也六月雨榖梁傳曰雨云者喜雨也喜雨者有志乎民者也左氏傳曰自十月不雨至於五月不曰旱不為災也秋齊侯宋公江人黄人㑹于陽榖陽榖齊地左氏傳曰謀伐楚也冬公子友如齊涖盟不月略之也例在桓十四公羊傳曰涖盟者何往盟乎彼也楚人伐鄭四年春王正月公㑹齊侯宋公陳侯衛侯鄭伯許男曹伯侵蔡蔡潰遂伐楚公㑹伐恒不月此何以月以伐楚也據定四年侵楚同不月楚僭王肆暴天子不能治中國不能討也桓公糾合諸侯二十餘年乃克有事于楚累世不振之夙憤由是而伸故月以謹之陳氏傳曰春秋舉重凡師再有事不悉書苟悉書也則以遂言之兵事言遂必天下之大故自入春秋楚浸强矣而不見於經敗蔡師以蔡侯獻舞歸聖人懼焉而諸侯之交兵非以定簒弑則修怨而已矣問不及楚也桓公始有志夷夏之分於是伐楚而以侵蔡召諸侯書曰遂伐椘言志不在蔡也次于陘陘音刑楚地陳氏傳曰書次何用見桓之不戰而詘楚也夏許男新臣卒諸侯卒于外地在㑹曰㑹在師曰師此卒于師者其不言卒于師何併下文也春秋無費辭詳於下則略於上也楚屈完來盟于師盟于召陵召音邵楚無大夫其曰屈完何以其來盟録之也不言使據袁婁書齊侯使國佐來盟外之也春秋謹内外之辯桓公方有討於楚楚雖服猶不得與中國兵交使其在間者同文也來盟于師日據袁婁此何以不月猶未許其同於齊盟也據僖二十二年邢二十一年鹿上三十二年狄宣十一年辰陵公羊傳曰曷為再言盟喜服楚也楚荆蠻也而亟病中國肆其吞噬之毒中國不絶如綫桓公救中國而攘强楚使帖服以此為王者之事也陳氏傳曰桓公合九國之衆以討楚兵未有盛於此者也雖楚强足以一戰矣而臨楚不戰楚人為之詘使其大夫即盟于師桓公不欲臨楚盟屈完退而盟召陵不以阻隘不以君違臣不以軍容亂國容一動而三善得桓公不但以力服人矣齊人執陳轅濤塗公羊傳曰執者曷為或稱侯或稱人稱侯而執者伯討也稱人而執者非伯討也此執有罪何以不得為伯討古者周公東征則西國怨西征則東國怨桓公假塗于陳而伐楚則陳人不欲其反由已者師不正故也不修其師而執轅濤塗古人之討則不然也秋及江人黄人伐陳八月為下葬月也公至自伐楚致者曷為或致伐或致㑹據僖公㑹温書至自圍許成公㑹楚皆至救鄭伐鄭襄公㑹伐鄭定公㑹侵楚皆至自㑹榖梁傳曰有二事偶則以後事致後事小則以先事致其以伐楚致大伐楚也此從主人之辭也桓㑹不致㑹伐何以致桓㑹不致安之也合諸侯之師以伐叛討貳乃中國安危之機君子之所慎也故雖桓公致之葬許穆公小國葬不月於是許男卒于師葬之以侯故月也冬十有二月公孫茲帥師㑹齊人宋人衛人鄭人許人曹人侵陳大夫㑹伐不月雖王臣㑹之不月莊十四年單伯此何以月甚之也據文三年㑹晉伐沈同不月桓公帥諸侯以伐楚楚既成而陳人以辟軍見討既執其大夫以二國伐之又以七國之衆侵之桓為已甚矣故月以異之以桓公失方伯之道也桓公召諸侯以侵蔡伐楚楚既成事當在蔡桓公委蔡以餌楚而後責於陳其伯圖所及天下諸侯有以量之矣五年春晉侯殺其世子申生其曰晉侯殺之何傳曰殺世子母弟直稱君直稱君者非有司國人之所得與也禮公侯之罪不以犯有司刑于隱者不與國人慮兄弟也而况於世子母弟乎公羊傳曰殺世子母弟直稱君者甚之也髙抑崇曰世子至親非其君自殺之則孰敢殺者是故斥言晉侯殺世子母弟不書例在莊公二十二年此何以書殺無罪也諸侯之義不得專殺而殺世子母弟有不書者以君父討子弟而當其罪無以議為也於專殺之中又有甚焉莫甚於以讒殺其世子故書之舎晉獻公宋平公無殺世子者矣杞伯姬來朝其子榖梁傳曰諸侯相見曰朝伯姬為志乎朝其子也伯姬為志乎朝其子則是杞伯失夫之道矣諸侯相見曰朝以待人父之道待人子非正也故曰杞伯姬來朝其子參譏也髙抑崇曰先王之制諸侯未冠而即位謂之童子侯童子侯不朝不可以成人之禮接也伯姬歸杞方十三年其子如之何而勝朝之乎夏公孫兹如牟牟小國公孫兹曷如牟為娶也娶則曷為不言娶大夫自逆不得書也大夫以事行者言其事事不得書但言如重國史也大夫非君命不越竟請於君以行則書之重君命也公子友如陳葬原仲公子結媵陳人之婦于鄄大夫皆得越竟以行其私而君命褻矣公及齊侯宋公陳侯衛侯鄭伯許男曹伯㑹王世子于首止衛地曰及以㑹何桓不主㑹也據襄十年諸侯㑹吳先書㑹晉侯桓曷為不主是㑹桓公帥諸侯以㑹王世子而不自為㑹也不自為㑹者尊歸於一也尊歸於一禮之常也程子曰王世子王之二也不與諸侯列世子出而諸侯㑹之故其辭異何休氏曰不可以諸侯㑹王世子為文故殊之使若諸侯為世子所㑹也陳氏傳曰定世子也於是子帶有寵於惠后世子危不得立桓公率天下諸侯以㑹之世子危不得立而為㑹以定之禮之變也蘇子由曰首止之㑹非王志也率諸侯以定世子為義也然而諸侯不以王命而㑹世子世子不以父命而㑹諸侯衰世之事也秋八月諸侯盟于首止公羊傳曰諸侯何以不序一事而再見者前目而後凡也榖梁傳曰無中事而復舉諸侯據祝柯重丘間有異事則復舉諸侯馬陵柯陵于戲亳城北平丘無中事不舉諸侯何也尊王世子不敢與盟也尊則其不敢與盟何也盟者不相信也故謹信之不敢以所不信而加之尊者陳氏傳曰㑹而後盟間有異事書諸侯盟于某非間有異事也亦書諸侯盟于某則有不盟者也此其言諸侯則王世子不與盟也是故㑹有周人盟無周人書㑹于某某日諸侯盟則齊桓之孫也㑹有周人盟有周人書㑹于某但曰某日盟則晉厲之伉也事在成十七年柯陵鄭伯逃歸不盟陳氏傳曰國君而曰逃賤之也以其背夏盟也胡侍講曰逃者匹夫之事也其書逃歸不盟深貶之也或曰首止之㑹非王志也王使周公召鄭伯曰吾撫女以從楚可以少安鄭伯喜於王命故逃歸不盟則何罪乎曰春秋道名分夫義者權名分之中而當其可之謂也諸侯㑹王世子雖衰世之事而春秋與之者是變之中也鄭伯雖承王命而制命非義春秋逃之者亦變之中也天下之大倫有常有變舜之於父子湯武之於君臣周公之於兄弟皆處其變者也賢者守其常聖人盡其變㑹首止逃鄭伯處父子君臣之變而不失其中也髙抑崇曰齊之服楚圖之非一日也纔踰年惠王已導鄭伯叛之故中國之不競非獨諸侯之罪王室亦有以啟之也楚人滅弦弦子奔黄陳氏傳曰楚常有大夫屈完此穀於菟也則其稱人何楚大夫將恒稱人也左氏傳曰於是江黄道柏方睦於齊皆弦姻也弦子恃之而不事楚又不設備故亡九月戊申朔日有食之冬晉人執虞公春秋凡滅無不書虞已滅矣曷為不言滅諱滅也曷為於此焉諱之春秋諸侯有相滅者矣未有滅天子寰内之國者於是晉人滅虢又滅虞惡其滅寰内諸侯以偪天子故為王室諱之也此以歸之據襄十六年晉人執莒子邾子以歸昭十三年晉人執季孫意如以歸其但言執之何諱不言滅則言執不言以歸也春秋筆削不足以盡義而後有變文故滅虢不書書滅下陽不言取滅虞不書書執虞公不言以歸以不書為王室諱則變文以明晉罪也虞公何以不名上公故不名也林少頴曰聖人不忍周衰諸侯再取其地故不斥言滅而但云晉人執虞公見晉人執天子三公不道之甚也六年春王正月夏公㑹齊侯宋公陳侯衛侯曹伯伐鄭圍新城鄭邑伐國不書圍邑此其書圍邑何以桓公伐鄭討其叛夏盟而僅圍其邑也桓公盟諸侯于首止而鄭伯逃歸不盟以從楚楚人得以窺中國矣於是滅弦不能問伐鄭僅圍其邑志在詘鄭而憚遇楚師故圍邑不書於桓公特書之以桓之帖荆為僅耳秋楚人圍許陳氏傳曰此楚子也其稱人何楚君將恒稱人也諸侯遂救許楚人圍許攻其所必救以解新城之圍也諸侯救許而楚還楚固畏齊之强也冬公至自伐鄭七年春齊人伐鄭夏小邾子來朝杜元凱曰郳犂來也邾之别封故曰小邾始得王命而來朝也何休氏曰齊桓公請天子進之於是以爵通也鄭殺其大夫申侯左氏傳曰鄭殺申侯以説于齊也秋七月公㑹齊侯宋公陳世子款鄭世子華盟于寗母曹伯班卒公子友如齊冬葬曹昭公八年春王正月公㑹王人齊侯宋公衛侯許男曹伯陳世子款盟于洮公羊傳曰王人微者也曷為序乎諸侯之上先王命也何休氏曰王人衘王命㑹諸侯諸侯當北面受之故尊序於上左氏傳曰盟于洮謀王室也杜元凱曰王人法不與諸侯盟此王室有難使之出盟也榖梁傳曰兵車之㑹也鄭伯乞盟鄭伯不言如㑹據陳袁僑先言如㑹則其曰乞盟何以桓公辭之㑹而後乞之也秋狄伐晉秋七月禘于大廟用致夫人此哀姜也曷為不言姜氏以前書喪至書葬哀姜閒無他夫人得略言之也致者致其主於廟也哀姜之喪八年矣於是始致之何也哀姜淫而與弑不可以列昭穆秩烝嘗故雖備禮以葬而不殯於廟不祔於姑也僖公謹於事齊故歴三禘卒致之左氏傳曰禘而致哀姜焉非禮也凡夫人不薨于寢不殯于廟不赴于同不祔于姑則弗致也孔頴逹氏曰僖二年除閔喪為禘五年復禘今八年又禘三年一禘常事不書禘而致夫人異於常禮故書之陳氏傳曰魯禘非禮也雖用之羣公之廟不書據傳禘于襄公禘于僖公之類有用之羣公之廟者矣但曰有事譏不在用禘也事在昭十五年必禘于太廟致哀姜也而後書譏在用禘也凡禘恒日用禘以致不當祔之夫人故不日以異之冬十有二月丁未天王崩九年春王三月丁丑宋公御説卒夏公㑹宰周公齊侯宋子衛侯鄭伯許男曹伯于葵丘宰官也周采地范氏曰天官冢宰兼為三公者杜元凱曰天子三公不字胡侍講曰以冢宰兼三公其職任重矣而不殊㑹之何也人臣則有進退之節出入均勞之義非世子貴有常尊之可比矣陳氏傳曰桓之㑹有天子之事三於洮王人同盟焉於是葵丘宰周公不敢同盟焉盟于首止不但不同盟也而率諸侯以㑹世子桓知節矣榖梁傳曰宋其稱子何也未葬之辭也禮柩在堂上孤無外事今背殯而出㑹以宋子為無哀矣秋七月乙酉伯姬卒公羊傳曰未適人何以卒婦人許嫁字而笄之死則以成人之喪治之孔頴逹氏曰禮姊妹在室期出嫁大功未嫁其夫不為服則兄弟不為降諸侯絶旁期此將嫁於諸侯當服其本服為之齊衰期故書其卒也九月戊辰諸侯盟于葵丘齊地桓盟不日此何以日以桓公之事莫盛於葵丘也桓公有事諸侯二十餘年矣其盟㑹之故非以求諸侯則以謀王室也至葵丘而中夏小康王室安之諸侯信之其規模方略於是甫定則莫盛於斯矣故桓盟不日而特日以别之以不日為恒則日以見義也榖梁傳曰此何以日美之也為見天子之禁故備之也葵丘之盟陳牲而不殺讀書加於牲上壹明天子之禁孟子曰五伯桓公為盛葵丘之㑹諸侯束牲載書而不歃血初命曰誅不孝無易樹子無以妾為妻再命曰尊賢育材以彰有徳三命曰敬老慈幼無忘賔旅四命曰士無世官官事無攝取士必得無專殺大夫五命曰無曲防無遏糴無有封而不告陸淳氏曰盟稱諸侯明宰周公之不與也甲子晉侯佹諸卒佹音詭甲子前戊辰五日則曷為繫於後赴在後也雖後之猶日見春秋日法之嚴也冬晉里克殺其君之子奚齊曰其君之子何修春秋之特筆也其不月以庶孽見弑也榖梁傳曰其君之子云者國人不子也不正其殺世子申生而立之也陳氏傳曰遇弑雖未踰年稱君據齊舍此其稱君之子何獻公殺申生絀重耳夷吾而立其嬖子晉之亂獻公為之也故奚齊不稱君而稱君之子十年春王正月公如齊公始朝桓也朝桓何以不致據魯君如齊晉常書至朝與㑹一體也孫明復曰朝桓安之與他國異也周之制朝聘也有數春秋必小國而後朝於大國以莊公如齊必假觀社納幣而後行則諸侯不相朝久矣鄭伯男也齊人嘗以不朝執其大夫㑹于首止猶懼其不朝于齊而逃盟則桓公始伯舎小國未有朝齊者盟于寗母諸侯官受方物明年而公子友如齊盟于葵丘壹明天子之禁明年而公如齊蓋桓公制朝聘之數於是始春秋於㑹既不致以與桓矣以諸侯朝伯主若桓公幾可無愧是故亦不致以别之致以為恒則不致以見義也狄滅温温子奔衛温天子寰内之國也滅寰内國不書據滅虞滅虢為王室諱也此何以書王化所不及不可以君臣之禮治則不必為王室諱也是故王師敗績不書敗績于茅戎則書之皆春秋之所不治者也杜諤氏曰温者天子之近國而狄滅之諸侯不能救所以病齊桓者也晉里克弑其君卓及其大夫荀息奚齊卓子皆獻公之嬖子也而奚齊有先君之命矣奚齊不書弑則卓子曷為稱君正里克之罪也奚齊卓子之為君一也董子曰為人君父而不知春秋之義者必䝉首惡之名為人臣子而不知春秋之義者必陷簒弑之罪簒弑之罪易見而首惡之名難知也春秋微顯而闡幽於申生曰晉侯殺其世子於奚齊曰晉里克殺其君之子嚴適庶之分以昭獻公首惡之名也於卓子曰晉里克弑其君正君臣之名以討里克弑逆之罪也然於奚齊曰弑其君之子則亦異乎兩下相殺之獄矣明非里克之所讎也是故重耳拒國人之逆而謝秦伯以辭懼䝉里克之惡以其國家與人為市也故曰奚齊卓子之為君一也春秋譏首惡以正其本澄其源則簒弑之罪將一誅而已不月與奚齊同夏齊侯許男伐北戎晉殺其大夫里克榖梁傳曰稱國以殺罪累上也里克弑二君與一大夫其以累上之辭言之何也其殺之不以其罪也世子謂里克曰吾寜自殺以安吾君以重耳為寄矣里克所為弑者為重耳也夷吾曰是又將弑我乎故殺之不以其罪也公羊傳曰里克弑二君則曷為不以討賊之辭言之惠公之大夫也然則孰立惠公里克也里克弑奚齊卓子逆惠而入惠公曰爾既殺夫二孺子矣又將圖寡人為爾君者不亦病乎於是殺之陳氏傳曰討賊不言大夫其言晉殺其大夫里克何克猶在位也克猶在位則是殺大夫耳在位獨里克乎督相宋莊公翬相魯桓前乎此矣於是里克殺以他故而後見焉耳自宋而下弑君無討者凡賊再見猶夫人也雖若晉里克衛寗喜殺以他故而後見書曰大夫則猶夫人而已矣秋七月冬大雨雪十有一年春晉殺其大夫㔻鄭父㔻鄭父里克之黨也夏公及夫人姜氏㑹齊侯于陽榖姜氏者公為公子日所取齊侯女也薛士龍曰夫人齊侯女也歸寜可也為㑹而從夫于外非禮也髙抑崇曰以兩君為㑹而婦女厠於其間非禮也秋八月大雩其月何過時之甚者也例在桓五年冬楚人伐黄十有二年春王三月庚午日有食之夏楚人滅黄言滅不言其君死於位也榖梁傳曰貫之盟管仲曰江黄逺齊而近楚楚為利之國也若伐而不能救則無以宗諸侯矣桓公不聽遂與之盟管仲死楚伐江滅黄桓公不能救故君子閔之也陳氏傳曰滅不言伐據滅弦滅温此書伐病桓公也以陽榖之㑹貫之盟徒以亡其國耳秋七月冬十有二月丁丑陳侯杵臼卒十有三年春狄侵衛夏四月葬陳宣公公㑹齊侯宋公陳侯衛侯鄭伯許男曹伯于鹹榖梁傳曰兵車之㑹也秋九月大雩冬公子友如齊十有四年春諸侯城縁陵杞邑諸侯不序必一事而再見者也此非向之諸侯也則其曰諸侯城之何不言諸侯則無以見其為一事也城邢城楚丘城縁陵是齊桓公所以存三亡國也城邢之師齊與二國城楚丘者魯人以伯令赴功而已於是王室有戎難淮夷且病杞桓公為合七國之君以謀之然後致戍于周明年乃城縁陵而遷杞焉諸侯之懈桓徳之衰也故君目臣凡以見之曰諸侯者總衆國之辭也凡城築必伯者存亡國而後月據元年邢二年楚丘於是亦不月以略之然則戍周曷為不書不足書也春秋凡戍皆不書夫齊帥諸侯以獎王室安中國者也狄滅温不能救楊拒泉皐伊雒之戎犯京師不能斥而相與致戍于周方伯之所以蕃王室者如斯而已乎故雖戍周不書不足書也夏六月季姬及鄫子遇于防使鄫子來朝鄫季姬也其但言季姬何以其來寜自内言之也曷為不言其來内女來寜恒不書略常以明變也其月據凡魯君㑹猶不月異其事也陳氏傳曰朝未有言使者則其曰季姬使鄫子何急魯而賤鄫子也於是季姬來寜公以鄫子之不朝也怒止之遂遇于防使朝焉魯為已汰鄫為已卑矣於婦人乎何譏惡魯而賤鄫子也秋八月辛卯沙鹿崩公羊傳曰沙鹿者河上之邑也其言崩何襲邑也此何以書為天下記異也何休氏曰襲陷入于地中故言崩記天下異故不繫國榖梁傳曰其日重其變者也狄侵鄭冬蔡侯肸卒十有五年春王正月公如齊楚人伐徐三月公㑹齊侯宋公陳侯衛侯鄭伯許男曹伯盟于牡丘遂次于匡公孫敖帥師及諸侯之大夫救徐榖梁傳曰次有畏也陳氏傳曰救不言次言次無志於救也楚伐徐桓公合七國之衆以救之而使大夫將有諸侯在而使大夫將於是始桓公為之也則桓志荒矣故言次譏之也夏五月日有食之秋七月齊師曹師伐厲厲者屬楚之微國也伐國不月微國何以月以齊之不競於楚徐近齊者也楚滅弦桓公不能問滅黄不能救於是伐徐則亦已迫矣桓公合七國之君盟于牡丘而不自將使大夫救徐不力而分兵以伐其與國之微者齊為不競矣齊率諸侯攘夷狄以安中國也而卒不競於楚故不月以異之以力假仁者則有時而窮也夫以力假仁者固有能致其力者矣晉文公十九年於外其臣若舅犯先軫欒枝又皆明於中國之大義不避危難以成其君者是以城濮之烈數世頼之齊桓公宴安内嬖而國髙以私勞在位自召陵而後常有畏難苟安之志焉夫豈惟其心有勤怠哉以力假仁而力又不足以勝之則固有時而窮也明年夏伐厲不克救徐而還不書不足也八月螽九月為下女歸月也據凡㑹而至著例不月而女歸例皆月公至自㑹范寗氏曰桓㑹不致安之也齊桓徳衰故危而致之髙抑崇曰以㑹致見救徐之無功也季姬歸于鄫陳氏傳曰内女嫁恒書歸不書歸必有故也季姬來寜公怒而止之故不書歸至是而後言歸也已卯晦震夷伯之廟公羊傳曰記異也冬宋人伐曹宋始貳於齊也陳氏傳曰諸夏之相加兵自莊之十九年未之有也於是再見宋襄公為之也楚人敗徐于婁林齊地敗必言師不言師者外也此其外徐何以其始叛周僭大號也春秋凡于呉楚交相敗不書據傳襄十三年楚人敗吳師十四年吳敗楚之類必敗中國而後書徐戎也何以書病齊也齊帥天下諸侯以攘荆楚存中國也楚伐徐桓公合七國之衆盟于牡丘次于匡以救徐為之伐厲而徐卒敗於楚以是為盟主病矣十有一月壬戌晉侯及秦伯戰于韓獲晉侯於是秦伯伐晉則其但言戰何外言戰不言伐據僖十二年宋公及楚人戰于泓又晉侯及秦戰于彭衙必義繫於伐也而後兼言之公羊傳曰何以不言師敗績君獲不言師敗績也劉侍講曰君將不言帥師君重於師也君傷不言師敗績君敗不言師敗績亦君重於師也陳氏傳曰其不曰以歸何言獲則以歸不足言也十有六年春王正月戊申朔隕石于宋五是月六鷁退飛過宋都公羊傳曰五石六鷁何以書記異也榖梁傳曰是月決不日而月也三月壬申公子季友卒大夫卒名則其兼字之何也褒恤之數異也季友僖之叔父也而有功於僖仲遂宣之叔父也而有功於宣其喪之有加禮焉故卒皆字之叔肸非有功而以母弟之親宣公喪之視季友襄仲故三臣者皆世為卿也夏四月丙申鄫季姬卒秋七月甲子公孫兹卒冬十有二月公㑹齊侯宋公陳侯衛侯鄭伯許男邢侯曹伯于淮榖梁傳曰兵車之㑹也公㑹伯主不月此何以月㑹而無功也於是謀鄫東略弗果城鄫而還故月以異之例在元年于檉下十有七年春齊人徐人伐英氏英氏者屬楚微國也不月據伐厲月有徐人也夏滅項孰滅之我滅之也我滅之則何以不言師據傳例用大師曰滅為僖公諱也齊桓公率天下諸侯伐强暴以安中國且有存亡繼絶之功於魯於是㑹淮無功而魯又滅項以間之故略不言師使若不出公命而微者在國為之然為僖公諱也為之諱者乃所以責之也不月據滅國不月異其事也中國有伯而諸侯相滅故不月以異之據襄六年莒人滅鄫同譏在齊也桓公得諸侯莫先於宋其次莫親於魯其卒貳於齊也亦莫先於宋魯夫桓公率諸侯以伐强暴安中國而尊天子諸侯實有頼焉則曰以譏齊何也桓公無尊周救患之誠也桓公以尊王為名以帖荆為績而朝覲歸于已獄訟歸于已禮樂征伐自我而出其所以從諸侯於盟㑹者皆以自為而已楚人滅弦桓公不能問滅黄不能救於是楚復張而宋貳魯亦滅項以間之以桓公無尊周救患之誠也使桓公誠不私其國以自為而合諸侯以事天子朝覲歸于天子獄訟歸于天子禮樂征伐必自天子出而躬率方伯之職以討其不庭則雖以復文武周公之竟土可也天下諸侯其孰非天子之臣而敢有二心也然而桓公計不出於此則雖微宋魯諸侯孰不欲閒桓公之怠以求利其國哉春秋是以譏在齊也凡諸侯相滅以不日為略據齊滅譚滅遂日為詳據衛侯燬邢晉㑹諸侯于相滅偪陽則不月為異也晉文之興大抵率桓之為而莫能尚焉卒皆無以善其後故夫有可以興周之勢而不為以求利其國而遂失之者桓文是也秋夫人姜氏㑹齊侯于卞九月公至自㑹其致何㑹而無功也以不致為恒則致為異也致公者不月據公至恒不月此何以月以公之見止于齊也齊人以滅項為討而止公聲姜㑹齊侯于卞乃釋公故月其致以異之也異之者譏之也凡月致皆譏也冬十有二月乙亥齊侯小白卒十有八年春王正月宋公曹伯衛人邾人伐齊齊桓公卒宋公以諸侯伐齊納公子昭則曷為不書納譏不在所納也外納不書據秦納晉夷吾重耳不書必不克納而書據納晉納邾㨗菑齊納北燕伯晉納衛世子蒯聵譏在納之也桓公嘗屬公子昭於宋襄公以爲太子昭之入則有辭矣故不書其納也外宜納雖伐不書據秦納重耳伐晉不書譏不在所納則書伐齊何也國人以後命立無虧也桓公内嬖如夫人者六人無虧長衛姬之子也桓公既屬公子昭於宋而又許立無虧既而五公子皆求立桓公不能定桓公卒國人以無虧為長縁後命而立之則齊有君矣於是宋公以諸侯伐齊齊人殺無虧故書伐齊譏在伐也外伐國不月於是月以異之異之者譏之也是故孝公出入皆不書而無虧不得比齊舍歸惡於桓公也夏師救齊救四公子之徒也五月戊寅宋師及齊師戰于甗齊師敗績此宋公也其稱師何一役而再有事者略言之也戰者以主及客據莊二十八年齊師伐衛衛及齊戰之類伐者為客受伐者為主皆以主及客此其以宋及齊何伐一事也戰一事也宋公伐齊納公子昭殺無虧是一事也既殺長立少則四公子皆君也故四公子之徒復與宋戰然後宋敗齊師于甗卒立孝公又是一事也孝公卒公子潘殺其子而立潘卒公子商人弑舎而立齊人又弑商人而立子元元潘商人皆與宋公戰于甗者也潘不順昭商人不順乎潘而元又不順乎商人自古兄弟争國篡奪之禍未有若斯甚者也盖其本自桓公失之矣而襄公徒欲以力定之其可乎故變其主客恒辭反以宋及齊戰使宋公若受伐者然名雖一役而實兩事則不順孝公者不惟一無虧而齊桓宋襄之失皆可見矣狄救齊救不悉書狄救齊何以書以宋公伐人之喪以納不正而後夷狄得竊救患之名以干中國也秋八月丁亥葬齊桓公冬邢人狄人伐衛春秋集傳卷五
