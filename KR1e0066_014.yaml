body:
  text: 春秋集傳卷十四元趙汸撰定公元年春元年何以不書正月無君也嗣君踰年雖以故不行即位禮猶必朝廟告朔以明授受故史書其正月以謹始也昭公薨於外季孫以太子衍及務人為不利於己將廢之而嗣君之位不以時定魯於是曠年無君也無君故史不得書其正月而王下屬於繫事之月如他年此䇿書之大體無待於筆削而義已明者也蘇子由曰魯之先君雖或在外不以其道終而未嘗有踰年而後至者則是二百四十二年未嘗一日而無君也而定公之元年魯之統絶者自正月至於六月而後續也王三月晉人執宋仲幾于京師正月晉人執宋仲幾以歸三月歸于京師則其曰晉人執宋仲幾于京師何修春秋之特筆也晉人合十國大夫城成周可謂有功於王室矣然尋盟狄泉魏舒干位以涖政是僭王官也執宋仲幾不請於天子而以歸是京師晉也故既削狄泉之盟黜魏舒不序而沒晉人執宋大夫以歸之文特書曰晉人執宋仲幾于京師上以尊王室下以全諸侯城成周之功而宋大夫不受功晉人專執其罪皆不可掩矣故凡外大夫見執恆不月於是特月以異之胡侍講曰此歸于京師矣其不言歸之何執之以歸知其非而後歸于京師不足言也夏六月癸亥公之喪至自乾侯公薨於外七月矣至是始以喪至何也季孫疑於所立將求利己者而與之國蓋久而後定始遣叔孫不敢逆公喪以歸也戊辰公即位癸亥公之喪至自乾侯何為戊辰而定公始即位穀梁傳曰殯然後即位也范寧氏曰諸侯五月而殯今以君始死之禮治之故六月而後即位也凡公即位在正月者恆不日夫子削之也據日食必在朔猶言日則即位史無不書日者此其日之何異之也季氏出其君薨又絶其冢嗣定公得國於季孫而不知為之變故日以異之蓋不日以為恆則日以為變也穀梁傳曰此其日何屬也劉侍讀曰季孫廢太子衍及務人而立公子宋喪至壞隤公子宋先入蓋受之季氏非受之先君也秋七月癸巳葬我君昭公九月大雩立煬宫左氏傳曰昭公出季平子禱於煬宫九月立煬宫公羊傳曰非禮也胡侍講曰煬公伯禽之子喪事即逺有進而無退宫廟即逺有毁而無立汪仲裕曰煬公至昭公已二十世萬孝恭氏曰煬公考公之弟也魯以弟繼兄蓋始乎此定公乃昭公之弟季孫舍昭公之嫡嗣而立定公恐人議已於是立煬宫其意若曰魯一生一及乃國之舊制非吾之私意也冬十月隕霜殺菽杜元凱曰周十月今八月隕霜殺菽非常之災穀梁傳曰未可以殺而殺舉重可殺而不殺舉輕其曰菽舉重也李堯俞曰菽之為物易長而難殺也二年春王正月夏五月壬辰雉門及兩觀災雉門兩觀僭天子也天子五門臯庫雉應路魯僭其三庫雉路也何休氏曰天子諸侯臺門天子外闕兩觀諸侯外闕一觀杜元凱曰雉門公宫之南門兩觀闕也秋楚人伐吳楚書大夫將久矣此囊瓦也以其未嘗為中國冦患故其事蠻夷但書人冬十月新作雉門及兩觀凡新及新作皆不月據新延廄新作南門此以其僭王制特月以異之胡侍講曰譏僭王制而不能革也何休氏曰天災之當減損如諸侯制而復僭天子之禮故言新作三年春王正月公如晉至河乃復於是定公即位三年而朝晉晉人亦卻之以公為季氏所立不能為有無也二月辛卯邾子穿卒夏四月秋葬邾莊公冬仲孫何忌及邾子盟于拔不月略之也例在成元年薛士龍曰魯大夫而盟諸侯邾喪未期而為盟㑹交失之四年春王二月癸巳陳侯吳卒三月公㑹劉子晉侯宋公蔡侯衛侯陳子鄭伯許男曹伯莒子邾子頓子胡子滕子薛伯把伯小邾子齊國夏于召陵侵楚凡公㑹侵伐恆不月此以㑹王臣而攘夷狄故月以謹之據僖四年遂伐楚同書月胡侍講曰蔡侯患楚請師於晉晉人請命於周大合諸侯天子之老在焉乃以求貨失諸侯無功而還書曰侵楚陋矣吕大圭氏曰召陵之㑹晉可以復伯而失其機也夫蔡陳鄭許頓胡蓋服役於楚者也而皆與於㑹則病楚而歸晉也晉自平丘以來不能㑹諸侯二十四年矣今上致劉子下合十七國之君於召陵齊桓之師不如是之盛也而曰侵楚是不足與有為也晉自是不復宗諸侯矣陳氏傳曰傳言劉文公合諸侯於召陵謀伐楚也晉之合諸侯至平丘而止則是役劉子為之也劉氏定內難復辟於周而楚納子朝於是合十有八國之師伐楚雖桓文未有盛於此者也以周之不競而能合諸侯盛於桓文俄而劉子卒君子蓋深悲之也夏四月庚辰蔡公孫姓帥師滅沈以沈子嘉歸殺之許頓胡沈皆從楚之小國也三國皆從蔡歸晉而沈獨不㑹召陵畏楚故也晉人既不能絀楚以信蔡乃遷怒於小國使蔡人甘心焉夫以齊桓之伯而不能使楚毋滅江黃宜沈之不敢㑹中國也其後楚卒滅頓滅胡則小國之從於侵楚者晉亦不能全之也從我者不能全之不從者吾乃滅之是召陵之㑹諸侯徒以亡三小國而已諸侯何賴焉凡滅國不月此以其君歸故日以甚之五月公及諸侯盟于臯鼬葵丘但言諸侯盟平丘但言同盟此何以稱公及是㑹劉子之志晉不復主盟而劉子又不與盟故也凡盟皆日其不日亦有别於有伯之盟也陳氏傳曰有晉侯在何以書公及諸侯盟非晉主盟也公㑹諸侯盟于薄公㑹諸侯盟于宋皆後至之文也非後至也而曰公及諸侯盟則以魯主之也是故書及劉卷卒諸侯無㑹同於是諸侯有特相盟者矣把伯成卒于㑹六月葬陳惠公髙抑崇曰見陳侯背殯出㑹也蓋君在殯則辭㑹可也雖不得已於晉令而齊亦使國夏來爾許遷于容城秋七月公至自㑹劉卷卒王大夫不卒此其卒之何召陵之㑹為諸侯主於是天子為之來赴故卒之而不稱爵也葬把悼公楚人圍蔡晉士鞅衛孔圉帥師伐鮮虞許翰氏曰謀楚而不能討盟蔡而不能救唯中山是伐書卿帥師著威勝不行於彊暴而行於小弱也葬劉文公王大夫不葬此何以葬魯㑹之也葬則何以舉諡稱公王卿士有封國得置臣屬如諸侯也不月禮不備也冬十有一月庚午蔡侯以吳子及楚人戰于柏舉楚師敗績凡師能左右之曰以此其曰蔡侯以吳子何志中國之無伯也蔡為楚所虐請師於晉晉人大合諸侯之師涖以王官不能絀楚而反為蔡致冦於是蔡人告急於吳吳人因之收攘楚救蔡之功則以中國無伯也其不言救何言以則不得言救也吳以號舉君臣同辭有自來矣此其稱爵何進之也楚為中國患久矣城濮之役欒貞子曰漢陽諸姬楚實盡之而蔡始終受其荼毒已甚然齊桓晉文之盛而不能加兵於其國都劉文公合諸侯於召陵而莫能救蔡卒之能為中國復讐討罪攄神人之積憤者吳也是故特稱其爵以進之蓋春秋之善善從長也凡吳楚自相戰不月據昭十七年楚及吳戰於長岸略之不使與中國同文也於是特書日以詳之蓋許蔡侯以復世讎而吳之敗楚亦不可與凌弱暴寡之師例論也胡侍講曰囊瓦貪以敗國又不能犯可賤甚矣故記其出奔特貶而稱人髙氏曰書奔鄭罪鄭之為楚逋逃主也楚囊瓦出奔鄭外大夫出奔非有關於一國之故不書其書囊瓦何危國亡師而後奔也家鉉翁氏曰書瓦出奔誅大臣敗國而以身免也楚昭繼世舉國事付之囊瓦黷貨無厭殺人不忌以至內外離叛莫有鬭心由是有入郢之禍瓦不能死而亟出奔其罪不可勝誅矣庚辰吳入郢戰稱吳子矣入郢何為稱吳一役而再有事從其恆稱也凡入國曰國入邑曰邑此入楚矣其曰入郢何修春秋之特筆也楚之熊繹事周至成王始以子男田封諸荆山入春秋猶稱荆僖公之時始稱楚蓋荆其本號楚乃僭王後自改之號也春秋從其自號始終稱楚無異辭於是特書入郢而不言入楚以其僭王俗稱不得與三代建國無辜見入者同文也故凡之罪入中國不月其自相入則又不月據成七吳入州來定五哀十三於越入吳而此特書入以詳之據宣十一楚子入陳討弒君者與此同書日使吳之君臣而有人焉則乘此機雖復文武之境土而興滅國繼絶世可也惜乎吳無君臣不足以居其功而劉卷既卒晉之志不在諸侯無能起而收之者春秋徒致意焉爾五年春王三月辛亥朔日有食之夏歸粟于蔡此使人歸粟于蔡也則何以不言其人內大夫非卿但志其事䇿書之恆辭也公羊傳曰孰歸之諸侯歸之曷為不言諸侯歸之離至不可得而序故言我也穀梁傳曰諸侯無粟諸侯相歸粟正也髙抑崇曰蔡與吳為援而敗楚故諸侯畏而歸之粟非濟其難而賙其無也於越入吳於越勾吳皆蠻夷之號也春秋不曰勾吳而曰於越何也武王封太伯之後周章於吳則吳其國名也故得稱吳越雖禹之苗裔而始封於㑹稽則越非其封國故以其自號舉之也范寧氏曰於越蠻夷也春秋即其所以自稱者書之按汲冢竹書有東越於越六月丙申季孫意如卒秋七月壬子叔孫不敢卒冬晉士鞅帥師圍鮮虞六年春王正月癸亥鄭游速帥師滅許以許男斯歸其日何滅國以君歸故異之也張主一曰許畏鄭至西邊以依楚於是楚困於吳鄭遂滅之哀公之世許復見者楚又存之也二月公侵鄭陳氏傳曰自宣之季年凡伐不言公魯無君將者八十年矣至是而書侵鄭則以公山不狃侯犯陽虎之專也故曰政逮於大夫四世矣故夫三桓之子孫微矣趙鵬飛曰魯自舍軍之後軍皆𨽻三家公無一旅之衆今意如死定公復自將而侵鄭其後侵齊㑹晉圍成皆以師行公至自侵鄭內侵伐不至此何以致豫公之為晉討也周儋翩率王子朝之徒因鄭人將以作亂於周鄭於是乎伐周六邑而晉使魯討之其興師非一國之私矣蓋不致以為恆則致以明義也夏季孫斯仲孫何忌如晉左氏傳曰季桓子如晉獻鄭俘也陽虎彊使孟懿子往報夫人之幣晉人兼享之髙抑崇曰一卿將命可兼他事今每事一卿故纍數之見二卿陽虎所制也秋晉人執宋行人樂祈犂晉何為執樂祈犂祈犂如晉趙簡子逆而飲之酒獻楊楯六十於簡子范獻子怨其主於趙氏又有納焉乃譖諸晉侯而執之書曰行人使人也胡侍講曰稱人以執非伯討也使范趙方睦皆有獻焉則弗執之矣執異國行人出於列卿私意威福之柄移矣張主一曰諸侯唯宋事晉懼討而遣使善逆以懷之猶懼不來而大夫瀆貨爭權卒使來者見執叛者得志晉之亂政亟行伯統所由絶也冬城中城杜元凱曰公為晉侵鄭故懼而城之季孫斯仲孫忌帥師圍鄆杜元凱曰何忌不言何闕文鄆二於齊故圍之七年春王正月夏四月秋齊侯鄭伯盟于鹹齊鄭何以盟結叛晉也不月以其關於諸侯之合散也是年于沙八年曲濮義同左氏傳曰盟鹹徴㑹于衛杜元凱曰鹹衛地陳氏傳曰此特相盟也特相盟自齊桓以來未之有也是其再見其再見何諸侯無主盟矣是故石門志諸侯之合也鹹志諸侯之判也齊人執衛行人北宫結以侵衛齊侯衛侯盟于沙左氏傳曰衛侯欲叛晉諸大夫不可使北宫結如齊而私於齊侯曰執結以侵我齊侯從之乃盟于瑣杜元凱曰瑣即沙也黃震氏曰齊景乘鄭之怨晉而摟鄭與盟又乘衛欲叛晉僞執其行人以侵衛假求平之迹而竊與衛盟時景公即位幾五十年歷晉平晉昭晉頃未嘗敢爭諸侯今見晉定庸弱六卿擅政耄年妄作凡再盟而得二國適開禍端耳大雩齊國夏帥師伐我西鄙許翰氏曰東諸侯唯魯事晉故齊伐之景公乘晉之衰不思務德以懷諸侯而欲以力經營是知時之或可而不知己之不可者也九月大雩一時再雩旱甚也冬十月八年春王正月公侵齊公至自侵齊二月公侵齊三月公至自侵齊內侵伐恆不致再侵齊何以致齊景公結諸侯以叛晉而魯未從故國夏伐我而公再侵齊以報之以其重於叛盟主非一國之私故皆書至以别之曹伯露卒夏齊國夏帥師伐我西鄙公㑹晉師于瓦此晉士鞅趙鞅荀寅救我則其不書救何杜元凱曰齊師已去公逆㑹之未入竟也胡侍講曰棐林之㑹不言趙盾而言晉師瓦之㑹言晉師而不言士鞅皆以師於重也陳氏傳曰鞍之戰公㑹晉師于上鄍不書諱之也四卿並將而禽鄭自師逆公三家之張成於此矣故諱之也於是齊師伐我晉師救我公㑹晉師勿諱可也公至自瓦公㑹外大夫恆不致禮卿不㑹公侯故不書至惡其伉也㑹師則致重師也秋七月戊辰陳侯栁卒晉士鞅帥師侵鄭遂侵衛陳氏傳曰此其言遂何晉始伐與國也於襄之二十三年齊始叛晉取朝歌去年鄭始叛晉盟齊于鹹衛始叛晉盟齊于沙於是侵鄭衛又明年及齊平雖魯亦叛晉矣故悉書之也汪仲裕曰於齊始伐盟主書伐衛遂伐晉於晉始討與國書侵鄭遂侵衛齊則伐而晉則侵見晉伯既衰之甚也是故成十五年楚子侵鄭遂侵衛不書十六年知武子以諸侯之師侵陳遂侵蔡亦不書必若鄭衛叛晉晉以師兩侵之而後書遂焉以著諸侯之不復從晉也葬曹靖公九月葬陳懷公季孫斯仲孫何忌帥師侵衛杜元凱曰為晉討衛也冬衛侯鄭伯盟于曲濮趙鵬飛曰鄭衛雖受兵而叛晉益堅故為曲濮之盟不復事晉也從祀先公此禘也義不在用禘故不稱禘曰從祀先公則其為禘可知矣公羊傳曰從祀者何順祀也文公逆祀定公順祀杜元凱曰先公閔公僖公也將正二公之位次所順非一親故通言先公左氏傳曰陽虎欲去三桓以季寤更季氏以叔孫輒更叔孫氏已更孟氏冬十一月順祀先公而祈焉辛卯禘于僖公劉侍讀曰從祀先公正也所以從祀先公則非正矣陽虎將作亂而恐不得民心故為小正以售其大不正立小義以遂其大不義謂季氏以臣而凌君猶僖公以子而先父故先正逆祀以微見其意其事則順矣其情則逆春秋弗與也凡禘日甚則不日此以家臣祈亂故又不月以異之盜竊寶玉大弓公羊傳曰盜者孰謂謂陽虎也陽虎者季氏之宰則微者也惡乎得國寶而竊之陽虎專季氏季氏專魯國穀梁傳曰寶玉者封圭也大弓者武王之戎弓也周公受賜藏之魯杜元凱曰家臣賤名氏不見故曰盜蘇子由曰陽虎將殺季孫斯不勝而出取寶玉大弓於公宫以行寶玉大弓魯之分器也南蒯以費叛昭十二陽虎以鄆歡龜隂叛侯犯以郈叛十年皆以賤不書其書竊寶玉大弓何也分器重於地也分器重於地者賤貨而貴命也陳氏傳曰陽虎欲去三桓是以陪臣廢置大夫也虎陪臣也欲廢置三卿而追正宗廟之禮已而弗勝取周公之分器以出魯莫之禁者書曰從祀先公盜竊寶玉大弓魯無人之辭也是故陪臣叛皆不書書陽虎是治陪臣也夫子之作春秋治至於陪臣斯極矣九年春王正月夏四月戊申鄭伯蠆卒得寶玉大弓左氏傳曰陽虎歸寶玉大弓然則曷為不書歸陪臣賤名氏不登於䇿書盜竊可也曰盜歸可乎故書得寶玉大弓以分器為重而已公羊傳曰國寶也喪之書得之書穀梁傳曰惡得之陽虎以解衆也六月葬鄭獻公秋齊侯衛侯次于五氏外次必有關於天下之故而後書此其書次何齊景公不度德量力結鄭衛以叛晉欲伐之而代興經既不忍書伐晉故五氏垂葭蕖蒢之次屢書之乃伯業之所由衰也左氏傳曰齊侯伐晉夷儀衛侯如五氏杜元凱曰五氏晉地齊侯在五氏衛侯往助之不書伐諱伐盟主也陳氏傳曰外書次自厥貉以來未之有也於是再見其再見何中國無伯也齊衛伐盟主則其不書伐何春秋重絶晉也於襄之二十三年嘗書齊伐晉至是而不書何齊始叛晉諸侯猶有盟主也前年鄭叛晉盟齊于鹹衛叛晉盟齊于沙明年及齊平魯亦叛晉則諸侯無盟主矣有盟主非美事也無盟主非細故也是故春秋重絶晉也秦伯卒冬葬秦哀公十年春王三月及齊平夏公㑹齊侯于夾谷魯始叛晉而從齊也齊侯將伐晉既得鄭衛而後伐魯公再侵齊齊亦再伐魯而公㑹晉師于瓦季孫斯仲孫何忌侵衛東諸侯于魯重於叛晉齊不得魯則晉不可伐故齊之所欲得者莫急於魯也晉士鞅侵鄭遂侵衛而盟於曲濮次于五氏二國益堅於從齊於是魯亦及齊平而㑹於夾谷則魯亦叛晉矣公至自夾谷公㑹諸侯嘗不致此其致之何以叛盟主而㑹齊侯故特書至以異之晉趙鞅帥師圍衛左氏傳曰晉人討衛之叛故曰由涉沱成何於是執涉沱以求成於衛衛人不許晉人遂殺涉沱甚矣晉之不競也許翰氏曰使晉有以報齊則衛可無用兵而服也今圍衛而不能服則徒足以堅齊之從而已矣齊人來歸鄆歡龜隂田齊人曷為來歸田結叛晉也魯之事晉自文襄以來未之有改也於是齊將伐晉而魯人事晉益堅齊侯伐魯以求成晉輒出師救之晉與魯相表裏則齊非惟不可得志於晉而亦不可得志於魯也乃以好與魯平而亟來歸魯田之入於齊者庶乎魯人以事晉者而事齊也既而叔孫州仇如齊公㑹齊侯盟于黃則魯亦决於叛晉而從齊矣然則傳曰孔子行乎季孫三月不違齊人為是來歸之者何也孟子曰孔子於季桓子見行可之仕也行可云者行有適可而不保其往之謂也齊人奚畏焉當是時陽虎既去而南蒯侯犯公山不狃之難未息季孫之用夫子非為興魯也彼齊人固知孔子於魯非有三年淹者故歸女樂以沮之則鄆歡龜隂之田不為孔子而來歸明矣孔子嘗曰苟有用我者期月而已可也非行可之謂也學者乃欲以相定公㑹夾谷歸侵田實其言則其知聖人也微矣叛晉惡名也人以利結之則孔子之相是㑹親受事焉何也晉之失諸侯有自來矣魯之從齊猶在鄭衛之後非得已也使齊侯能修桓公之業以尊天子安中國則豈唯魯從之將天下諸侯莫不從之惜乎齊景無足望也是時魯卿方有陪臣之難而夾谷之㑹不可已也於是以孔子相是㑹聖人何容心焉鄆齊所取以歸昭公者也歡陽虎所挾以奔齊者也龜隂則我龜山之隂是三者皆魯地之見侵於齊者於是齊人以之來歸我何愧焉斯受之而已矣陳氏傳曰未有言歸田言來歸必自外至者也據鄭來歸祊齊來歸衛寶之類鄆歡龜隂田言來歸以是為齊人之願也叔孫州仇仲孫何忌帥師圍郈秋叔孫州仇仲孫何忌帥師圍郈胡侍講曰侯犯以郈叛不書書圍郈則叛可知矣再書二卿圍郈則彊亦可知矣三家知傾公室以自張而不知家𨽻之擬其後也天子失道征伐自諸侯出而後大夫彊諸侯失道征伐自大夫出而後家臣彊其逆彌甚其失彌近故曰自諸侯出十世希不失矣自大夫出五世希不失矣陪臣執國命三世希不失矣春秋據事直書深切著明矣宋樂大心出奔曹左氏傳曰宋公使樂大心盟于晉辭僞有疾子明言於公曰右師不肯適晉將作亂也乃逐桐門右師宋公子地出奔陳冬齊侯衛侯鄭游速㑹于安甫叔孫州仇如齊宋公之弟辰暨仲他石彄出奔陳暨猶及也仲他石彄宋大夫也公弟與大夫不可纍數故曰暨胡侍講曰傳言宋公子地有白馬四公以與向魋地怒抶魋奪之魋懼將走公泣之母弟辰曰子為君禮不過出竟君必止子地出奔陳公弗止辰為之請勿聽辰曰是我迋吾兄也吾以國人出君誰與處書曰宋公之弟辰暨仲他石彄出奔陳見宋公以嬖魋故而失二弟無親親之恩辰以兄故帥其大夫出奔無尊君之義又以見仲他石彄見脅於辰不能自立無大臣之節也十有一年春宋公之弟辰及仲他石彄公子地自陳入于蕭以叛夏四月秋宋樂大心自曹入于蕭胡侍講曰四卿入蕭以叛而大心從之其叛可知矣故但曰入于蕭書自陳自曹者結鄰國以入叛陳與曹之罪亦著矣劉侍讀曰事君者可貧可賤可殺而不可使為亂君親無將將而誅焉況據邑以伐其君者乎其罪一施之冬及鄭平左氏傳曰始叛晉也其不月據凡平皆月以魯與諸侯之合散繫焉故異之也叔還如鄭涖盟吳先生曰及鄭平者我欲之故鄭卿不來盟而我卿往涖盟也家鉉翁氏曰魯既與晉絶去年及齊平今又及鄭平既背晉不得不樹黨以自固焉耳十有二年春薛伯定卒夏葬薛襄公叔孫州仇帥師墮郈墮壞也郈叔孫氏之邑也州仇曷為自墮其邑除家臣之患也家臣為患之日久矣陽虎作難囚季孫居歡陽關以為政三家幾不免焉侯犯以郈叛叔孫與仲孫帥師圍郈不克再圍之侯犯以郈奔齊齊人乃致郈而侯犯猶在齊也時邑宰數叛魯卿患之孔子方仕於朝而仲由為季氏宰建墮三都之議以絶陪臣之禍故叔孫首帥師墮郈郈易墮也衛公孟彄帥師伐曹季孫斯仲孫何忌帥師墮費費季孫氏之邑也斯曷為自墮其邑除家臣之患也南蒯者費宰也不見禮於季氏欲出季氏而歸其室於公已以費為公臣懼不克以費叛如齊昭十二年齊人致費十四年公山不狃者亦費宰也不得志於季氏叔孫輒者叔孫氏之庶子也無寵於叔孫氏皆欲因陽虎以去三桓陽虎既敗入於歡陽關以叛奔齊而公山不狃叔孫輒猶在費也於是叔孫墮郈季氏亦墮費費人習於南蒯不狃之亂從二子襲魯公與季氏幾不免焉既敗費人於姑蔑二子奔齊遂墮費而無復陪臣之禍矣故二卿帥師墮費費未易墮也秋大雩冬十月癸亥公㑹齊侯盟于黃十有一月丙寅朔日有食之公至自黃公㑹盟諸侯嘗不致以卒叛晉而為是盟故致之十有二月公圍成成孟孫氏之邑也公曷為自圍成孟孫氏不肯墮成也三家者患同而情異成宰公斂處父者孟氏家𨽻之良也陽虎之宵軍齊師戒都車皆將為三子不利賴處父發其姦以免陽虎伐孟氏處父帥成人與陽氏戰而敗之二家之臣方竊邑以為其主機穽而處父獨以其邑為孟氏保障此孟孫所以不肯墮成也孟孫不肯墮成而公自圍成用建墮三都之議定於公朝而不但私建於季氏也用建將以弱私家張公室而不但除陪臣之患也除陪臣之患三家之願也故孟孫與季孫同帥師以墮費張公室非三家之願也故孟孫不肯墮成公親圍之而不克蓋三家専魯之日久非一朝之可正也胡侍講曰孔子為魯司冦而不能墮成何也圍成之明年孔子由大司冦攝相事據史記在十四年則圍成之時仲尼未得魯國之政也及齊人饋女樂而孔子遂行矣使聖人得志行乎魯國以及期月則不待兵革而自墮矣公至自圍成公圍其邑不致據昭公圍成此何以致彊臣據邑叛君如敵國故致之髙抑崇曰天子命行乎天下諸侯命行乎一國故天子未嘗有親伐諸侯者諸侯亦未嘗有親伐其國之邑者以其令之則從也天下無王而諸侯擅命故有王伐鄭之事陪臣擅國而權在私家故有公圍成之事公以圍成至者著公之弱不能墮成也十有三年春齊侯衛侯次于垂葭左氏傳曰齊侯衛侯次于垂葭使師伐晉夏築蛇淵囿髙抑崇曰魯國之囿一而已成築鹿囿昭築郎囿定築蛇淵囿何囿之多也大搜于比蒲髙抑崇曰魯既叛晉而三家日懼人之圍已故數搜焉衛公孟彄帥師伐曹髙抑崇曰衛比伐曹曹不叛晉故也靈公志在軍旅之事而不知以禮為國故亟戰如此秋晉趙鞅入于晉陽以叛冬晉荀寅士吉射入于朝歌以叛范中行氏伐趙氏鞅奔晉陽荀躒韓魏伐范中行氏寅吉射奔朝歌則曷為皆以叛書晉人皆以叛告也趙鞅以邯鄲午不歸衛貢五百家殺午而邯鄲叛故范中行氏起而伐之鞅奔晉陽荀躒言於晉侯曰三臣始禍而獨逐鞅刑已不鈞矣請皆逐之然則討鞅有君命矣是以荀躒又請於公而討二氏二氏伐公國人助公伐之則皆以叛討矣故其奔也皆以叛告諸侯胡侍講曰晉主夏盟威服天下及大夫專政賄賂公行諸侯叛於外大夫叛於內故臧哀伯曰國家之敗由官邪也官之失德寵賂章也晉卿始禍緣衛貢也樂祈見執獻楊楯也蔡侯從吳荀吳貨也昭公弗納范鞅賂也而晉室不能復主盟矣故為國以義不以利晉趙鞅歸于晉鞅叛而言歸韓魏請而復之也韓魏惡荀范而善鞅故復鞅使同敵荀范也胡侍講曰三子之叛其罪一也鞅以有援故得入寅吉射以無助故終叛春秋書鞅歸于晉以明晉侯縱釋有罪無政刑矣其能國乎陳氏傳曰歸不言自鞅無所自也歸易辭也欒盈魚石猶言入至鞅而後言歸則晉無人之辭也此韓趙魏分晉之本也薛弒其君比十有四年春衛公叔戍來奔衛趙陽出奔宋衛逐其大夫用南子之譖也衛靈公夫人南子有淫行公叔戍衛世臣也謀去夫人之黨夫人訴於公曰戍將為亂公為逐戍與其黨趙陽北宫結南子之故也衛侯嬖南子縱其淫泆而不之禁於是一言而出三大夫此衛亂之所從始也二月辛巳楚公子結陳公孫他人帥師滅頓以頓子牂歸頓嘗㑹諸侯于召陵故也春秋書楚結除他連兵滅國誅楚而罪陳也書曰者重其變也左氏傳曰頓子牂欲事晉背楚而絶陳好二月楚滅頓夏衛北宫結來奔五月於越敗吳于檇李吳子光卒國君戰而亡曰滅必死於陳者也非死於陳者亦必詳其所以吳子遏門於巢卒見其傷於門巢也於越敗吳于檇李吳子光卒見其傷於檇李之敗也凡吳楚交相敗不書據襄十三年楚人敗吳師十四年楚伐吳吳人敗之之類此為吳子光以敗卒而書吳越深謀報復而越卒亡吳於是始故詳之也外相敗恆日據僖三十三晉及姜戎敗秦此其不日何略之也公㑹齊侯衛侯于牽左氏傳曰晉人圍朝歌公㑹齊侯衛侯謀救范中行氏杜元凱曰齊魯叛晉故助范中行也公至自㑹秋齊侯宋公㑹于洮左氏傳曰范氏故也天王使石尚來歸脤杜元凱曰石氏尚名天子之士也脤祭社之肉盛以脤器以賜同姓諸侯親兄弟之國與之共福穀梁傳曰脤者何祭肉也生曰脤熟曰膰周禮大宗伯以脤膰之禮親兄弟之國大行人歸脤以交諸侯之福凡王使來錫命歸賵歸含來救皆月此其不月何歸脤乃周官舊典故不月以别之衛世子蒯聵出奔宋衛侯出其世子夫人之故也夫人行惡聞於鄰國世子羞之蓋以謂夫人夫人惡之反訴於公曰蒯聵將殺余公為出世子而盡逐其黨夫人嬖故也靈公以夫人故既出其大夫又出其世子致國本不定終春秋衛亂未已靈公為之也然則傳言太子與戲陽速謀殺少君速許而弗為以致事覺出奔者非歟戲陽速蓋迎合夫人之意而為是言以免禍耳劉侍讀曰蒯聵所羞者以夫人名惡也如殺其母為惡愈甚反不知可羞乎且殺夫人蒯聵獨得全乎蓋蒯聵聞野人之歌而慙則以謂夫人夫人惡其斥已淫則言太子將殺豫以誣之耳又宋南子家也蒯聵欲殺南子而敗走其家乎胡侍講曰世子國本也以寵南子故不能保世子而使之去國以得罪南子故不能安其身而出奔春秋書之兩著其罪衛公孟彄出奔鄭彄比嵗帥師則衛之正卿也至是亦以世子之黨見逐則夫人與其黨益得以自恣而無忌矣宋公之弟辰自蕭來奔大搜于比蒲張主一曰搜而邾子來㑹公則公親搜矣孫莘老曰春秋田狩之事公行者必書公公矢魚于棠公狩于郎政猶自公出也自搜于紅政在三桓雖公自行皆曰大搜而不曰公見公不得為政也邾子來㑹公杜元凱曰㑹公于比蒲也來而不用朝禮故曰㑹據莊二十三年蕭叔朝公城莒父及霄杜元凱曰公叛晉助范氏故懼而城二邑此年不書冬史闕文十有五年春王正月邾子來朝鼷鼠食郊牛牛死改卜牛公羊傳曰不言其所食漫也范寧氏曰食非一處也二月辛丑楚子滅胡以胡子豹歸胡嘗㑹諸侯于召陵故也以其君歸故日家鉉翁氏曰召陵之㑹頓胡之君皆在曰以侵楚也是後楚有吳患不能報去年滅頓今年滅胡所以報怨也左氏傳曰吳之入楚也胡子盡俘楚邑之近胡者楚既定又不事楚曰存亡有命胡侍講曰胡子豹乘楚之患盡俘其邑之近胡者所謂國必自滅而人滅之也國君造命不可委命者既以為有命而又貪生忍辱不死於社稷則是不知命矣夏五月辛亥郊穀梁傳曰五月郊不時也汪仲裕曰正月改卜牛若在滌三月則當以四月郊於今郊於五月蓋卜以四月郊而不吉又卜五月郊必龜從而郊也但書改卜牛不書卜郊者卜郊不從則書之以譏其瀆卜而從則但書郊之過時以譏其慢耳壬申公薨于髙寢杜元凱曰髙寢宫名不於路寢失其所穀梁傳曰髙寢非正也鄭罕達帥師伐宋杜元凱曰宋公子地奔鄭鄭人為之伐宋欲取地以處之哀十二年左氏傳曰宋平元之族自蕭奔鄭鄭人為之城嵒戈錫是也齊侯衛侯次于蕖蒢左氏傳曰謀救宋也邾子來奔喪諸侯無奔諸侯之喪者邾子來奔喪何示服也邾始强世有惡於魯而常恃晉以為重至是衰微而晉亦不競故躬為非禮以示服從庶免侵伐之禍也何休氏曰天子崩諸侯奔喪㑹葬秋七月壬申姒氏卒姒氏者何定公之適夫人也何以知其為適夫人定姒從夫諡而終定哀之世他無定夫人喪則其為定公適夫人明矣然則何以不稱夫人吳先生曰哀未成君而魯臣不以夫人之禮喪其母也僖宣襄昭四妾母羣臣皆逢君之意而尊之定哀之際君弱臣强嗣君之母先君之適夫人也乃敢蔑其君而卑其母焉甚矣魯道之衰也八月庚辰朔日有食之九月滕子來㑹葬家鉉翁氏曰周衰小國以事王朝之禮事大國魯君嘗奔齊晉之喪矣故邾滕二君來奔喪㑹葬書之著其失也丁巳葬我君定公雨不克葬戊午日下昃乃克葬左氏傳曰雨不克襄事禮也辛巳葬定姒小君者夫人之别號既不喪以夫人之禮而不稱夫人薨故葬亦不稱小君也杜元凱曰反哭於寢故書葬冬城漆杜元凱曰漆邾庶其邑張主一曰城漆謀伐邾也定公之喪邾子來奔事魯謹矣哀公初立魯人不務善鄰而以土地之故勞民啓怨二年取其田七年俘其君卒使吳人乘間以伐其國齊人問罪而取謹闡三家謀國不忠之罪也春秋集傳卷十四
