front:
  text: 春秋集傳後序東山趙先生著春秋集傳屬辭左氏注解共若干卷屬辭左氏解汪左丞刻之東山書院惟集傳無聞𢎞治間墩篁先生嘗遍求不獲正德戊辰豫偶知是書藏於程文富氏屢借鈔不獲嘉靖戊子提學御史東阿劉君按徽下令求是書豫語有司就文富氏索之而後是書始出然則斯文之顯晦固有時耶劉君以原本藏之學宫休邑劉判簿時濟恐其抄録日久不免魯魚亥豕之訛屬夏司訓鏜重加校訂捐俸刻之俾與屬辭並行於世嗚呼春秋者聖人之刑書也夫子生丁季世有德無位於是假魯史以修經褒善貶惡垂法萬世故曰知我者其惟春秋乎罪我者其惟春秋乎東山先生聖人之徒也憤當世之亂甚於春秋築居東山集傳諸書之作固吾夫子修經之意也中嘗一出與左丞起兵保捍鄉井十有餘年一郡晏然此吾夫子相魯㑹齊夾谷卻萊兵之時也先生其善學夫子者乎世人讀先生之書與先生之文者知其問學不在宋濳溪諸公下而不知先生平生慷慨大節亦自卓卓如是豫沗先生郡人兩登東山徘徊竟日恨生也晚不得供灑掃之役判簿君以刻書之故相諗遂不辭而為之序先生九原有知當不以豫為妄也嘉靖十一年壬辰秋七月朔後學東峯汪𤣥鍚書春秋集傳有序東山先生所著初藁始於至正戊子一再刪削迄丁酉歲成編既而復著屬辭義精例密乃知集傳初藁更須討論而序文中所列史法經義猶有未至且謂屬辭時推筆削之權而集傳大明經世之志必二書相表裏而後春秋之㫖方完歲在壬寅重著集傳方草創至昭公二十七年乃疾疢難危閣筆未續序文亦不及改洪武己酉仲冬先生遽謝世矣尚誼受教門牆頗久獲窺先生著述精思妙契之勤嘗俾其校對編抄間有千慮一得先生不以其愚妄或俯從是正者有之竊惟先生於是經所謂一生精力盡於此者誠足以破聚訟未决之疑而發千載不傳之祕顧乃功虧一簣集傳未及成書所幸初藁具全其義例之精有屬辭可據尚誼雖至愚極暗然執經館下厥有自來是以不避僭踰始自昭公二十八年訖於獲麟并序中條陳義例一節輒加校定其全書有訛誤疏遺者就用考正庶幾與屬辭歸一而前後詳略相因固知畫虎不成難逃譏誚然義例文辭悉據先生成說特施櫽括而已初未敢以臆見傅㑹其間也謹遵治命分為一十五卷既脫藁藏之東山精舍以俟君子修飾焉學生倪尚誼謹識
