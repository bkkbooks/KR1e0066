body:
  text: 春秋集傳卷七元趙汸撰文公元年春王正月公即位踰年雖未葬稱公不可曠年無君也公羊傳曰緣始終之義一年不二君緣臣民之心不可一日無君也二月癸亥日有食之天王使叔服來會葬天子使大夫葬諸侯禮也得禮故不月據四月乃喪中有閏月王臣必無前二月至之理略常事也據歸賵會皆月夏四月丁巳葬我君僖公天王使毛伯來錫公命請命而來錫也詩序季孫行父請命于周以時考之為文公請命也作頌為將躋僖公榖梁傳曰禮有受命無來錫命錫命非正也劉侍讀曰錫命者命為諸侯也禮諸侯在喪稱子踰年即位喪畢以士服見於王王乃於廟命之錫之黻冕圭璧然後服之歸設奠于祖廟然後臨其臣民焉喪未畢而命之非禮也既喪畢而不受命于天子亦非禮也晉侯伐衛君將非親帥不志據僖二十城濮不書宋公襄十四年不書晉侯於是晉告於諸侯而伐衛先且居曰效尤禍也諸君朝王臣從師晉侯朝王于溫先且居胥臣伐衛則其書晉侯何與晉侯以紹伯也晉文公卒衛人侵鄭伐綿訾及匡襄公既敗秦師敗狄伐許然後伐衛以討二纘文之功繼主夏盟故與之也叔孫得臣如京師拜錫命也衛人伐晉陳氏傳曰此衛孔達也其稱人何大夫將猶稱人也秋公孫敖會晉侯于戚內大夫始特會諸侯也冬十月丁未楚世子商臣弒其君頵頵丘倫反公孫敖如齊二年春王正月甲子晉侯及秦師戰于彭衙秦師敗績此秦人伐晉也其不言伐何以戰敗績見義也晉厲公嘗及秦師戰于麻隧秦師敗績不書書晉伐秦譏在晉則秦師敗績不足書也晉悼公嘗及秦師戰于櫟晉師敗績不書書秦伐晉責秦之黨楚則晉師敗績為中國諱之可也秦穆公之悔過自誓志乎報怨攄忿而已於是不替孟明以替殽之役故伐晉不書而書戰書敗績惡其不知自反以喪師非國君子民之道也程子曰秦人越國以襲人雖忿無以為辭也故其來不稱伐以忿取敗故書敗績丁丑作僖公主主為練主也作主不書過時則書之公羊傳曰主者曷用虞主用桑練主用栗用栗者藏主也榖梁傳曰立主喪主於虞吉主於練作僖公主譏其後也何休氏曰禮作練主當以十三月髙抑崇曰周人卒哭而祔祔而易主是謂虞主既期而練練而易主是謂練主僖公薨十有五月非練之時而作主猶未祔廟也猶未祔廟者欲躋者故也是以謹而日之三月乙巳及晉處父盟左氏傳曰晉人以不朝來討公如晉晉人使陽處父盟公以恥之書曰及處父盟以厭之也適晉不書諱之也榖梁傳曰不言公處父伉也為公諱也何以知其與公盟以其日也何以不言公之如晉所恥也出不書反不致也張主一曰盟于晉之國都而君不出恥甚矣故諱之王沿氏曰內沒公而外去氏者既刺公以不朝致辱又卑晉以非禮盟公也夏六月公孫敖會宋公陳侯鄭伯晉士縠盟于垂隴鄭地晉主夏盟恆日雖大夫盟日此何以不日以吾大夫會諸侯盟也春秋日月之法莫嚴於君臣莫辨於內外之别故吾君及諸侯盟恆日雖有大夫日僖公盟洮于向雖會大夫盟諸侯日新城趙盾其不日者必有故也吾大夫特盟諸侯不月自參以上不日桓十一盟折雖會大夫盟諸侯不日據此及文十八年虛折所以嚴君臣之分也必吾大夫與外大夫盟而後日敵也非敵而日者異之也不疑於伉者也文十六齊侯哀二邾子舍是則與外監也故于邢之類不月苟吾君大夫與之盟則皆日隱二年盟戎文八年公子遂盟戎不欲卑吾君與大夫所以謹內外之辨也陳氏傳曰晉遂以大夫盟諸侯也大夫而與諸侯敵於是始故書大夫專盟自士縠也士縠非卿也見晉之卑諸侯也自十有二月不雨至于秋七月公羊傳曰記異也大旱以災書此亦旱也曷為以異書大旱之日短而云災故以災書此不雨之日長而無災故以異也榖梁傳曰歷時而言不雨文不憂雨也不憂雨者無志乎民也八月丁卯大事于太廟躋僖公大事者禘也譏不在用禘故略言之公羊傳曰躋者升也譏逆祀也其逆祀奈何先禰而後祖也榖梁傳曰先親而後祖也逆祀也逆祀則是無昭穆也則是無祖也無祖則無天也君子不以親親害尊尊此春秋之義也劉侍讀曰僖公於閔非父子也然而與親父子無以異者受國焉耳君之則我以臣事之父之則我以子奉之是故為人後者則為之子矣髙抑崇曰人君以兄弟為後者必非有子者也引而為嗣臣子一體矣不繼所受國而繼先君則是所受國者竟莫之嗣也生則以臣子事之死則以兄弟治之非所以受國之意也胡侍講曰有天下者事七世諸侯五世父死子繼兄亡弟及名號雖不同其為世一也冬晉人宋人陳人鄭人伐秦陳氏傳曰此晉先且居宋公子成陳轅濤塗鄭公子歸生也曷為不序大夫將猶稱人也自陽處父專將書大夫是故春秋之始大夫將恆稱人由救鄭之後略之始稱人矣胡侍講曰晉人再敗秦師在恆情亦可以已矣而報復無已殘民結怨之道也公子遂如齊納幣納幣不書據桓宣成皆取于齊不書納幣知納幣不使大夫乃禮之常使大夫則書之志禮之變也公羊傳曰譏喪娶也取在三年之外則何譏乎喪取三年之內不圖昏三年之恩疾矣非虛加之也以人心為皆有之以人心為皆有之則曷為獨於取焉譏娶者大吉也非常吉也其為吉者主於己以為有人心焉則宜於此焉變矣三年春王正月叔孫得臣會晉人宋人陳人衛人鄭人伐沈沈潰以其服於楚也夏五月王子虎卒王大夫不卒據成十三成肅公昭十一年單成公此其卒之何以嘗主諸侯之盟也左氏傳曰來赴弔如同盟故卒之也曷為不稱爵王臣無外交於是天子為之赴故不言爵也陳莊子死赴於魯魯人欲勿哭繆公召縣子而問焉曰古者大夫束修之問不出竟雖欲哭焉得哭諸今之大夫交政於中國雖欲勿哭焉得而勿哭然則非禮也蓋衰世之志也是故翟泉之盟卒王子虎臯鼬之會卒劉卷舍是王臣無書卒者矣秦人伐晉陳氏傳曰此秦伯也曷為稱人殽之誓孔子有取焉而秦穆之連兵無虛歲君子以為秦人不足進乎伯也是故自韓原秦不以爵見於經至康公而遂外之終南蒹葭之作秦非無人也而秦不用其不復東征宜哉秋楚人圍江報沈之役也晉先僕伐楚以救江不書不足書也雨螽于宋左氏傳曰墜而死也公羊傳曰記異也冬公如晉晉人請改盟也十有二月己巳公及晉侯盟晉陽處父帥師伐楚以救江於是晉以江故告于王王叔桓公晉陽處父伐楚以救江則其不書王叔何不以伐楚救江纍王室也襄公敗秦師于殽而歸縱淫自將以敵秦怨而忘楚患伐許之役三國伐秦四國伐沈五國皆以大夫專之而楚人圍江以微者往救襄公之志荒矣於是不能親率諸侯以救江絀楚而屈王臣與其大夫俱以伐楚無益於救江之實而使天子受其名是故特書陽處父而王叔桓公不書不以纍王室也伐不言以救於是言以救江與之以救中國之名所以責其實也王沿氏曰諸侯大夫未有帥師而稱名氏曰某曰處父何也政在諸侯則大夫皆稱人政在大夫故稱氏名以罪之也始於處父者以其盟魯侯搜于董易中軍今救江而伐楚專之甚者也故始之也陳氏傳曰晉大夫書帥師於是始大夫強也自是恆書大夫略之則稱人四年春公至自晉夏逆婦薑于齊不言逆之者逆之者微也曰婦者有姑之辭無姑則以夫人之禮至有姑則以婦禮至也薑不言氏者異之不正成風以妾祖姑為昏主而當婦禮也若妾姑也則不書氏故穆薑亦不氏所以别適姑也左氏傳曰卿不行也君子是以知出薑之不允於魯也曰貴聘而賤逆之君而卑之不允宜哉狄侵齊秋楚人滅江晉侯伐秦張洽氏曰晉侯不以江亡為恥而亟報秦怨其為盟主末矣衛侯使寧俞來聘冬十有一月壬寅夫人風氏薨陳氏傳曰夫人某氏薨適稱也此莊公之妾也則曷為以適稱稱之喪之以夫人之禮也隱公之喪桓母猶有疑焉是故别廟也祔姑稱諡伉然如夫人則自文公之喪成風始也胡侍講曰禮庶子為君為其母無服不敢二尊者也邦君之妻邦人稱之曰君夫人稱諸異邦曰寡小君敵體之稱也若夫妾媵則非敵矣以妾媵為夫人徒欲尊其所愛而不虞卑其身以妾母為夫人徒欲貴其所生而不虞賤其父卑其身則失位賤其父則無本失位無本不亦悖乎五年春王正月王使榮叔歸含且賵王不稱天異之也天子於諸侯賵之含之小君亦如之禮也文公尊其妾母為夫人天子不能正於是赴于京師而天子使其大夫賵之含之以成其為夫人是亂人紀也故王不稱天稱天則疑於賵惠公仲子不言來者略之略之亦所以異其事也是故來會葬亦不稱天稱天則疑於會葬僖公三月辛亥葬我小君成風啖叔佐曰葬成風祔廟也二夫人祔廟非禮也蘇子由曰仲子非適故為之立宫而不祔不葬禮也自成風以來妾母皆葬蓋祔也魯禮之變自此始矣王使召伯來會葬陳氏傳曰王不稱天於追錫桓公見之至是再見其再見何以夫人之禮葬成風也莊僖之際天下知有盟主而已而襄之季年更有事於諸侯於是叔服會葬毛伯錫命尤汲汲於魯也尤汲汲於魯則何為乎成風一人賵含之二人會葬之以是懷諸侯吾見周之益陵夷也文武之教著於南雅莫急於君夫人也桓以少篡長成風以庶亂適王道熄矣而莊襄不能正又從而褒賞之是以天命施之天討也是故王不稱天夏公孫敖如晉秦人入鄀鄀音若不月有以來之也左氏傳曰鄀叛楚即秦又二於楚夏秦人入鄀秋楚人滅六冬十月甲申許男業卒六年春葬許僖公夏季孫行父如陳秋季孫行父如晉八月乙亥晉侯歡卒冬十月公子遂如晉葬晉襄公盟主薨卿共葬事非禮也鄭遊吉曰先王之制諸侯之喪士弔大夫送葬唯嘉好聘享三軍之事於是乎使卿文襄之伯也君薨大夫弔卿共葬事夫人士弔大夫送葬此禮樂之自諸侯出也晉殺其大夫陽處父晉狐射姑出奔狄晉襄公卒狐射姑殺陽處父則稱國以殺何兩下相殺不道兩下相殺不道則處父何以書譏君也襄公搜于夷使狐射姑將陽處父請改搜于董易中軍襄公卒狐射姑使人殺陽處父君失政也君失政則大夫専專則爭爭則相殺是故以國殺書之譏不在相殺也閏月不告月猶朝于廟不告月者不告朔也告月必以朔故亦曰告朔廟者太廟也天子頒十二月朔于諸侯諸侯受而藏之太廟月朔則朝于太廟大夫南面奉天子之命君北面受之因以特羊薦謂之告月文公以閏非常月間不告廟猶以朔日朝于太廟故書之志禮之所由失也左氏傳曰閏以正時時以作事不告閏朔棄時政也何休氏曰先受朔政乃朝廟王教尊朝廟私也髙抑崇曰知朝廟之不可已則告月之禮曷為可已也七年春公伐邾為須句故也僖公取須句反其君邾人再滅之三月甲戌取須句遂城郚句音俱郚音吾取國不月據僖公取須句宣公取根牟襄公取邿此其日何遂絶其祀也左氏傳曰取須句置文公子焉非禮也志在逼邾而無存亡繼絶之義故日以異之遂城郚避邾難也夏四月宋公王臣卒宋人殺其大夫稱人以殺衆辭也大夫者大司馬固也則曷為不名死君難也宋成公卒國亂其弟禦殺其世子而自立國人殺禦而立昭公襄夫人者君祖母也有淫行昭不禮焉公子鮑者昭庶兄也有佞才夫人私之於是夫人欲殺昭而立鮑穆襄之族攻公殺公孫固公孫鄭于公宫則大夫者昭公之所與存亡者也是故稱人以殺而不名名之則疑於陳公子過戊子晉人及秦人戰于令狐此晉趙盾及秦伯也而皆稱人晉敗秦師也而曰戰何也交譏之也晉襄公卒晉人欲立長君使先蔑逆公子雍于秦舍適嗣不立而外求君晉既知罪矣於是乎立適嗣夷臯嘗踰年矣且夷臯秦出也而康公猶自將以納雍則晉豈無辭乎於是晉禦秦師敗諸令狐而趙盾秦伯皆稱人兩有罪也詐戰曰敗之戰敵不言師敗績此敗之矣而以敵辭書則其罪均也程子曰晉始逆公子雍既而悔之故秦興兵以納之晉不謝秦秦納不正皆罪也故稱人陳氏傳曰秦晉之交兵於是再世自令狐之後連兵不悉書矣於八年秦伐晉取武城不書於十年晉伐秦取少梁不書而書秦伐晉也晉先蔑奔秦榖梁傳曰不言出在外也狄侵我西鄙秋八月公會諸侯晉大夫盟于扈此公會諸侯宋公衛侯陳侯鄭伯許男曹伯晉趙盾也則曷為不序無伯之辭也晉君幼趙盾以大夫主諸侯而卒使晉不競於楚於是晉弗伯而楚興此天下之大變也春秋辨實之際以楚之所以興實由中國之無伯故於靈公之盟會略不序諸侯而楚君將悉從其恆稱以罪晉也凡大夫不稱大夫必殺而後稱大夫非殺而稱大夫者衆辭襄十六溴梁非衆辭則國無君也莊九年齊大夫此非無君也而亦以無君之辭稱之不正其以大夫而主諸侯故著之是經之變文也不日略之也以日為恆則不日為略也於新城書至弗為功也以致為恆則不致以為變也陳氏傳曰晉始失伯也凡稱諸侯必前目而後凡也前有王人後無王人書曰諸侯盟于某則王人不與也據首止王世子葵丘宰周公前無吾君後有吾君書曰公會諸侯盟于某則吾君嘗不與也據僖二十年盟薄二十七年盟宋未始有不與者也而但曰諸侯一役而再有事也僖二十八年圍許襄十九年盟祝柯二十五年盟重丘非一役再有事則非凡辭也非凡辭者散辭也榖梁傳曰其曰諸侯略之也冬徐伐莒徐嘗稱人矣則曷為復其恆稱叛諸夏也公孫敖如莒涖盟八年春王正月夏四月秋八月戊申天王崩冬十月壬午公子遂會晉趙盾盟于衡雍鄭地大夫與外大夫盟日敵也乙酉公子遂會雒戎盟于暴雒音洛鄭地其日乙酉距壬午四日爾傳言盟于衡雍遂會伊雒之戎則曷為再書公子胡侍講曰春秋謹內外之辨雒邑天地之中而戎居之再稱公子各日其會以深别之示內外有辨終不可雜也許氏曰大夫而主盟諸侯自扈之會始也君子惡之公孫敖如京師不至而復丙戌奔莒榖梁傳曰不言所至據公子遂書至黃乃復未如也未如而曰如不廢君命也未復而曰復不專君命也杜元凱曰不言出受命而出自外行也螽音終宋人殺其大夫司馬此公子卬也不名則曷為稱其官有殺而代之者也宋人將弒其君於是先殺其司馬而以華耦代之則司馬者昭公之所與存亡者也司馬既死則兵非昭公之兵矣兵非其兵則公子鮑之弒械成矣是故特書其官舉者書其官者以異其事也榖梁傳曰其以官稱無君之辭也宋司城來奔此蕩意諸也不名則曷為稱其官宋司城者司空也司空既出則國非昭公之國矣既殺其司馬又出其司城則六卿之在位者皆公子鮑之黨而已陳氏傳曰凡奔非其罪不書苟接我也不可以不書則不以稱名之例書之是故未有書官者於是官從其官未有書字者於是字從其字子哀九年春毛伯來求金求金以供葬也周室微諸侯不助喪也左氏傳曰非禮也不書王命未葬也公羊傳曰毛伯天子之大夫也何以不稱使當喪未君也踰年矣何以謂之未君即位矣而未稱王也未稱王何以知其即位以諸侯之踰年即位亦知天子之踰年即位也以天子三年然後稱王亦知諸侯於其封內三年稱子也踰年稱公矣則曷為於其封內三年稱子緣臣民之心不可一日無君緣始終之義一年不二君不可曠年無君緣孝子之心則三年不忍當也王者無求求金非禮也夫人薑氏如齊二月叔孫得臣如京師辛丑葬襄王王喪卿共葬事於是始見也天王崩諸侯不奔喪而以微者行自東遷以來失之矣於是襄王使大夫來會僖公葬賵含成風且會之葬魯亦以公子遂如晉葬襄公而後得臣葬襄王一則以其來不可不往也一則以其如晉不可不如周也是故叔弓如宋葬平公季孫意如如晉葬昭公而後叔鞅葬景王舍是葬天子魯無使卿者矣靈王之喪鄭簡公在楚上卿守國子展使印段往伯有曰弱不可子展曰與其莫往弱不猶愈乎此春秋之情實也晉人殺其大夫先都稱人以殺討亂之辭也曰大夫在位也討亂雖殺世子母弟不書此大夫也則何以書諸侯不得專殺大夫也孫明復曰非天子不得專殺故天王殺大夫不書古者諸侯大夫皆命于天子不得專命也大夫有罪則請于天子不得專殺也春秋之世國無大小其大夫皆專命之有罪無罪皆專殺之其無王也甚矣三月夫人薑氏至自齊其致以得禮也其月從其恆法也婦人無外事故行必以禮而後致以禮致則月之以明得常也劉侍讀曰夫人曷為或致或不致出入以禮則致出入不以禮則不致此其為有禮奈何父母在而歸寧也晉人殺其大夫士縠及箕鄭父劉侍讀曰殺二大夫以上不言及其事同而殺之之志均也晉二趙三郤蔡二公孫曰某及某者以某之故而纍及某也楚人伐鄭楚君將猶稱人也扈之盟嘗不序諸侯矣於是楚子伐鄭則猶人之何以其人救鄭之大夫不可以不人楚子也春秋雖治在大夫而楚人狂僭終不可以無討當大夫與楚君遇則春秋必致謹焉其謹之如何苟人中國之大夫則楚雖君將不稱君苟楚君將稱君則不可人諸大夫是故侵陳遂稱宋書楚子則晉趙盾救陳從其恆稱邲之戰書楚子則荀林父從其恆稱伐鄭書楚子則郤缺從其恆稱晉雖不競而楚罪固宜討也楚罪宜討則其君將稱君非豫之也公子遂會晉人宋人衛人許人救鄭陳氏傳曰兵將恆書大夫矣此晉趙盾宋華耦衛孔達也曷為稱人晉遂不競而楚興也左氏傳曰卿不書緩也以懲不恪夏狄侵齊秋八月曹伯襄卒九月癸酉地震冬楚子使椒來聘獻捷嘗稱人來聘曷為書君大夫春秋於吳楚唯嘉好之事悉從其恆稱為其以諸侯之禮來接於我也鬭椒何以不氏吳楚之有大夫未盡同中國也故吳子使札來聘亦不稱公子秦人來歸僖公成風之禭禭音遂曰秦人來者微也公羊傳曰其言僖公成風何兼之也兼之非禮也曷為不言及成風成風尊也劉侍讀曰諸侯無二適故妾母繫子為重也葉夢得曰死三日而斂則含禭有不及其尸者矣先王待人以情而不責人以事故有既葬而致含於蒲席者稱其情而為之節也左氏傳曰諸侯相弔賀也雖不當事苟有禮焉書也以無忘舊好張洽氏曰是時秦楚交病中國秦欲伐晉而歸襚於魯猶楚欲圖北方而來聘也葬曹共公十年春王三月辛卯臧孫辰卒夏秦伐晉何休氏曰謂之秦者外之也程子曰秦唯以報復為事故惡而外之王沿氏曰秦晉用兵自殽之役令狐之戰一彼一此者凡十焉故不書秦伯伐晉而直謂之秦外之也不外晉者晉為盟主有救中國之義也至其不能救陳蔡而伐鮮虞則亦外之矣陳氏傳曰外秦也歸成風之隧使術來聘秦習於禮矣則其外之何楚之興秦之力也自滅庸以後秦為楚役自晉主諸夏之盟舍秦無加兵於晉者也會於夷儀之歲秦晉成而不結又明年盟于宋而南北之勢成楚子曰釋齊秦他國請相見也是戰國之萌也於次國風退秦於魏唐之後於序書系秦於周末於作春秋由韓原之後秦師無君大夫皆夫子所以深致意於秦而不使列於諸夏之國也自後戰於麻隧不書其帥次于棫林大書曰伐豫晉抑秦之意不待辨説而自見矣楚殺其大夫宜申此鬭宜申也但名之謀弒其君也討亂恆書人此謀弒其君則曷為稱國以殺楚人諱之以他罪告也自正月不雨至于秋七月及蘇子盟于女栗蘇子者天子大夫也孰及之公也曷為不言公諱與天子大夫盟也向也翟泉之盟諱公則王子虎稱人此其書蘇子何翟泉之盟伯者之事也為王室與晉侯諱之於是中國無伯天子大夫自出以盟諸侯若諸侯特相盟之為者其事無足諱也其不日所以别於及外大夫盟而不言公者也冬狄侵宋楚子蔡侯次于厥貉外次必有關於天下之故而後書此何以書晉靈公少不在諸侯楚欲圖北方會諸侯于息而次于厥貉故特書之以是為晉楚盛衰之機也陳氏傳曰外會未有言次者此其言次何以楚之圖諸侯而未集也晉雖不競君大夫數會而不序春秋重絶晉也會于息宋陳鄭嘗已從楚矣已而為新城之盟則楚猶未得志於陳鄭也於是會息不書書及蔡侯次厥貉用見楚之未得志於諸侯也於是陳侯鄭伯會楚子于息遂會蔡侯次于厥貉則其但書蔡侯何楚未足以得陳鄭也蔡遷于楚陳次之鄭介兩間當晉楚南北之勢未分則三國恆被其禍而未嘗無先後緩急之差也故諸侯之反覆乎晉楚之間者春秋必有察焉以新城之盟陳侯鄭伯皆在而靈城之際鄭每重於叛晉則會于息非其意也非其意而與蔡侯列數之則溢罰矣故息會不書至辰陵而後書則晉楚南北之勢決矣十有一年春楚子伐麇麇音君楚初書君將也其書君將何以中國無伯也當中國有伯則正其名以信攘郤之義及中國無伯則著其實以明荆楚之強此春秋之旨也夏叔仲彭生會晉郤缺于承筐謀諸侯之從楚者也秋曹伯來朝公子遂如宋狄侵齊冬十月甲午叔孫得臣敗狄于鹹十有二年春王正月郕伯來奔此郕太子朱儒也則其曰郕伯何逆以諸侯之禮也郕伯卒郕人立君太子朱儒以二邑來奔魯人喜於得地而矜其失國故以諸侯之禮逆之不名異成君也左氏傳曰不書地尊諸侯也陳氏傳曰此郕太子也魯逆以諸侯之禮吾從而志之無改焉何也唯其如二君也廢立之際足以亂名實則春秋不可以弗辨苟無亂於名實則春秋不辨也春秋之作别嫌明微而已有不待辨而自見春秋何治焉郕太子朱儒魯謂郕伯晉太子州蒲魯謂之晉侯從而志之徒見其悖禮焉耳故凡辭從主人則非修春秋之辭也把伯來朝二月庚子子叔姬卒其稱子何周人字積叔故或加子以自異也此把叔姬也何以不言把左氏傳曰絶也把桓公來朝請絶叔姬而無絶昏公許之內女為大夫出言來歸此何以不言來歸以歸寧來也曷為不言歸寧內女歸寧恆不書也內女來歸不卒據齊叔姬郯伯姬不卒蓋不以禮成其喪此其卒之何嘗為君夫人矣雖見出猶以姑姊妹之禮成其喪也不書葬同於在室也夏楚人圍巢秋滕子來朝秦伯使術來聘冬十有二月戊午晉人秦人戰于河曲陳氏傳曰此秦伯晉趙盾也曷為稱人亟戰也於是范山言於楚子曰晉君少不在諸侯北方可圖也而秦晉亟戰秦晉亟戰而楚君將稱君矣是故戰必言及而不言及曰晉人秦人戰于河曲略之辭也榖梁傳曰不言及秦晉之戰已亟故略之季孫行父帥師城諸及鄆穀梁傳曰稱帥師言有難也孫明復曰畏莒故也張洽氏曰莒魯之爭始於此胡邦衡曰春秋城築二十九言帥師者三非惟勞民以城又毒衆以爭也十有三年春王正月夏五月壬午陳侯朔卒邾子蘧蒢卒音渠除自正月不雨至于秋七月大室屋壞榖梁傳曰大室屋壞有壞道也譏不修也大室猶世室也周公曰大廟伯禽曰大室羣公曰宫禮宗廟之事君親割夫人親舂敬之至也為社稷之主而先君之廟壞極稱之志不敬也髙抑崇曰世室者人君之所常有事者也公每月朝之有司以時黝堊之豈有將壞而不知者則其不知省也久矣冬公如晉衛侯會公于沓狄侵衛十有二月己丑公及晉侯盟公還自晉鄭伯會公于棐二音匪吠鄭地十有四年春王正月公至自晉凡公如而至不月此至以四時首月故書之邾人伐我南鄙叔彭生帥師伐邾夏五月乙亥齊侯潘卒六月公會宋公陳侯衛侯鄭伯許男曹伯晉趙盾癸酉同盟于新城陳氏傳曰向也扈之盟不序諸侯此其復序何諸夏之志也晉侯救江無功救鄭無功與秦亟戰而楚浸強交聘乎中國得蔡次厥貉矣而晉遂不競於是公朝晉衛侯來會公還自晉鄭伯來會諸夏之懼甚矣汲汲於晉而為此盟如之何勿序也以諸夏之汲汲於晉也而徒以趙盾主是盟書曰同盟自幽以來未之有也秋七月有星孛入于北斗穀梁傳曰孛之為言猶茀也其曰入于北斗斗有環域也孫明復曰孛彗之屬偏指曰彗光芒四出曰孛公至自會晉人納捷災于邾弗克納災側其反穀梁傳曰其曰人微之也何為微之長轂五伯乘過宋鄭滕薛敻入千乘之國欲變人之主至其城下然後知之何知之晚也未伐而曰弗克何也弗克其義也捷災晉出也貜且齊出也貜且正也捷災不正也陳氏傳曰此趙盾也曷為稱人以晉為不競也楚方交聘于上國得蔡次厥貉矣而晉區區納亡公子於邾又以少陵長見辭於邾人自敗于令狐盟于扈救鄭戰河曲趙盾皆不書由是訖靈公之篇兵車之會自參以上皆人之趙盾為之也十七年伐宋宣二年侵鄭九月甲申公孫敖卒于齊穀梁傳曰奔大夫不言卒而言卒何也為受其喪不可不卒也其地於外也卒于外則公未嘗臨其喪其日何敖已絶卿位惠叔毁請于朝感于赦父恩實過隆故書其日齊公子商人弒其君舍舍未踰年其曰君何也正君臣之名以定篡弒之罪也記曰君薨太子號稱子待猶君也是故未踰年不曰君緣孝子之心而為之號也弒未踰年君稱君緣臣民之義以正其名也嗣子繼世以為先君主後社稷宗廟之所繫而存也其曰不成君者豈臣子之所得言哉其不日則以未踰年也孫明復曰弒未踰年君稱君嫌與成君異也宋子哀來奔奔大夫恆名之此其不名何以别於有罪而見出於其君者也冬單伯如齊單音善左氏傳曰襄仲使告于王請以王寵求昭姬于齊冬單伯如齊請子叔姬齊人執單伯陳氏傳曰春秋書周大夫如吾大夫然內之也伯者作天下不知有王久矣於是魯之請昭姬晉之命隨會猶假寵於王室而文宣之際王卿士數有事于四方救江之役黑壤之盟王叔桓公在焉蓋汲於晉葬僖公錫文公命賵含成風王季子來聘尤汲於魯也而齊人執單伯以天子之使而見執於齊商人諸侯莫為之變焉則王室益不競矣以天子之使而見執春秋所甚懼也齊人執子叔姬十有五年春季孫行父如晉為單伯與子叔姬故也三月宋司馬華孫來盟來盟未有稱官者此華耦也曷為以官稱不稱官則無以見其代公子卬也其不稱使且不名何非君命也向也書齊髙子來盟猶曰我無君也使非我無君也而不稱使且不名則非其君命也非其君命而來盟於我必有異志於其君者矣宋昭公立不勝羣公子之逼又不寧於其大夫以及君祖母公子鮑禮於國人饋飴其老者而賑其飢日遊於六卿之門而交其材士國人謂君無道謂鮑為賢因襄夫人以殺其大夫公子之忠於君者而盡以鮑之黨為卿是故華耦為司馬華元為右師華元司寇華禦事之子也而為右師蓋鮑與夫人所進以成其事者也於是使華孫來盟於魯明年宋人弒其君晉衛陳鄭伐宋討弒君者而魯不與則昭公之弒皆華氏之族為之也書曰宋人殺其大夫宋人殺其大夫司馬宋司城來奔宋司馬華孫來盟宋人弒其君杵臼則獄有所歸矣亂臣賊子無所遁其情矣故來盟恆不月據來盟九四皆不月於是特書月以異之夏曹伯來盟齊人歸公孫敖之喪大夫喪還不致據仲遂公孫嬰齊此奔大夫也則何以志有君命也歸則何以不言來無專使也齊人為孟氏謀飾棺置諸堂阜惠叔取而殯之則無專使可知矣其曰齊人歸之何見其所以歸也䇿書之大體存而世卿之失見矣吕居仁曰敖雖廢命奔莒而其子猶繼立於朝則大夫之汰甚矣以其子之汰請其父之喪雖欲勿許得乎於是以見大夫之專也六月辛丑朔日有食之鼓用牲于社單伯至自齊陳氏傳曰吾大夫不致必見報而後致春秋書周大夫如吾大夫然故至單伯也晉郤缺帥師伐蔡戊申入蔡入不言伐而言伐晉有辭也踐土翟泉之役蔡無不在焉厥貉之次會楚者三國而經獨書蔡於是新城之盟不致則蔡之罪宜討其日謹之也外入國雖君將不日苟伯者有討於諸侯雖大夫將日據此及襄二十五年鄭公孫舍之入陳皆日晉雖不競而諸侯叛夏盟者終不可以無討也秋齊人侵我西鄙季孫行父如晉冬十有一月諸侯盟于扈新城嘗序諸侯矣於是蔡始服而晉侯宋公衛侯蔡侯陳侯鄭伯許男曹伯盟以謀伐齊則曷為不序晉終不足與有為也齊商人弒其君執天子之使三綱絶矣又將間晉以絀魯而晉不能討由是并失齊魯雖得蔡無能為也故終靈公之篇凡合諸侯皆不序而頃王崩葬復不書自有伯以來中國之勢又一變也春秋豫晉以伯者以其能率諸侯尊王室也以齊商人弒其君執天子之使而諸侯不為之變中國無伯則王室愈卑雖弔葬猶不弔葬也十有二月齊人來歸子叔姬其曰齊人來歸何既有其本必録其末以叔姬嘗見止故著其見釋也其月何非罪出也據宣十六郯伯姬不月然則子叔姬始歸于齊何以不書以其卒見絶於齊故略之略之所以異之也齊侯侵我西鄙遂伐曹入其郛陳氏傳曰一役而再有事不悉書也苟悉書也則以遂言之兵事言遂必天下之大故也此其言遂何齊始敗夏盟也晉文公卒襄公能合諸侯靈雖不競而新城之盟諸夏汲汲焉固結之則猶有屬也而齊獨為亂階執天子之使加兵於魯於是伐曹晉遂不競而諸侯二故悉書之也左氏傳曰謂諸侯不能也是故入郛皆不書於齊特書之十有六年春季孫行父會齊侯于陽榖齊侯弗及盟及齊平也夏五月公四不視朔四不視朔者自二月至五月此不視其朔政也諸侯非有疾無不視朔者有疾而不視朔無以議為也計十二公豈無以疾不視朔者經皆不書此何以書以公之絀於齊也陽榖之會公稱疾不行齊侯不與季孫盟曰請俟君間故公比不視朔以實其言得請而後復初則公非有疾也絀於齊也六月戊辰公子遂及齊侯盟于郪丘二音西郪齊地特相盟雖大夫稱及內為志也春秋書大夫盟諸侯皆惡其伉吾君及外大夫盟則不言公而日不言公以示義則日以見實也吾大夫及諸侯盟則稱君而不月不月以示義則稱君以見實也吾大夫盟諸侯而日者異之也哀二年及邾子盟于拔不然則夷狄之君也此齊侯也而與夷狄之君同日惡其瀆貨以要盟故異之也秋八月辛未夫人薑氏薨毁泉臺臺而曰毁壞而除之也榖梁傳曰喪不二事二事緩喪也以文為多失道也自古為之今毁之不如勿處而已矣孫明復曰惡勞民也築之勞毁之勞既築之而又毁之可謂勞矣劉侍讀曰以為祥而毁之非明民之道也楚人秦人巴人滅庸夷狄滅國恆不月也冬十有一月宋人弒其君杵臼弒君者曷或稱名氏或稱國或稱人或稱閽或稱卒以賊赴者稱名氏微者稱人閽曰閽盜日盜不以賊赴者稱國以卒赴曰卒以賊赴者獄有所歸也弒君天下之大惡也而獄有所歸是國猶有臣子也不以賊赴有獄無所歸也弒君天下之大惡也而獄無所歸則有受其惡者矣吾魯史也他國之獄何知焉從而書之辟不敏也春秋為亂臣賊子而作於是宋人殺其大夫而弒其君魯與聞乎故者也而以微者書則亂臣賊子何懼焉故正之曰宋人殺其大夫宋人殺其大夫司馬宋司城來奔宋子哀來奔宋司馬華孫來盟宋人弒其君杵臼則獄有所歸矣稱人非微者矣其不日據十八年齊人弒其君日所以别其非微者矣十有七年春晉人衛人陳人鄭人伐宋大夫稱人失討賊之義也左氏傳曰晉荀林父衛孔達陳公孫寧鄭石楚伐宋討曰何故弒君猶立文公而還卿不書失其所也夏四月癸亥葬我小君聲薑齊侯伐我西鄙六月癸未公及齊侯盟于榖諸侯會于扈宋及晉平宋文公受盟于晉晉侯遂會諸侯于扈以定其位鄭穆公曰晉不足與也遂受盟于楚書曰諸侯無伯之辭也秋公至自榖公會諸侯不致據僖以前公與諸侯盟會皆不書至此何以致始會晉而事齊也盟于榖而後魯知有齊而已不致以為恆則致之以見義也冬公子遂如齊十有八年春王二月丁丑公薨于臺下榖梁傳曰臺下非正也秦伯罃卒罃音鶯夏五月戊戌齊人弒其君商人六月癸酉葬我君文公秋公子遂叔孫得臣如齊使舉上客而不稱介此其列數之何以二事行也惡與視皆齊出也仲遂將殺惡與視而立宣公恐齊人不從故托二事偕叔孫以請于齊也季孫行父曰使我殺適立庶者仲也故告立于齊請會于齊皆季孫専之葉少藴曰自僖以來三桓子孫浸強遂視三家為最親如齊如晉如楚伐把伐邾皆遂為之魯之政盡在遂矣文公立而遂益專叔孫季孫雖進而未能與之抗也於是得臣行父皆與聞乎故其所由來者漸矣冬十月子卒既葬未踰年曰子弒而曰卒諱之也孫明復曰未踰年故不日以别之夫人薑氏歸于齊子弒故母出左氏傳曰大歸也家鉉翁氏曰齊人弒舍而歸叔姬于魯魯人弒赤而歸出薑于齊弒君出母內外一轍上無天子下無方伯莫能討也季孫行父如齊許翰氏曰前乎子卒如齊後乎子卒如齊齊與聞乎故也莒弒其君庶其弒其君者太子僕也曷為不書僕弒僕見黜而因國以弒其君以其寶玉來奔故不以賊赴也其不日以别於富國大臣之弒君而稱國者也據晉弒其君州蒲書日春秋集傳卷七
