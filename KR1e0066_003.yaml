body:
  text: 春秋集傳卷三元趙汸撰莊公元年春王正月榖梁傳曰繼弒君不言即位正也先君不以其道終則子不忍即位也三月夫人孫于齊孫音遜夫人何以不稱薑氏蒙上文也春秋一事而再見者蒙上文夫人與弒公而史不著其罪於是始還于魯據傳言文薑出史記亦言夫人因留齊不敢歸而父兄百官衆怒羣誚責以桓公見弒之由期嵗留齊之故而孫于齊故變其恆辭蒙上文以見義也曰公與夫人薑氏如齊公薨于齊公之喪至自齊夫人孫于齊夫人與弒之罪不可掩矣夫人還則何以不致據出薑書至絶之也夫人與弒公不可入於宗廟左氏傳曰絶不為親禮也是故孫復還不致終其身有踰竟之事皆不致也然則子可以絶母乎國君之行與匹夫異有明天子則齊侯與魯不並立於天下而夫人不得入於宗廟夫人不得入於宗廟則其子將不得為社稷宗廟主故絶夫人者所以全莊公也趙伯循曰檀弓曰不為伋也妻者是不為白也母薑氏有與弒之嫌子不得以為母臣不得以為君劉侍讀曰宋襄之母獲罪於君歸其父母之國及襄公即位欲一見之而義不可得作河廣之詩以自悲母子至親而不得不絶者義也張主一曰文薑之罪上通於天絶之所以尊社稷而重本也公羊傳曰內諱奔謂之孫猶遁也公大夫奔日例此月者有罪也夏單伯逆王姬單音善單伯者天子之大夫也曷為書之如吾大夫內辭也陳氏傳曰惟王人則以內辭書之書會書至書卒十四年單伯會伐宋文十四自齊文三年王子虎卒定四年劉卷卒一如吾大夫內之也其言逆王姬何公羊傳曰使我主之也天子嫁女于諸侯必使諸侯同姓者主之諸侯嫁女于大夫必使大夫同姓者主之送王姬不書據齊桓共姫不書送此何以書以吾斬焉衰絰之中而使為讎人昏主故書之略恆以明變也榖梁傳曰君躬弒於齊使之主昏姻與齊為禮其義固不可受也杜元凱曰王姬不稱字尊王且别於內女也秋築王姬之館于外築王姬之館于外非禮也古者天子適諸侯必舍於其祖廟主王姬者亦將即廟以成禮焉館王姬於廟禮也於外非禮也齊魯方讎天子使魯主齊昏齊侯弒人君父又將親迎於人國都以禮接於其廟雖鳥獸其中豈無所忌哉於是要魯為築館於外而後親迎焉是齊侯意也曰在喪改築為禮之變者為之辭也王姬以夏至魯而秋方築館改築非禮明矣踰三時乃歸於齊以齊侯有忌於中而親迎之不時也冬十月乙亥陳侯林卒王使榮叔來錫桓公命錫命者䇿命之也來錫命非禮也其言桓公追命也王曷為不稱天異其事也桓公弒君而立天子不能討於是使魯為王姬主昏乃追命其先君以寵之是無人紀也於失禮之中又甚焉故王不稱天稱天則疑於錫命文公王姬歸于齊王姬歸于齊何以書據宋成夫人王姬不書歸公羊傳曰我主之也我主之則何以書存䇿書之大體也不月别內女也何休氏曰魯主女為父母道故恩録而書之不月者探人情以制恩也何以不書來逆親迎也榖梁傳曰親迎恆事也不志齊師遷紀郱鄑郚徙其民取其地曰遷以其師遷脅之也不書其地分背之非一處也公羊傳曰遷之者何取之也外取邑不書此何以書自是始滅也二年春王二月葬陳莊公夏公子慶父帥師伐於餘丘秋七月齊王姬卒王姬卒何以書據齊桓王姬不書卒陳氏傳曰以吾嘗為之服也然則禮與記曰齊告姬之喪魯莊公為之大功或曰猶魯嫁故為之服姊妹之服或曰外祖母也故為之服或之者疑之則禮未之有也禮未之有而以意起之施諸不共戴天之讎莊公不可為人子矣冬十有二月為下事月也據夫人會防不月著例夫人薑氏會齊侯于禚禚音灼齊地榖梁傳曰婦人既嫁不踰竟踰竟非正也婦人不言會言會非正也左氏傳曰書姦也髙抑崇曰莊公幼故夫人得托國事而出會也乙酉宋公馮卒馮音憑三年春王正月溺會齊師伐衛公羊傳曰溺者何吾大夫之未命者也孫明復曰朔在齊故溺會伐衛謀納朔也內大夫會伐不月此月者何休氏曰天子新立衛公子齊魯無憚天子之心而伐之明惡重於伐故月也榖梁傳曰會讎仇而伐同姓也夏四月葬宋莊公五月葬桓王七年乃葬也榖梁傳曰或曰郤尸以求諸侯舉天下而葬一人危不得葬也秋紀季以酅入于齊紀季者紀侯之弟也酅紀邑也榖梁傳曰入于齊者以酅事齊也公羊傳曰魯子曰請後五廟以存姑姊妹陳氏傳曰季以酅入齊紀侯意也齊自桓之始年挾鄭以圖紀黃之會魯為之求成不得免焉遷郱鄑郚紀之不絶也如線季以酅入齊紀於是乎始判是分國以與之也齊人之所欲者吾土地也分國以與之苟可以免紀者無不為也是紀侯意也冬公次于滑鄭地次者止舍之名無成事則書之左氏傳曰將會鄭伯紀故也鄭伯辭以難四年春王二月夫人薑氏享齊侯于祝丘魯地享食也享大牢以飲賔也古者兩君相見則設享禮于廟中髙抑崇曰禮姑姊妹已嫁而反兄弟不與同席而坐况用兩君相見之禮乎然亦為之名而已名為紀故而實乃行其私也張主一曰文薑之行魯人習之三十餘年卒至子般閔公荐弒而後止三月紀伯姬卒外夫人何以卒榖梁傳曰吾女也適諸侯則尊同以吾為之變卒之也何休氏曰天子諸侯絶期大夫絶緦天子惟女之適二王後者諸侯惟女之為諸侯夫人者恩得申故卒之內女卒日此何以不日國將亡禮不備也夏齊侯陳侯鄭伯遇于垂外相遇何以書為紀侯去國言故也次于滑公將謀紀于鄭而鄭伯不至於是鄭伯特要陳侯遇齊侯請存紀之社稷使紀侯得脫身而去之故垂之遇鄭伯為之也陳氏傳曰自參以上非邦交之舊矣紀侯大去其國此奔也曷為不言奔修春秋之特筆也諸侯失國恆書奔位未絶也苟被兵而出則不書譏不在奔也必國滅而奔然後書以不死社稷也齊之圖紀久矣紀侯知必不得免委而去之近智以國委季不殘其民近仁五廟有奉可以毋死近義如是而與奔君同辭則溢罰矣故書曰去其國而所托之國不書凡諸侯之托於諸侯以其國可圗興復也苟志不在復歸力不足以為援則不書可也陳氏傳曰不書者不以奔罪加紀侯也其不以奔罪加紀侯何罪齊也黃之會魯為之求成不得免焉遷郱鄑郚紀之不絶如線也紀季以酅入齊猶不得免焉則有去而已矣失國如紀侯庶幾有辭焉故不以奔罪加紀侯也程子曰大名也吳先生曰紀侯去其國而紀遂亡故名之六月乙丑齊侯葬紀伯姬外夫人葬不日據葬宋共姬此何以日異其事國亡而葬於仇人故異之以不日為恆則日為變也陳氏傳曰內女不葬必有故也而後書葬伯姬在殯齊人取其國而葬伯姬於是特書葬不以往會也是故苟宜書葬雖不往會書之陳哀公在殯楚師滅陳輿嬖袁克葬之書曰葬陳哀公苟不宜書雖往會不書楚葬康王襄公及陳侯鄭伯許男送葬至於西門之外不書皆魯史之變例也秋七月冬公及齊人狩于禚榖梁傳曰齊人者齊侯也其曰人何也不復讎而怨不釋刺釋怨也公羊傳曰公曷為與微者狩齊侯也齊侯則稱人何諱與讎狩也讎者無時焉可與通薛士隆曰齊人則何以知其為齊君狩逰田之事也遊田微者則君曷為與之會君會之非微者也五年春王正月夏夫人薑氏如齊師髙抑崇曰不言地者次止無常也秋郳犂來來朝榖梁傳曰郳國也犂來微國之君未爵命者也冬公會齊人宋人陳人蔡人伐衛是齊侯宋公也本榖梁傳其曰人何也公與仇人接春秋終諱之其人宋公何也以其人齊侯不可不人宋公也公羊傳曰此伐衛何納朔也榖梁傳曰逆天王之命也陳氏傳曰其不言納何據頓子北燕伯以朔入為重也入不書納是故伐鄭納突伐衛納朔書入而已矣六年春王正月王人子突救衛此微者也曷為稱人又稱字修春秋之特筆也王人曷為救衛欲固黔牟而拒朔也衛侯朔有罪衛人出朔立黔牟有王命矣而五國伐衛以納朔春秋於王人救衛苟從其恆稱則正不正何以辨焉故王人不得稱字而特稱字以尊之明以正也凡救不月雖吾君會伯主救與國不月成七年救鄭襄五年救陳於是特書月謹其事也榖梁傳曰善救衛也救者善則伐者不正矣孔頴逹曰稱人從其班稱字有為也惡諸侯逆王命故尊王人而稱字以責諸侯也陳氏傳曰救衛無功而後王命益不行於天下隱桓之諸侯會盟侵伐徒以定篡弒也衛州吁之亂會者五國宋督之亂會者四國袲之會伐鄭以立突於是伐衛以立朔也以王人將而救衛救衛而克則是天子猶得廢置諸侯矣天子猶得廢置諸侯春秋可以無作而朔終以自立故曰救衛無功而後王命益不行於天下夏六月衛侯朔入于衛榖梁傳曰入者內弗受也何用弗受也為以王命絶之也秋公至自伐衛公會外大夫伐不致據莊二十六年會伐徐此何以致非大夫也人諸侯以示義則致公以見實也螟冬齊人來歸衛俘孫明復曰此衛寶也言齊人歸之者齊主兵伐衛故衛寶先入于齊也胡侍講曰商書俘厥寶玉左氏傳曰文薑請之也七年春夫人薑氏會齊侯于防魯地夏四月辛卯夜恆星不見夜中星隕如雨榖梁傳曰恆星者經星也左氏傳曰恆星不見夜明也公羊傳曰列星不見則何以知夜之中星反也如雨者非雨也非雨則曷為謂之如雨不修春秋曰雨星不及地尺而復君子修之曰星隕如雨記異也吳先生曰恆星為有名之經星星謂無名之衆星恆星不見者夜明如晝故也大星之恆見者不見則小星之無名者亦無也隕謂自天而隕沒於半空而不至地其所隕者星之光魄也如雨言衆多不可為數也小星之無名者隕則大星之恆見者自若也戴溪氏曰天者積氣所為日月星辰麗焉星隕之多氣消散也張主一曰蓋王運將終自此堯舜禹湯文武周公之紀綱法度掃滅盡矣秋大水榖梁傳曰髙下有水災曰大水無麥苗榖梁傳曰無麥苗麥苗同時也冬夫人薑氏會齊侯于榖齊地趙伯循曰薑氏齊侯之惡著矣亦所以病莊公也曰子可以制母乎夫死從子通乎其下況國君乎君人者人神之主風化之本也不能正家如正國何若莊公者哀痛以思父誠敬以事母威刑以督下車馬僕從莫不俟命夫人徒往乎夫人之往也則莊公威命不行誠敬之不至耳家鉉翁氏曰當是時莊公以童稚之年挾強齊之援臨制其臣民雖欲防間其母其道無繇矣張主一曰敝笱載驅録於齊風尚論其世與衛之鶉之奔奔牆有茨諸篇皆一時之事也魯衛先王之後而婦行放逸同播其惡於萬民夫子曰魯衛之政兄弟也蓋不特周公康叔之盛而其世衰俗末政之陵夷亦相似也其後慶父弒君亂國與衛滅同時詩春秋之旨蓋相為表裏也八年春王正月師次于郎以俟陳人蔡人此吾君將也據傳公子慶父請伐齊師何以稱師諱之也莊之會齊春秋終諱之於是將會齊圍郕故出入皆稱師變文以示義也次不言俟其言俟何俟人而人不至也俟者有會期也以千乘之君陳師出次以期乎人而不至是亦可以反其本矣甲午治兵治兵書不時也周官大司馬因秋獮治兵以教戰常事也史不書於是俟陳蔡而陳蔡不至歸而治兵以示武故書之夏師及齊師圍郕郕降于齊師秋師還曰師還何據師救齊不書還諱言公則不致也不致曷為猶書師還民為重也冬十有一月癸未齊無知弒其君諸兒無知公孫也不曰公孫未命也陳氏傳曰弒君者連稱管至父則其專罪無知何君弒而無知受之則賊不在二子矣春秋誅利心是故連稱管至父實弒齊襄無知與聞故者也而無知受之則無知為逆首公子棄疾實弒楚靈比與聞故者也而比受之則比為逆首苟以為利則萬乘之國弒其君者必千乘之家千乘之國弒其君者必百乘之家此孟子所以深探其本而遏亂原也九年春齊人殺無知陳氏傳曰無知嘗踰年則其曰齊人殺無知何是不成君之辭也何也州吁之弒衛人為之變不踰年卒討之今也無知之弒齊人亦為之變踰年卒討之是國有臣子也春秋之初王道猶未墜人心猶止於禮義也以齊襄之不道詩人屢致意焉冀幸一悟而長惡不已至於遇弒然不忘討賊之義故曰國猶有臣子也公及齊大夫盟于蔇蔇音器魯地大夫曷為不名稱大夫則不名也凡稱大夫皆不名名則不曰大夫必殺而後兼稱之公曷為與大夫盟左氏傳曰齊無君也榖梁傳曰大夫不名無君也盟納子糾也不月公榖無不月例但言不日今正之其盟渝也初襄公立無常鮑叔牙曰亂將作矣奉公子小白奔莒亂作管夷吾召忽奉公子糾來奔二公子在國皆有黨而小白有國髙以為內主有莒衛以為外主昭十三年傳文盟于蔇者子糾之黨來逆子糾也國髙已使人逆小白于莒而立之本齊世家既而伐齊我師敗績齊人殺子糾是盟無能為故不月以異之盟者有三日為詳不日為略則不月為異也夏伐齊納子糾內師加大國但言侵此其言伐何納所宜納也嗣君在喪曰子糾亡公子也曷為以在喪之號稱之修春秋之辭也禮立適以長立子以貴子以母貴也糾魯出也小白衛出也本史記魯出宜貴矣糾兄也小白弟也本荀子史記惟薄昭與淮南王書言桓公殺弟蓋有所避時文帝於淮南為兄糾貴而又為兄則糾宜立者也魯納之正也春秋之法納所宜納不書於是伐齊納糾徒以䇿書大體存則正不正何以辨焉是故正其在喪之稱明其宜立以别於外納不正而後書者此特筆之義也公羊傳曰其稱子何貴也其貴奈何宜為君者也陳氏傳曰成糾之為子也則糾宜立者也齊小白入于齊小白繫齊録外之辭也春秋外辭必繫國不繫國者一事而蒙上文也據納糾繫齊若公伐齊納子糾一事也齊小白入于齊又一事也二事則不得以後事蒙前事故更端而繫之齊也榖梁傳曰齊人殺無知而迎公子糾於魯公子小白不讓公子糾先入又殺之于魯故曰齊小白入于齊惡之也秋七月丁酉葬齊襄公齊人立小白而後葬也八月庚申及齊師戰于乾時我師敗績乾音干乾時齊地此公戰也曷為不言公一事而再見蒙上文也內師不言敗績據僖二十二年升陘此其言敗績何內不言敗績諱也齊無君公奉正以伐不正戰焉我師敗績非所諱也九月齊人取子糾殺之魯殺糾也則其曰齊人取子糾殺之何公羊傳曰內辭也脅我使我殺之也陳氏傳曰罪小白也魯受命於齊而殺子糾則其罪小白何春秋之法兩下相殺不書雖世子也苟未嗣位殺之亦不書襄公弒國人討無知糾自魯入小白自莒入未知其誰立也小白得國而使鮑叔帥師臨魯以殺糾則是以千乘之國殺其兄焉耳榖梁傳曰外不言取言取病內也取易辭也以千乘之魯而不能存子糾以公為病矣冬浚洙浚音峻公羊傳曰浚之者深之也曷為深之畏齊也十年春王正月公敗齊師于長勺魯地於是齊師伐我公及齊師戰齊師敗績則其但言敗之何略言之也春秋言戰不言伐義不繫於伐也僖十五年韓文二年彭衙之類苟亟戰則不言及通前役一譏之也文七年令狐十二年河曲齊既敗魯乾時即遣其大夫帥師臨魯脅殺子糾猶不釋于魯又乘其再克以伐之不已亟乎故略其主客恆辭但書敗齊師譏不在魯也內敗外師日據隱十年菅後十一年鄑略之則不日也二月公侵宋宋合於齊侵宋所以撓齊也內師加大國恆言侵何也惡其不度德量力而興戎搆亂故變其文以譏之也三月宋人遷宿榖梁傳曰遷亡辭也其不地宿不復見也遷者猶未失其國家以往者也公羊傳曰遷者其意也遷之者非其意也夏六月齊師宋師次于郎外次不書據襄元年晉侯衛侯次于戚之類必有關於天下之故而後書桓公既得國即圖伯宋既從次當服魯魯未服於是見伐春秋沒其伐我而郎之次特書之則有關於天下之故矣公敗宋師于乘丘乘去聲魯地公及宋戰矣據檀弓則其但言敗之何略言也桓公宿師于郎將以求成於魯也而魯以子糾故不客遽絀於齊桓公不能釋魯以為後圖而迫之已甚故略之但言宋師而不日譏不在魯也秋九月荆敗蔡師于莘以蔡侯獻舞歸荆者楚也其以號舉何無君臣之辭也荆本周子男之國則曷為無君臣惡其以淫名聞於天子不可通於諸侯故不與以君臣之稱也所以惡而外之也此戰也不言戰獲也不言獲修春秋之變文也國君生得曰獲死曰滅大夫生死皆曰獲春秋謹內外之辨故略其主客恆辭變獲言以歸不使與諸侯戰獲同文也不與諸侯戰獲同文不與蠻荆之獲中國也蔡侯何以名不復國也滕子嬰齊戎蠻子赤皆不復國者也春秋于虢桑田之敗晉采桑之敗皆不書此何以書曰敗中國也而後書春秋為安夏而作荆楚敗蔡師以蔡侯獻舞歸是天下之大變也是故書荆自此始而春秋以吳終焉聖人之所甚懼也冬十月齊師滅談談子奔莒齊方圖伯則其滅談何桓公不能以義屬諸侯也桓公欲合諸侯而再不得志於魯不思德之不修而患力之不足姑務廣其土以衆其民於是滅談又滅遂也邵子曰春秋功過不相掩五伯者功之首罪之魁也先定伯者之功罪而學春秋則大意立矣十有一年春王正月夏五月戊寅公敗宋師于鄑其日甚之也再敗之為已甚矣秋宋大水冬王姬歸于齊不書來逆親迎也左氏傳曰齊侯來逆共姬十有二年春王三月紀叔姬歸于酅酅音攜叔姬歸寧曷為不言來以歸見義也其言歸于酅何婦人謂嫁曰歸來寧而反國曰歸據隱十五年鄫季姬婦人從一之義也紀侯去國卒于外而叔姬歸于酅以待終得從一之義故書其歸也家鉉翁氏曰紀侯雖死於他國亦當附於酅廟以從其祖故叔姬歸于酅也夏四月秋八月甲午宋萬弒其君捷及其大夫仇牧萬宋大夫未賜族者榖梁傳曰萬宋之卑者也及其大夫仇牧以尊及卑也仇牧間也冬十月宋萬出奔陳大夫出奔不月此其月何佚賊也於是宋人請萬於陳以賂卒殺之不書蔽罪於陳也弒君之賊無所逃於天地之間者也其誰可受之天下有無君之國而後可也而陳人受之以為利陳為無君之國矣是故王人卒殺子朝於楚不書蔽罪於楚也十有三年春齊侯宋人陳人蔡人邾人會于北杏杏户猛反齊初主會也大夫不名尊齊侯也據襄八年邢丘傳例陳氏傳曰將豫齊以伯也自是無特相會者矣夏六月齊人滅遂秋七月冬公會齊侯盟于柯柯音哥始及齊平也不月據桓盟不月我無信也桓公所以汲汲於魯者非徒以釋怨求成也而公曷為與之盟公與之盟則將從桓公於盟會矣鄄之會宋陳衛鄭之君皆在而公不與幽之盟以微者行於是有西鄙之伐故不月以異之也公何以不致榖梁傳曰致君者殆其往而喜其反者也桓會不致安之也十有四年春齊人陳人曹人伐宋宋人背北杏之會也夏單伯會伐宋單伯周大夫也桓公所仗以圖諸侯者宋也閔公弒桓為北杏之會以平宋而宋首背之豈以桓非受命之伯故諸侯有未安其令者乎於是齊請師于天子以伐宋而單伯會之假王命以合諸侯也陳氏傳曰春秋之初王室猶甚威重也衛之定州吁也紀之求成於齊也皆欲假寵於王齊桓之興亦必請王師而後專伐自伯者之令行天下諸侯不復知有王矣秋七月荆入蔡蔡侯在楚而蔡人會齊侯于北杏荆所以入蔡也楚強甚矣而中國之勢未合蔡遂服從於楚自是終桓之世不與中國會盟冬單伯會齊侯宋公衛侯鄭伯于鄄鄄音絹其曰單伯會之何王人以內辭書也桓公請王師以伐宋宋既服遂假王命以長諸侯故單伯會諸侯于鄄初命齊以伯也十有五年春齊侯宋公陳侯衛侯鄭伯會于鄄其復會何單伯既還桓公始自以方伯之禮會諸侯也左氏傳曰春復會焉齊始伯也蓋春秋豫齊以伯於是始然是時魯未至鄭復叛諸侯之從齊未有能堅決者也則其豫之何諸侯無王久矣漢陽諸姬楚實盡之蔡既折而入楚鄭厲公失國亦自通於楚中國一日不可無伯矣諸侯知有伯之厲已而不圖天下之危亡諸侯之私也春秋撥亂世反之正莫先於攘夷狄安中國以為非桓公莫能任其事者故單伯會伐宋會諸侯于鄄既以䇿書大體存桓公有事諸侯悉書之天下之公也春秋存䇿書之大體則莊王僖王崩葬何以不書春秋之豫齊不徒以其名也豫之以其名者所以責其實也朝覲不歸獄訟不至以一人焉弔喪以一人焉送葬以為事天子之常東遷諸侯斯以為無王也桓公既伯令諸侯十二嵗一同盟三嵗而聘五嵗而朝此何禮也而其所以事天子者亦惟一人焉弔喪一人焉送葬以為常王室之賴於伯者如斯而已乎上無天子下無方伯桓公假天子之命以統諸侯而不率諸侯以事天子朝覲會同天子之事也桓公何為用之如是而春秋不為之變則春秋徒曰桓文而已矣莊王崩會于北杏之前年也僖王崩同盟于幽之次年也是王伯始終之際也春秋存䇿書之大體而二王崩葬不書以為東周之大變也此春秋所由作也夏夫人薑氏如齊以國事行也或曰求婦也秋宋人齊人邾人伐郳郳音霓宋故也齊伯矣曷為先宋大夫自以其班也鄭人侵宋背鄄之會也鄭厲公嘗自通於楚矣其入國也不告於楚而又不誠服於齊中立以觀釁也冬十月十有六年春王正月夏宋人齊人衛人伐鄭秋荆伐鄭楚與中國爭鄭於是始冬十有二月會齊侯宋公陳侯衛侯鄭伯許男滑伯滕子同盟于幽言會魯會之不書其人微者也齊先宋主會也則許男何以先滑伯公羊傳曰其序則王會為之蓋伯以其愛惡進退而易周班不惟此也曰同盟何伯者所以一諸侯之心也古者天子巡守諸侯會於方嶽之下則有盟桓公合諸侯以創伯故假會盟方嶽之義而稱同盟以一諸侯之心也左氏傳曰同盟于幽鄭成也自幽而後凡為諸侯之叛服而盟則稱同其不為諸侯叛服而盟者不稱同也葉少藴曰周官時見曰會殷見曰同時會以嚴四方之禁殷同以施天下之政若有征伐以討不庭則王命方伯連帥而諸侯從焉此之謂時會王十二嵗一巡守諸侯會於方嶽之下而受命王不巡守則合諸侯受命於王國此之謂殷同齊侯圖伯諸侯從之者衆故假殷同之禮而行之故再盟于幽歷十有二年陳氏傳曰諸侯初至盟也自是無特相盟者矣公羊傳曰桓之盟不日其會不致信之也邾子克卒邾儀父也杜元凱曰稱子者蓋齊桓請王命以為諸侯也十有七年春齊人執鄭詹詹鄭大夫未賜族者不稱行人使也桓公合諸侯同盟于幽將班政也而鄭於朝聘數有難焉者故齊人以伯令召其大夫而執之夏齊人殱于遂殱音尖榖梁傳曰殱者盡也然則何為不言遂人盡齊人也無遂之辭也許韓氏曰齊師滅談談子奔莒其君不絀也齊人滅遂齊人殱于遂其民不歸也孟子謂伯者以力服人非心服也力不贍也秋鄭詹自齊逃來外逃不書據宣十七年髙固襄十六年髙厚逃來何以書據來奔有不書以病齊也詹以大夫見執苟宜受命專之可也而踰三時終不服則伯國新令必有不即乎人心者矣齊知不能詘而緩之使逃蓋以力服人者力有時而窮也冬多麋糜音眉何休氏曰以多為異也十有八年春王三月日有食之不言日不言朔日與月差也公羊傳曰朔在後也何休氏曰謂晦日食夏公追戎于濟西戎不言來追不言弗及略之狄也據僖二十六年齊人侵我公追齊師弗及悉書秋有􅈮􅈮音或廣韻音域榖梁傳曰一有一亡曰有􅈮射人者也公羊傳曰記異也冬十月十有九年春王正月夏四月秋公子結媵陳人之婦于鄄遂及齊侯宋公盟媵音盈又剩媵者送女使從適也禮諸侯卿大夫取則同姓媵之鄄其從適之地也公羊傳曰媵不書為其有遂事書大夫無遂事此其言遂何大夫受命不受辭出竟有可以安社稷利國家者則專之可也何休氏曰鄄幽之會公比不至公子結出竟遭齊宋欲伐魯故矯君命而與之盟除國家之難也先書地後書盟者明出竟乃得專之也不月者據內大夫參盟諸侯月國家後背結之約非結不信也榖梁傳曰其曰陳人之婦略之也其不月公榖無不月例説在九年數渝惡之也夫人薑氏如莒冬齊人宋人陳人伐我西鄙此在鄄之師也公子結之盟齊侯為緩師而公不從故卒見伐也時王室亂衛侯朔叛王與燕人納子頽齊侯方伯也不能勤王而汲汲於服魯以不得魯則不敢失衛也齊侯見義不為而諸侯是急以是圗伯無惑乎糾合之難也二十年春王二月夫人薑氏如莒夏齊大災秋七月冬齊人伐戎二十有一年春王正月夏五月辛酉鄭伯突卒秋七月戊戌夫人薑氏薨冬十有二月葬鄭厲公二十有二年春王正月肆大眚肆放也謂赦宥也眚過也胡侍講曰肆大眚譏失刑也大眚皆肆則虧國典縱有罪虐無辜惡人幸以免矣癸丑葬我小君文薑陳人殺其公子御寇殺非大夫公子史不書據傳晉殺丕鄭及七輿大夫楚殺冝申之類以微者名氏不登於䇿也苟公子也以討亂殺之則不書本陳氏據莊十二年宋殺子遊文十四年楚殺子燮子儀成十年宋殺圍龜甚者殺世子母弟亦不書據僖十六年鄭殺子華文十八年宋殺母弟須以君父討子弟而當其罪雖專殺無以議為也必殺之非其罪也而後書御寇則何以書觀其書人以殺與討亂同文又公子完為御寇之黨而不書其奔則是以亂討而非其罪者也左氏謂御寇為陳太子蓋見絀於其君而國人得以非罪加之爾至若大夫則殺之雖當其罪猶以專殺書之榖梁傳曰言公子而不言大夫公子未命為大夫也其曰公子何也公子之重視大夫陳氏傳曰稱人討辭也據晉殺先都士縠箕鄭父陳殺公子過之類非殺有罪也而亦稱人猶曰衆人殺之云爾胡侍講曰國亂無政衆人擅殺而不出於其君也夏五月五月非時首何以書史為繫事書也春秋不書其事猶存其月者備一時也然不改為四月者明其文則史也秋七月丙申及齊髙傒盟于防公羊傳曰髙傒貴大夫曷為就吾微者盟公也曷為不言公諱與大夫盟也榖梁傳曰不言公髙傒伉也范寧氏曰書日則公盟也冬公如齊納幣莊公志不在於從伯而欲繼其世昏恥於朝齊而假他事以往非有公天下之心也亦以其私而已榖梁傳曰納幣大夫之事也公之親納幣非禮也杜元凱曰母喪未再期而圖昏也家鉉翁氏曰納幣者齊襄之女也其何以奉粢盛入先君之廟乎二十有二年春公至自齊終莊公之世僅三如齊皆致此誤明矣祭叔來聘祭叔者祭公之弟來聘為祭公使也何以不稱使王臣無外交禮之所不得言也陳氏傳曰聘未有不稱使者其不稱使何私相為好也自桓之中年王室無聘魯者於是祭叔私相為好也夏公如齊觀社公羊傳曰諸侯越竟觀社非禮也外傳曰莊公如齊觀社曹劌諫曰不可夫禮所以正民也齊棄太公之法而觀民於社君為是舉而往觀之非故業也何以訓民君舉必書書而不法後嗣何觀公不聽遂如齊榖梁傳曰以是為尸女也范寧氏曰主為女往以觀社為辭公至自齊荆人來聘荆稱人以來聘也不稱使荆未有君大夫也以其來接於我故稱人以成文以其未有君大夫故卒復其恆稱據二十八書荆伐鄭皆從史文也公及齊侯遇于榖蕭叔朝公蕭者宋之附庸叔其君之字也附庸之君大者稱字言朝公公在榖也不言來榖齊地也時齊侯在榖蕭君來朝伯主因得朝公也秋丹桓宫楹何休氏曰為將取齊女欲以誇大示之冬十有一月曹伯射姑卒十有二月甲寅公會齊侯盟于扈扈音户盟于防遇于榖矣其復盟于扈何也用見齊侯之汲汲於魯也齊侯恐公志在得妻而不在於從伯故盟于防而後許之納幣遇于榖而後許之請期盟于扈而後許之逆女齊侯於魯勤矣魯與齊鄰國而世為昏齊不得魯則諸侯不親自長勺乘丘以來齊侯知公不可以力服也故委曲調處十有餘年而卒致公於盟會桓公庶幾有伯者之度矣桓盟不日此其日何離盟非伯之事故異之以不日為恆則日為變也葉少藴曰桓公已伯矣復為離盟則非諸侯之政也以昏而固其好耳二十有四年春王三月刻桓宫桷桷音角榖梁傳曰禮天子之桷斫之礱之加密石焉諸侯之桷斫之礱之大夫斫之士斫本刻桷非正也夫人所以崇宗廟也取非禮而加之於宗廟以飾夫人非正也葬曹莊公夏公如齊逆女內逆女雖得禮必書存䇿書之大體也來逆女不書略外也春秋詳內以見實則略外以明義也秋公至自齊公以夫人至自齊則其曰公至何夫人不與公俱入也榖梁傳曰迎者行見諸舍見諸先至非正也八月丁丑夫人薑氏入公羊傳曰其言入何難也其難奈何夫人不僂不可使入與公有所約然後入何休氏曰約逺媵妾也杜元凱曰蓋以孟任故孫明復曰公親迎於齊不與夫人俱至失夫道也夫人不從公而入失婦道也婦人從夫者也戊寅大夫宗婦覿用幣覿徒歷反公羊傳曰宗婦者大夫之妻也覿者見也見用幣非禮也然則曷用棗栗云乎腵修云乎何休氏曰日者禮夫人至大夫皆郊迎明日大夫宗婦皆見故著其明日也宗婦者大夫為宗子者也張主一曰夫人至大夫見於廟宗婦見於內禮也並覿同贄失男女之别也大水冬戎侵曹春秋之初諸侯有戎難不書據傳隱九年北戎侵鄭桓六年北戎伐齊自中國有伯而後書中國有伯而戎敢為諸侯患則其責有所歸矣故由是而後凡諸侯有戎難悉書之曹羈出奔陳此踰年矣則其名之何嗣君失國恆稱名也赤歸于曹杜元凱曰為戎所納故曰歸胡侍講曰宋人執鄭祭仲而忽出突歸權在宋也戎侵曹而羈出赤歸制在戎也髙抑崇曰戎制諸侯廢置人君亦以病齊桓也郭公文闕也二十有五年春陳侯使女叔來聘榖梁傳曰其不名何也天子之命大夫也陳氏傳曰諸侯初交聘也前乎此非王室若姻鄰無聘魯者自女叔之後諸侯之會數而朝聘皆之乎盟主是故吾大夫如齊自僖之初年始春秋之初吾君大夫適他邦必有故也有故而後行猶私相為好而非定制也王室衰諸侯私相為好而非定制是謂亂初生也由僖而下朝聘皆之乎盟主天王狩于河陽公朝于王所天王使宰周公來聘公子遂如京師遂如晉吾未知其所終矣春秋所以作也夏五月癸丑衛侯朔卒六月辛未朔日有食之鼓用牲于社左氏傳曰非禮也日有食之天子不舉伐鼓于社諸侯用幣于社伐鼓于朝吕大圭氏曰日食隂勝陽社隂之神也天子尊故責神諸侯卑自責而已胡侍講曰禮諸侯旅見天子入門不得終禮者四而日食與焉古者固以是為大變然不鼓于朝而鼓于社又用牲則非禮矣伯姬歸于杞秋大水鼓用牲于社于門左氏傳曰亦非禮也凡天災有幣無牲非日月之眚不鼓杜元凱曰門國門也孔頴逹氏曰鼓與牲二事皆失故書之冬公子友如陳報女叔之聘也凡內出朝聘皆曰如始行則書之未成禮之辭也二十有六年春公伐戎夏公至自伐戎內特侵伐不致其致伐戎何豫公以伐戎之義也內侵伐非修怨則為暴而已戎嘗渝盟侵我至於濟西公追之弗及至是乃伐之異乎修怨之師矣曹殺其大夫殺大夫何以不名殺之者非其君也凡殺大夫恆名之君臣之辭也苟非其君殺之則不名所以别於大夫之見殺於其君者也陳氏傳曰莊公卒有戎難羈出奔陳赤於是篡曹而殺其大夫則必不義其君者也秋公會宋人齊人伐徐齊令也魯之從伯於是始冬十有二月癸亥朔日有食之二十有七年春公會杞伯姬于洮洮音陶伯姬莊公女也洮魯地也伯姬何以會於洮為杞伯之將來朝也杞侯嘗朝桓矣魯人以為不敬而入杞杞伯既昏於魯將來朝而以伯姬先之虞不敬也莊公甚愛其女為出會於洮蓋貶爵之義於是始左氏傳曰非事也天子非展義不巡守諸侯非民事不舉卿非君命不越竟陳氏傳曰內女為夫人凡八見於經未有書公會者而會自姬始由是來朝其子由是來求婦伯姬之為皆未之前聞也陸淳氏曰公及杞侯伯姬皆失正也參議之夏六月公會齊侯宋公陳侯鄭伯同盟于幽左氏傳曰陳鄭服也杜元凱曰陳亂而鄭獲成於楚皆有二心於齊今始服也榖梁傳曰桓盟不日信之也信其信仁其仁衣裳之會十有一未嘗有歃血之盟也信厚也兵車之會四未嘗有大戰也愛民也秋公子友如陳葬原仲原仲陳大夫禮臣既卒不名外大夫不葬此何以葬公羊傳曰通乎季友之私行也左氏傳曰非禮也原仲季友之舊也大夫以事行者言其事事不得書但言如此非國事也則其言葬原仲何陳魯之好由二臣始故諸侯於公而往葬之蓋衰世之志也冬杞伯姬來歸寧也歸寧不書據杞叔姬鄫季姬來寧不書此何以書譏以婦人與國事也婦人無外事故內不言出春公會杞伯姬于洮冬杞伯姬來杞伯來朝為國不以禮而使婦人往來其間非歸寧之義矣季姬及鄫子遇于防使鄫子來朝僖十四年杞子來朝公子遂入杞杞伯姬來僖二十七年二十八年大不字小而薄其舅甥之恩蓋有自來矣莒慶來逆叔姬卿自逆也公自主之非禮也榖梁傳曰諸侯之嫁女於大夫主大夫以與之來者接內也劉侍讀曰內女雖親體不敵不書於䇿所以尊君也叔姬非適諸侯何以書以公之自主之公自主之則敵敵則書矣杞伯姬來朝公會齊侯于城濮二十有八年春王三月甲寅齊人伐衛衛人及齊人戰衛人敗績戰不言伐而言伐伐不言日而言日謹王命也於是王使召伯廖賜齊侯命且請伐衛以其立子頺也齊侯方伯也以天子之命命方伯討有罪自東遷以來於是始見之故取戰之日加於戰之上以謹之也此齊侯也其稱人何桓公不以王命討罪也衛侯朔叛天子納子頺其身雖已死而天討不可以終廢也本程子而齊侯戰敗衛師取賂而還以天子之命命方伯伐衛不能正其罪而苟焉以自私桓公為不職矣故雖齊侯自將而奪其恆稱以罪桓也陳氏傳曰東遷之後諸侯始放春秋之治在諸侯而大夫不與北杏之後盟主始專春秋之治在盟主而諸侯不與此君將稱人之義也戰必言其地其不地何略之也以衛人敢於敵王命不得與諸侯交戰者同文也敗者稱師衛何以稱人榖梁傳曰以其人齊不可不人衛也曰不可不人衛者不以齊侯廢命而釋衛之罪也趙伯循曰罪衛之不服王命故異其辭也夏四月丁未邾子瑣卒秋荆伐鄭公會齊人宋人救鄭齊令也於是楚令尹子元以車六百乘伐鄭則救鄭之役曷為獨使吾君親之公嘗敗齊師于長勺于乘丘于鄑獲南宫長萬齊侯以為吾君能師者也故伐徐救鄭皆請公自將以為功而齊人宋人屬焉桓公可謂善用諸侯者矣冬築郿公梁作微郿魯下邑大無麥禾胡侍講曰大無者倉廩皆竭之辭也臧孫辰告糴于齊榖梁傳曰國無九年之畜曰不足無六年之畜曰急無三年之畜曰國非其國也古者稅什一豐年補敗不外求而上下皆足也雖凶年民弗病也一年不艾而百姓飢君子非之何休氏曰古者三年耕必有一年之儲九年耕必有三年之積雖遇凶災民不飢乏莊公享國二十八年而無一年之畜也二十九年春新延廏廏音究公羊傳曰新延廏修舊也凶年不修榖梁傳曰延廏者法廏也其言新有故也有故則曷為書之古之君民者必時視民之所勤民勤於力則功築罕民勤於財則貢賦少民勤於食則百事廢矣冬築郿春新延廏以其用民力為已悉矣夏鄭人侵許齊令也秋有蜚音扶味反公羊傳曰記異也冬十有二月紀叔姬卒內女卒日此何以不日降於夫人也非夫人何以書以恩録也國亡君死叔姬待盡於酅正也魯人弔其喪會之葬禮也明臣妾之道叔姬不以國亡而虧婦行推親親之義魯人不以紀滅而薄姑姊妹之恩見人道始終之為重也䇿書之大體存而得失著矣城諸及防魯邑三十年春王正月夏次于成齊令也秋七月齊人降鄣榖梁傳曰降下也鄣紀之遺邑也趙伯循曰降服而為附庸也八月癸亥葬紀叔姬九月而後克葬也內女為夫人葬不日此非夫人也則其日葬何異其事也公羊傳曰其國亡矣徒葬乎叔爾九月庚午朔日有食之鼓用牲于社冬公及齊侯遇于魯濟左氏傳曰謀山戎也以其病燕故也齊人伐山戎三十有一年春築臺于郎劉侍讀曰譏厲民也去國而築臺是樂而已矣夏四月薛伯卒築臺于薛六月齊侯來獻戎捷齊侯已伯矣曷為親來獻捷與公為好也齊侯圖諸侯首得宋而宋背盟次得陳鄭而陳鄭二會于鄄而宋成同盟于幽而陳鄭以服諸侯之從齊者猶未足恃也莊公之事齊也後而從伯也專桓公所賴以服諸侯而成伯功者莫親於魯矣是故伐徐救鄭既皆請公主兵會城濮而伐衛遇魯濟而伐山戎又皆即謀於我於是又假獻捷躬至魯庭以堅兩君之好焉桓公知以力服人者有時而窮故不難於以身下諸侯也其月異事也據諸侯來奔喪會葬不月左氏傳曰非禮也凡諸侯有四夷之功則獻于王王以警于夷中國則否諸侯不相遺俘秋築臺于秦魯地榖梁傳曰魯外無諸侯之變內無國事一年罷民三時惡內也或曰倚諸桓也冬不雨三十有二年春城小榖夏宋公齊侯遇于梁丘外相遇不書書梁丘何以齊侯之緩於伐楚也左氏傳曰齊為楚伐鄭故請會于諸侯宋公請先見于齊侯夏遇于梁丘於是又七年而始合諸侯伐楚梁丘之遇為之也榖梁傳曰梁丘在曹邾之間去齊八百里張主一曰齊侯不以伯主自居以梁丘近宋而先之也汪仲裕曰盟會征伐先齊侯尊伯主也遇者草次之期莫適為主故序爵也秋七月癸巳公子牙卒此殺也何以書卒從史文也春秋之變文必有辨於名實者也苟無亂於名實春秋奚辨焉於是公疾叔牙欲立慶父季友使針季以君命鴆之立叔孫氏有司國人不與也而以討辭書之亂名實矣牙卒時公有疾未嘗臨喪則其書日何勢不得臨非恤典薄也公羊傳曰公子牙殺則曷為不言刺為季子諱殺也季子之遏惡也不以為國獄緣季子之心而為之諱然則善之與曰然殺世子母弟直稱君者甚之也季子殺母兄何善爾誅不得辟兄君臣之義也然則曷為不直誅而鴆之行誅乎兄隱而逃之使若以疾死然親親之道也陳氏傳曰牙書卒喪以大夫之禮也牙將與慶父夫人為亂雖鴆之而立叔孫氏使若死於位然是喪以大夫之禮也緣君臣之義不得私其親緣親親之恩不與國人慮兄弟也立叔孫氏使之若死於位則淫人何與焉史著其迹春秋察其心後世有考焉矣八月癸亥公薨于路寢榖梁傳曰路寢正寢也寢疾居正寢正也男子不絶于婦人之手以齊終也啖叔佐曰凡公薨必書其所詳內事重凶變也冬十月己未子般卒子般即位慶父使圉人犖賊子般于黨氏則其書卒何內大惡恆諱之也公羊傳曰子卒云子卒其稱子般卒何君存稱世子君薨稱子某既葬稱子踰年稱公子般卒何以不書葬未踰年之君也何休氏曰緣民臣之心不可一日無君故稱子某明繼父也名者尸柩尚存猶以君前臣名也既葬不名無所屈也緣始終之義一年不二君故稱子也踰年稱公不可曠年無君也稱卒不地者降成君也公子慶父如齊於是季友出奔陳故慶父如齊請立閔公以説於齊也左氏傳曰閔公哀薑之娣叔薑之子也故齊人立之張主一曰慶父弒君之賊也齊桓聽其來復使之歸以遺魯禍失方伯之職也狄伐邢許翰氏曰春秋戎先見荆次之狄次之而荆暴於戎狄又暴於荆戎狄荆楚交侵中夏使無齊桓攘定之豈復有中國哉春秋集傳卷三
