body:
  text: 春秋集傳卷十三元趙汸撰昭公下十有六年春齊侯伐徐齊復二於晉也左氏傳曰齊師至于蒲隧徐人行成徐子及莒人郯人會齊侯盟于蒲隧叔孫昭子曰諸侯之無伯害哉齊君之無道也興師而伐逺方會之有成而還無伯也夫盟不書不足書也書伐徐則齊之二於晉可知矣楚子誘戎蠻子殺之誘蔡侯殺之名虔誘戎蠻子殺之不名棄疾者以詐相誘相殺彼俗之常耳不名著其常也以其為行彼此一也君子不疾也若不疾乃疾也夏公至自晉秋八月己亥晉侯夷卒九月大雩季孫意如如晉冬十月葬晉昭公十有七年春小邾子來朝夏六月甲戌朔日有食之秋郯子來朝八月晉荀吳帥師滅陸渾之戎冬月有星孛于大辰胡侍講曰大辰心也心為明堂天子之象其前星太子後星庶子孛加辰象天子嫡庶將分爭也天之示人顯矣楚人及吳戰于長岸吳楚之戰不月略之也陳氏傳曰此楚令尹陽丐也書人吳公子光也書國略之也楚之君大夫不見於春秋者十八年而吳入郢矣昭公之春秋莫辨於吳楚也吳嘗敗楚于鵲岸不書五年敗楚于房鍾不書六年書伐吳而已於是始書戰則以吳楚敵言之也十有八年春王三月曹伯須卒夏五月壬午宋衛陳鄭災公羊傳曰記異也異其同日而災也外異不書此為天下記異也榖梁傳曰其志以同日也其日亦以同日也據外災不月六月邾人入鄅秋葬曹平公冬許遷于白羽十有九年春宋公伐邾夏五月戊辰許世子止弒其君買許悼公瘧飲世子止之藥卒則曷為書弒其君止進藥而藥殺也止非心乎弒者止進藥而藥殺則曷為加弒焉止自為藥也君父至尊也藥劑至危也止自為藥以進諸君而君卒則是止殺君矣君子曰藥劑所以致人死者非一端也止進藥而藥殺可不謂之殺哉止所以異於楚商臣蔡般者過與故爾然春秋之法一施之者以臣子於君父不可過也然則止奔晉曷為不書止誠無所逃其罪焉爾猶不使與君殺而佚賊者同文明止之非故也春秋於臣子之獄察矣己卯地震秋齊髙發帥師伐莒冬葬許悼公二十年春王正月夏曹公孫會自鄸出奔宋奔未有書自者此其言自何孫明復曰鄸會之邑也言自鄸出奔以别從國都而去也秋盜殺衛侯之兄縶陳氏傳曰此齊豹也則曷為以賤辭書之奪之司寇則非大夫也盜賤者也以賤者而殺其君兄於是衛侯如死鳥則衛之失政甚矣范凱氏曰斥言衛侯之兄者惡其不能保其兄故稱至賤殺至貴公羊傳曰母兄稱兄兄何以不立有惡疾也冬十月宋華亥向寧華定出奔陳三大夫並出則何以月據後再自宋南里出奔楚不月以犯君出也宋元公惡華向華亥偽有疾以誘羣公子殺之遂劫公取太子欒與母弟辰公子地以為質公亦取華亥向寧華定之子以為質公殺華向之質而攻之然後出奔故月以異之同於佚賊也十有一月辛卯蔡侯廬卒二十有一年春王三月葬蔡平公夏晉侯使士鞅來聘宋華亥向寧華定自陳入于宋南里以叛胡侍講曰凡書叛有入于戚者而不言衛有入于朝歌者而不言晉猶曰非自外也有入于蕭者而不言宋則自外入者也此自外入獨稱宋南里何也南里者宋國城內之里名也左氏傳曰華氏居廬門以南里叛宋城舊墉及桑林之門而守之是華氏與宋分國而居矣故其入其出皆以南里繫之宋秋七月壬午朔日有食之八月乙亥叔輒卒冬蔡侯朱出奔楚奔君不月必未成君也此成君何以不月遂失國也公如晉至河乃復公亟如晉而晉亟辭焉以公不能為有無也晉人知有三家而不知有公矣二十有二年春齊侯伐莒宋華亥向寧華定自宋南里出奔楚此佚賊也何以不月譏不在宋也於是公子城以晉師至曹翰胡會晉荀吳齊苑何忌衛公子朝救宋大敗華氏圍諸南里華登如楚乞師楚薳越帥師逆華氏諸侯之戍謀曰不如出之以為楚功乃固請出之以晉大夫會諸侯之師救宋而絀於薳越譏不在宋矣是故救宋不書不足書也大搜于昌間夏四月乙丑天王崩六月叔鞅如京師葬景王王室亂何言乎王室亂亂自內作也然則亂作曷為不言其人告命未及於魯也景王崩王子與太子之母弟爭立叔鞅歸自京師言之而未知其所定也吾魯史也於王室之故何敢知焉謹志曰王室亂而已榖梁傳曰亂之為言事未有所成也劉子單子以王猛居于皇以者挈乎人之謂也此嗣天子也其言以之何以其未成尊則言以苟成尊則不言以據敬王居于狄泉不言以嗣君未踰年嘗稱子未葬名之以其為天王未踰年之子則尊之曰王子某者史文也據後稱王子猛卒此未踰年則曷為稱王修春秋之特筆也景王太子壽早卒猛與丐皆其母弟也王愛庶子朝欲立之大臣劉單不可王崩子朝作亂尹召奉之魯春秋書曰王室亂則劉子單子以王子居于皇劉子單子以王子猛入于王城王子猛卒屬辭疑於羣王子則正不正何以辨焉故正其尊稱而繫以在喪之名以别於羣王子之爭立者所以決嫌疑而定猶豫也陳氏傳曰此爭立也則其遂稱王何成猛之為王也於是劉單奉猛尹召奉朝未知其誰宜立也成猛之為王則猛宜立者也是故春秋之誼苟宜立也則糾雖未得國成之為子糾猛雖未踰年成之為王猛秋劉子單子以王猛入于王城陳氏傳曰居于皇言失京師也入于王城言始得京師也凡以非順辭也前言王室亂後言二子以王猛居于皇入于王城則二子有不得已焉者爾是故殺子朝于楚儋翩率子朝之徒以作亂敬王嘗處于姑蕕踰年卒克之子朝不書殺天王不書出是豫劉單以復辟之誼也殺朝事在定五年冬十月王子猛卒既葬矣何以名據諸侯嗣子未葬稱名既葬稱子未及葬節也禮天子七月而葬雖渴葬猶稱名嫌欲速也曰卒未成尊也不崩不葬左氏傳曰不成喪也劉侍讀曰以子禮治之也陳氏傳曰猛諡曰悼王則其曰王子猛何未踰年也未踰年之君雖嘗有諡猶不列於廟是故衛侯申雖諡曰戴公猛雖諡曰悼王均之為不成君也王猛矣則其曰王子猛何於其卒從其恆稱爾十有二月癸酉朔日有食之二十有三年春王正月叔孫婼如晉為取邾師故晉人來討也癸丑叔鞅卒晉人執我行人叔孫婼左氏傳曰書曰晉人執我行人叔孫婼言使人也晉人圍郊晉大夫將從其恆稱矣此籍談荀躒也曷為復稱人以其怠於勤王不人之則無以見罪也陳氏傳曰郊天子之邑也向者子帶之亂晉文公嘗圍溫矣不書以其討亂也圍郊以伐子朝之黨也則何以書討亂非晉志也於是王師敗于郊王猛卒敬王即位矣而籍談荀躒之師軍于隂于侯氏于溪泉次于社踰年子朝立焉而復圍郊則討亂非晉志也是故晉自交剛之役凡師書君大夫於是復人之夏六月蔡侯東國卒于楚不日卒于外也秋七月莒子庚輿來奔於是郊公歸何以不書庚輿復見出則郊公之歸固其所也故庚輿以接我書來奔而郊公之歸不復詳矣戊辰吳敗頓胡沈蔡陳許之師于雞父胡子髠沈子逞滅獲陳夏齧此皆從楚之諸侯也則曷為不序凡諸侯以師從夷狄皆略之也例在屬辭辭從主人篇無費辭矣以六國之師敗焉二君滅大夫獲焉故書之哀中國諸侯從役於楚則以取滅亡而莫之救故舉其重也於是吳伐州來楚薳越帥師及諸侯之師救之戰于雞父則其不言敗楚何以類自相敗也是故吳楚自相敗不書諸侯以師從吳楚不書以其從之而致師敗君滅大夫獲則書之筆削之義明矣公羊傳曰其言滅獲别君臣也杜元凱曰國君社稷之主故稱滅啖叔佐曰諸侯滅則書名以其死也胡侍講曰書頓胡沈蔡陳許以君大夫為序也天王居于狄泉稱天王者既卒已踰年也天子未三年不稱王公羊傳文此踰年爾則其稱王何必三年然後稱王謂宅憂而未出命也春秋侯國之史也諸侯皆踰年稱公而天子未三年不稱王非所以明尊尊也孫明復曰敬王也辟子朝居于狄泉曰天王居于狄泉明正也尹氏立王子朝篡位不書據莊十九年蘇子立子頽不書此其書立何以佚賊也昔者子頽之亂鄭虢克復而討子頽則臣子之責已盡子頽之立不書可也今子朝之亂敬王蒙塵四年而甫定尹召猶以子朝奔楚是佚賊也則子朝之立不可不志矣榖梁傳曰不宜立也朝之不名何也别嫌乎尹氏之朝也范寧氏曰不直名而言王子者據衛人立晉不言公子若但言尹氏立朝則嫌朝是尹氏之子故言王子以别之陳氏傳曰此尹圉也曷為稱尹氏亦非見大夫也於是敬王即位矣子朝入于尹尹圉為之殺劉他召伯奐南宫極以成周人戍尹子朝入于王城則曷為但言尹氏猶曰獨尹氏所欲立也將以王天下獨尹氏立之則莫之與矣八月乙未地震冬公如晉至河有疾乃復二十有四年春王二月丙戌仲孫貜卒婼至自晉夏五月乙未朔日有食之秋八月大雩丁酉把伯郁釐卒冬吳滅巢葬把平公二十有五年春叔孫婼如宋夏叔詣會晉趙鞅宋樂大心衛北宫喜鄭遊吉曹人邾人滕人薛人小邾人于黃父陳氏傳曰左氏傳曰謀王室也於是天王謂之東王子朝謂之西王晉侯使涖問周故期以明年而後為黃父之會又明年而荀躒趙鞅之師出是故天王書出入而晉師克鞏不書書克鞏是討子朝也有鸜鵒來巢左氏傳曰書所無也公羊傳曰記異也何異爾非中國之禽也宜穴又巢也秋七月上辛大雩季辛又雩凡雩過祀節不逺者不月此過祀節不逺也則何以日以一月而再雩故日之著其瀆也例在桓五年左氏傳曰書再雩旱甚也啖叔佐曰季辛不言大承上可知九月己亥公孫于齊次于陽州陳氏傳曰公行書次自莊以來未之有也於是再見其再見何以昭公之失國不可不詳其所如往也胡侍講曰次于陽州待齊命也昭公欲伐季氏子家子曰季氏得民久矣君無多辱焉公不從意如登臺而請曰請待于沂上以察罪不許請囚于費弗許請以五乘亡不許叔孫氏之司馬陷西北隅以入孟氏殺郈昭伯遂伐公徒公遂行以君伐臣曷為不勝祿去公室政在季氏四公矣民賦入於其家半矣昭公不忍一朝之忿而以羣小謀之其及也宜齊侯唁公於野井胡侍講曰唁者弔也生事曰唁死事曰弔齊侯唁公于野井以遇禮相見孔子曰其禮與其辭足觀矣言其無納公之實也冬十月戊辰叔孫婼卒婼謀納公而從公于齊既歸而意如有異志故因禱以自裁也婼與叔詣卒時公在外而皆書日者勢不得臨喪非恤典薄也十有一月己亥宋公佐卒于曲棘為公故如晉也曲棘宋地十有二月齊侯取鄆外取邑嘗稱人此曷為稱君為公取也是故外取邑恆不月雖取諸我不月於是特書月以其為公取之也陳氏傳曰外取邑不書雖取我不書取鄆將以歸公也則何以書病齊侯也昭公孫于齊齊侯將納公以梁丘據一言而遂不果鄟陵之盟將以合諸侯云爾而徒曰納公三年而無成則是取鄆而已矣是以取鄆則書齊圍成則書公二十有六年春王正月葬宋元公三月公至自齊居于鄆公至不月必有故而月以公不得反國而居于鄆故月以異之後不月者自鄆而行不復為之變也榖梁傳曰居于鄆者公在外也至自齊道義不外公也范寧氏曰居雖在外猶以在國之禮録之杜元凱曰入魯竟故書至猶在外故書地家鉉翁氏曰鄆魯竟故書居乾侯晉地故書在劉侍讀曰有天下者固家天下有一國者固家一國雖上失民下莫敢有也天子棄天下而不守諸侯失其國而不保是以天子有曰出居于鄭諸侯有曰居于鄆夏公圍成胡侍講曰齊侯自公子鉏帥師從公圍成不書齊師者景公為義不終也書公圍成則季氏之不臣齊侯不能修方伯連帥之職其罪咸具矣王沿氏曰公以齊師圍成且書公圍成者惡齊人受季氏賂雖得其師不足用也戰于炊鼻不書者諱國惡秋公會齊侯莒子邾子把伯盟于鄟陵左氏傳曰謀納公也此參盟也其不月何納公非齊志也齊侯二於晉而專盟嘗盟徐郯莒于蒲隧不書不足書也於是矯納公以盟莒邾把而卒無能為春秋存䇿書之大體以吾君在焉不可不書也故不月以異之公至自會居于鄆家鉉翁氏曰自是每歲書至書居凡五見焉及鄆潰乃書公在乾侯皆所以存公而繫魯國臣民之望也九月庚申楚子居卒冬十月天王入于成周曰入難辭也王起師于滑遂次于尸晉師克鞏召伯盈逐王子朝逆王于尸及劉子單子盟王入于成周晉師使成公般戍周而還則書入而已陳氏傳曰昔者惠王出入皆不書襄王雖書出猶不書入也於是悼王自皇敬王自狄泉則曷為皆書入幸之也王室亂矣入無足諱焉爾于成周猶未得王都也尹氏召伯毛伯以王子朝奔楚王子奔非其罪不書此以佚賊故書之佚賊則何以不月蒙上事月也陳氏傳曰尹氏獨欲立子朝爾則其奔楚曷為兼言召伯毛伯敬王在外四年而後入則二子為之也然則曷為不以二子首惡以二子首惡則有奉子朝者矣皆卿士也單劉奉猛毛召奉朝將又莫知其誰立也是故始終于尹氏以二卿序尹氏之下則從之者而已二十有七年春公如齊公至自齊居于鄆夏四月吳弒其君僚弒吳子者公子光也曷為不書光弒而代焉國人不得以賊赴也其不日以别於大臣之弒君而稱國者也陳氏傳曰於是壽夢有四子而季子賢諸樊也餘祭也夷昧也不以國與子而與弟凡為季子也季子不受則國宜之光者僚越光而代札是自禍也光諸樊之子僚夷昧之子父子兄弟苟焉以其位為利至於相戕賊也天理滅矣楚殺其大夫郤宛秋晉士鞅宋樂祈犂衛北宫喜曹人邾人滕人會于扈外大夫自為會何謀納公也宋元公為公故如晉卒于曲棘衛靈公欲以其公子及大夫之子質於諸侯以求納公於是樂祈犂北宫喜固請之則宋衛猶知有君臣之義也士鞅取貨於季孫辭二子與曹滕之大夫而以難復鞅與季孫同惡相濟者也以宋衛君大夫拳拳於納公而公卒不獲反國則晉人為之也冬十月曹伯午卒邾快來奔公如齊公至自齊居于鄆二十有八年春王三月葬曹悼公公如晉次于乾侯公初去國何以不如晉而如齊以向者五如晉而不得入恥於奔晉也至是何以復如晉以三如齊而不見恤也然則何以次于乾侯晉人以公非見卑於齊則不來故不使入其國都由晉之諸臣隂黨季氏故也夫晉與魯同出於文王而齊魯甥舅之國也其卑公如此尚望其能納公乎夏四月丙戌鄭伯寧卒六月葬鄭定公秋七月癸巳滕子寧卒冬葬滕悼公二十有九年春公至自乾侯居于鄆杜元凱曰以乾侯至不得見晉侯也齊侯使髙張來唁公何休氏曰言來者居鄆從國內辭據齊侯及荀躒唁公不言來左氏傳曰齊侯使髙張來唁公稱主君子家子曰齊卑君矣君秪辱焉杜元凱曰唁公至晉而不見受也遣使唁不書據臧紇如齊唁衛侯不書此何以書胡侍講曰譏齊侯不能修方伯連率之職也諸侯失國托於諸侯禮也諸侯納之正也齊魯甥舅之國也昭公朝夕立於其朝曽不能陳師竟上討意如逐君之罪而遣使唁公豈為禮乎朱定氏曰齊晉皆大國也世為牧伯諸侯之盟不能即誅意如而納昭公徒以屑屑之禮問之唁之所以見其從逆臣不能平魯亂也公如晉次于乾侯公有感於子家子齊卑君之言復如乾侯冀晉之終見恤也夏四月庚子叔詣卒秋七月冬十月鄆潰內邑叛不書鄆潰何以書內邑叛非叛其君不足志也於是昭公見出於季孫齊取鄆以居公有年矣公如晉而鄆潰民迫於季孫不敢復寧公也故志之三十年春王正月公在乾侯何言乎公在乾侯劉侍讀曰正月以存公也向者公雖去國然居鄆猶在竟內今鄆潰公無所入羈旅他國故書公在以繫一國之事也此史氏之法也昔者吾君嘗以正月在齊在晉矣説見襄二十九年史所必志而經不書略常以明變也魯君朝伯主而在他國猶曰可也昭公見出於強臣而在乾侯人道之大變也髙抑崇曰鄆魯地曰居者公之所有乾侯晉地曰在者非公得而専也夏六月庚辰晉侯去疾卒秋八月葬晉頃公冬十有二月吳滅徐徐子章羽奔楚國滅君奔恆不名據齊滅談楚滅弦狄滅溫君奔皆不名徐子何以名以其奔楚也向者曰弦曰溫其國見滅矣而其君皆奔中國談見滅於齊其君亦未嘗奔蠻方也徐韜事齊而終服於楚申之會楚人以吳子徐出也執之狩于州來又圍徐以懼吳徐蓋兼事吳楚而卒以違吳人執亡公子之命見滅於吳楚為出師以救之無及也而徐子猶奔楚以其世服蠻荆雖取滅亡而不悟不得與國滅君奔中國者比故特書名以異之三十有一年春王正月公在乾侯季孫意如會晉荀躒于適歷陳氏傳曰季氏出其君而納邾快又納黑肱卒大夫會葬晉宋滕薛晏然如二君矣是故文公在晉公孫敖會于垂隴襄公在晉季孫宿會于邢丘皆伯令也昭公在乾侯季孫意如會晉荀躒于適歷則非諸侯之事矣以晉之釋君而助臣也晉士鞅會諸侯之大夫于扈將以納公取貨於季孫而遂不果荀躒復為此會昭公所以死于外也襄昭之際大夫無君之禍晉人為之也公會晉侯于夷儀衛侯入于夷儀衛寧喜弒其君剽公如晉次于乾侯公在乾侯季孫意如會晉荀躒于適歷公薨于乾侯屬辭比事而晉人之罪著矣夏四月丁巳薛伯榖卒晉侯使荀躒唁公于乾侯於是晉侯將以師納公士鞅外黨季氏內欺其君使荀躒召季氏會于適歷而偕至乾侯荀躒以晉侯之命唁公欲公為之歸以免季氏於討從公于外者皆季氏之仇也慮公則歸矣而已將不得反國故脅公使毋歸而請逐季孫于晉不知晉侯終不能為公討也晉侯明不足以燭姦使魯君困辱于我土地而不為圖之是自蔑其君臣之教也秋葬薛獻公冬黑肱以濫來奔左氏傳曰邾黑肱以濫來奔賤而書名重地也杜元凱曰不書邾史闕文十有二月辛亥朔日有食之三十有二年春王正月公在乾侯公何以久在乾侯齊晉不納公也薛士龍曰公在乾侯而大夫出會城成周晉侯之令固行於魯也取闞吳先生曰昭公為魯君四封之內皆其土地也書取闞者見公為季氏所逐雖得魯邑猶取之於外云爾君出入必有告于廟有令于國而後書於是公失國于外令不及魯矣則公之出處曰次曰如曰至曰居曰在曰會盟曰唁公曰圍邑曰鄆潰曰取邑曷為悉書之以為史氏之職與則國無君臣非有文告之及魯史安能得公出處歲月如是之詳以為季孫之志與則君臣方讎季孫豈以諜伺之報詳命史氏於阻兵之日哉傳言季孫欲溝公墓為惡諡榮成伯止之蓋魯之臣子猶有人焉當定哀之間史臣豈無職思其憂者詳考昭公出處以補䇿書之闕乎史記言昭公奔齊魯亂孔子亦適齊當時之事見聞所及使魯史未嘗追補春秋亦特書之以明君臣之義不可一日而渝季孫雖不臣國不可一日無君也夏吳伐越秋七月冬仲孫何忌會晉韓不信齊髙張宋仲幾衛世叔申鄭國參曹人莒人薛人把人小邾人城成周此京師也其曰城成周何以地舉也凡王者所都皆曰京師周自東遷定都王城久矣於是王室亂天王復辟入于成周遂命諸侯城焉故以地舉而不言京師言京師則疑于王城是役也晉魏舒韓不信合諸侯之大夫尋盟于狄泉則盟何以不書魏舒何以不序大夫自為盟也魏舒南面韓不信専執于京師宋仲幾不受功齊髙張後大夫自為盟而無王如此此狄泉之盟所以不書也其城成周也魏舒屬役於韓簡子既削狄泉之盟則魏舒固宜不序矣榖梁傳曰天子之在者惟祭與號故諸侯之大夫相帥以城之此變之正也十有二月己未公薨于乾侯於是公七年於外矣而卒以客死則齊晉之罪也當時以齊晉納公猶反手也而齊之田氏猶魯之季氏齊君固不勝其臣也晉之六卿猶魯之三家晉君固不勝其臣也二君者皆蔽於其臣視魯君之顚沛失所恬不為動於是季氏之黨益固而公無反國之期此其所以客死于外也春秋集傳卷十三
