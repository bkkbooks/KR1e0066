body:
  text: 春秋集傳卷一元趙汸撰隱公春秋曷為始於隱公春秋之初諸侯無主自相侵伐中國大亂夷狄乘之天子不正而後能伯者興焉本其禍端所起皆在隱公之世春秋撥亂反正必治其源是故始於隱公也孫明復曰東遷之後周室微弱平王莫能中興逮隱而死故詩自黍離而降書自文侯之命而絶春秋自隱公而始也元年春王正月元年者公之始年也春周時也王正月周月也王者受命必改易正朔以統一諸侯春秋侯國之史故加王於正也春秋編年以紀事事以日決者繫日淹日者繫月踰月者繫時此無事則何以書正月公雖不以禮即位猶朝廟告朔與人更始故史書其正月榖梁傳曰謹始也公何為不言即位左氏傳曰攝也惠公元妃孟子卒繼室以聲子生隱公再娶仲子生桓公惠公薨桓公幼立桓為太子而已攝君位以俟桓長然後授之是隱之志也史之所記皆君事也行其禮則書不行則不書䇿書之大體也夫子作春秋有筆焉有削焉䇿書之大體義有無待於筆削者吾無加損焉春秋魯史也凡䇿書大體天事二曰時序曰災祥王事二曰天子之命曰天王崩葬內事二十曰公即位曰逆夫人曰夫人至曰世子生曰公夫人外如曰薨葬曰孫曰夫人大歸曰內女卒葬曰來歸曰大夫公子卒曰公出疆曰大夫出疆曰㑹盟曰出師曰用民力曰時田時祀越禮曰軍賦改作踰制曰取國邑曰國受兵外事八曰諸侯來朝曰大夫來曰諸侯卒葬曰相執曰出奔曰弒君曰殺大夫曰滅國其書於䇿者皆存而不削而一國之本末具焉以為魯春秋也三月公及邾儀父盟于蔑及者暨也榖梁傳曰及者內為志焉爾凡特相盟內之志曰及外之志曰㑹儀父者邾子克之字也附庸之君未王命恆稱名稱字者貴之蔑魯地也邾至儀父能自列於諸侯於是隱攝位求好於邾而其君來盟故魯人貴之春秋名號從主人不以正不正內特相盟日雖及大夫日據六年艾莊十二年防之類及微者日據八年浮來及內外日據二年于唐此何以不日隱能以大下小異於離盟之非義者故不日以别之以日為恆則不日以見義也夏五月鄭伯克段于鄢鄢音偃此鄭伯之弟段出奔共也據秦伯之弟針出奔晉其曰鄭伯克段何外伐叛邑史不志修春秋之特筆也春秋筆削不足以盡義而後有變文變文不足以盡義而後有特筆凡特筆必有正於君臣父子之間者也段姜氏愛子也嘗欲立之武公弗許莊公立使居京祭仲曰都城過百雉國之害也君將弗堪公曰多行不義必自斃子姑待之公子吕曰國不堪二君將若之何公曰無庸將自及聞其將襲鄭而後討焉段之罪易見而鄭伯之惡難知也曰克則鄭伯之情見矣君臣之義母子之恩兄弟之倫盡矣左氏傳曰如二君故曰克不言出奔難之也穀梁傳曰克者見段之有徒衆也殺世子母弟目君賤段而甚鄭伯也何甚乎鄭伯甚鄭伯之處心積慮成於殺也陳氏傳曰克之為言勝也以千乘之國勝其弟云爾先君之子稱公子有謂稱弟必篡若爭國也而後但名之據齊小白陽生莒去疾邾捷菑段不得列於子弟之稱矣于鄢言在外也秋七月天王使宰咺來歸惠公仲子之賵咺音烜賵芳鳳反宰氏也咺名也凡王朝大夫未爵稱字上士中士稱氏名下士稱人賵者助喪之物也惠公之喪踰年矣曷為於是焉歸之魯不赴也仲子在則其兼之何懲其不赴無及於事則兼之也禮諸侯不再娶仲子者惠公再娶之夫人也天子曷為兼賵之禮之失自王朝始有自來矣王命之見於䇿者無不書而得失見矣王人來不月據來聘歸脤不月其月著非禮也據來賵含㑹葬來求皆月以不月為恆則月為變也九月及宋人盟于宿宋魯合也及者何大夫卑名氏不登於䇿則直書其事而已外卑者嘗稱人宿宋之附庸也魯求成於宋故即其附庸之國而為盟榖梁傳曰卑者之盟不日冬十有二月祭伯來祭齊去聲祭伯者畿內諸侯也言來以王臣之禮接也王臣無外交祭與魯同出周公於是祭伯以其私來魯人以王臣之禮接之故但言來也逮莊公而祭叔來聘舍是王臣無私交魯者矣其月異其事也據諸侯來朝不月諸侯不言來言來者必介狄也據介葛盧白狄祭伯畿內諸侯也與介狄同辭而史無文以異之故書其月也據州公來書月著例公子益師卒䝉上事月也春秋有䝉上事月者有為下事月者皆以著例決之益師者孝公之子也諸侯之子稱公子公子之子稱公孫公孫之子賜族為氏雖公子公孫也未命則但名之益師稱公子則既命者也東周禮失大夫皆自命於諸侯其賜族者世為卿䇿書之大體存而世卿之失見矣大夫卒日左氏傳曰公不與小斂故不書日二年春公㑹戎于濳戎徐州之戎魯公伯禽所征者㑹者㑹其君也啖叔佐曰言戎以號舉君臣同辭何休氏曰凡書㑹者惡其虛內務恃外好也古者諸侯非朝時不得踰竟守其封界而已録戎者來者勿拒去者勿追程子曰周衰內外之防既隳方伯連帥不能斥列國之君慎固封守可也㑹之非義矣凡離㑹雖內恆不月略之也夏五月莒人入向向音餉莒人其大夫也小國非君將恆稱人小國之大夫微也入者破其國都俘其人民以兵為暴者也春秋之初曰入曰侵曰伐皆為暴也莒之所慕者向也杞也魯之所慕者杞也極也鄭之所慕者許也齊之所慕者紀也力足以兼并則不至於盡奪之不止向之為國微故卒為莒滅也據公伐莒取向不日惡入者也據隱十年入郕僖二十八年入曹書日無駭帥師入極䝉上事月也無駭公子展之子也榖梁傳曰無駭之名隱不爵大夫也陳氏傳曰無駭未命大夫也春秋之初魯有無駭俠鄭有宛詹紀有裂繻則猶有未命大夫也大夫曷為有言帥師有不言帥師公羊傳曰將尊師衆稱某帥師將尊師少稱將將卑師衆稱師將卑師少稱人君將不言帥師書其重者此史文也夫子修春秋征伐自諸侯出則君將稱君大夫稱人治在諸侯也征伐自大夫出則大夫將書其大夫治在大夫也惟內大夫將悉從其恆稱外變文以示義則內從其恆稱以見實也秋八月庚辰公及戎盟于唐此戎請盟也曰及者不得與諸侯特相盟同辭猶言連而及之微之辭也桓公盟戎書至隱何以不至從史文也隱攝君位凡行還皆不書至不獨盟戎為然蓋謙不敢同於正君也九月紀裂繻來逆女裂繻紀大夫其曰逆女何國君親迎稱逆女大夫稱所逆之字大夫為君逆禮無文焉則以君自為逆者稱之從史文也外逆女不書據杞伯姬宋伯姬此何以書公羊傳曰譏不親迎也國君親迎不書使大夫則書之略恆以明變也大夫何以不稱使逆之為道不可以使人者也然則納幣何以稱使納幣使人禮也逆女使人非禮也非禮者禮無其文禮無其文而稱使是制禮也其月以别於大夫之自為逆也據莊二十七年莒慶不月榖梁傳曰逆女親者也使大夫非正也子貢曰冕而親迎不已重乎孔子曰合二姓之好以繼萬世之後何為已重乎何休氏曰禮所以必親迎者示男先於女也於廟告本也夏后氏逆於庭殷人逆於堂周人逆於户冬十月伯姬歸于紀禮婦人謂嫁曰歸反曰來歸婦人從人者也陳氏傳曰內女為夫人恆書歸不書歸者心有故也是故齊子叔姬不書歸文十五年出郯伯姬不書歸宣十六年出杞叔姬不書歸成五年出以為嘗失位也紀子帛莒子盟于密外特相盟也外特相盟何以不月據定七年咸沙八年曲濮皆不月著例以諸侯之合散在焉異其事也陳氏傳曰外特相盟不書書紀莒志諸侯之合也程子曰紀子帛者闕文春秋未有外大夫在諸侯上者十有二月乙卯夫人子氏薨仲子也曰子氏則何以知為仲子由三年喪畢考宫告祭知之也杜元凱曰隱奉桓為太子成其母喪以赴諸侯也不及哭故不書葬鄭人伐衛鄭衛交怨也左氏傳曰鄭共叔之亂公孫滑出奔衛衛人為之伐鄭取廩延鄭人伐衛討公孫滑之亂也三年春王二月己巳日有食之言日不言朔者食在朔後何休氏曰謂二日食也公羊傳曰日食則曷為日或不日或言朔或不言朔曰某月某日朔日有食之者食正朔也其或日或不日或失之前或失之後失之前者朔在前也失之後者朔在後也榖梁傳曰其不言食之者何知其不可知也三月庚戌天王崩不奔喪諸侯不臣也不書葬魯不㑹也䇿書大體存而諸侯之罪見矣夏四月辛卯君氏卒此聲子也則其卒之何以吾君之喪其母不可不志也志則曷為稱君氏修春秋之特筆也禮女君卒則妾有攝女君聲子嘗繼元妃之室書曰君氏者攝女君之稱也於是隱成桓母為夫人而且卒其母如他娣姪則是桓適而隱庶也春秋特筆以正名因吾君之喪其母舉其繼室之號卒之明聲子之攝女君禮也惠公再娶非正也聲子攝女君則隱異於他庶子再娶非正則桓非適也隱攝而桓弒惠公為之也秋武氏子來求賻天王崩魯賻不入也不稱使王未葬也不名未命也來求月據求車不月非王命也據求金同榖梁傳曰武氏子何也天子之大夫也其稱武氏子何未畢喪孤未爵未爵使之非正也八月庚辰宋公和卒卒者曷為或日或不日或不月諸侯日卒正也弔不備禮則不日赴不以時則不月志其慢也不書卒者或彼不告或雖告而魯不往也胡侍講曰凡諸侯卒皆存而不削而交鄰國待諸侯之義見矣冬十有二月為下事月也齊侯鄭伯盟于石門特盟其不月何據定七盟于鹹著例以有關於諸侯之合散也陳氏傳曰齊鄭合也外特相盟不書必關於天下之故也而後書莒紀無足道也齊鄭合天下始多故矣天下之無王鄭為之也天下之無伯齊為之也是故書齊鄭盟于石門以志諸侯之合書齊鄭盟于鹹以志諸侯之散是春秋之始終也癸未葬宋穆公葬者曷為或日或不日或不月天子葬日諸侯月尊尊之殺也故天子不及禮不日諸侯不及禮不月諸侯葬日者僭王禮也此以與夷葬穆公感其立已而舍馮其侈僭也宜矣胡侍講曰外諸侯或葬或不葬而交鄰國待諸侯之義見矣四年春王二月莒人伐杞取牟婁陳氏傳曰外取邑不書從公榖例自隱以前則書之曷為自隱以前則書之春秋之初猶以取邑為重也據傳自桓十四年宋以諸侯伐鄭取牛首而後皆不書戊申衛州吁弒其君完州吁公子也不稱公子從史文也劉侍讀曰諸弒君稱公子公子而為大夫者也公子而不稱公子公子未為大夫者也孟子曰世衰道微邪說暴行有作臣弒其君者有之子弒其父者有之孔子懼作春秋又曰孔子成春秋而亂臣賊子懼此春秋書弒君之義也是故凡弒君皆有筆而無削以弒逆之罪無分輕重非筆削所加雖與存䇿書大體同儔而義之所該則不專主於存大體而已也夏公及宋公遇于清諸侯以禮相見曰㑹不以禮相見曰遇惟內悉書之宋公陳侯蔡人衛人伐鄭諸侯初㑹伐從州吁之請也宋穆公卒公子馮出奔鄭州吁未能和其民故請從宋公伐鄭去馮因以定其位也秋翬帥師㑹宋公陳侯蔡人衛人伐鄭諸侯之師再舉也翬不稱公子隱不爵大夫也於是宋公再舉伐鄭之師外以定州吁內以除其所惡魯宋與國也故翬帥師㑹伐合諸侯以為不義莫甚於斯矣九月衛人殺州吁于濮濮音卜稱人以殺討賊之辭也討篡立者不月據齊無知陳他此何以月豫衛人以討賊之義也春秋弒君三十二篡立者諸侯一與之㑹則國人聽焉未有能信討賊之義於天下者若齊無知陳他殺以其私徒以未㑹諸侯不稱君焉爾而衛人卒殺州吁于濮衛人之義信於諸侯矣濮陳地也陳氏傳曰合五國之衆不能定州吁而殺于濮于濮言未得國也見衛之有臣子也冬十有二月衛人立晉繼故不書立據宋馮禦說晉黑臀周此其書立何豫衛人以立君之義也州吁殺其君而立諸侯又為之㑹伐以定焉而衛人不君也卒討之逆公子晉而立之晉桓公弟也不曰公子嗣位也書曰衛人立晉而討賊立君之義信於天下矣然則千乘之國皆擅置其君可乎為諸侯受之天子正也州吁弒其君而立上無天子下無方伯諸侯又為之㑹伐以定之國人討賊立君而春秋與之者權也權非聖人莫能與也五年春公矢魚于棠君舉必書䇿書之大體也夏四月葬衛桓公諸侯月葬正也秋衛師入郕郕音成報其侵也衛之亂也郕人侵焉故衛師入郕惡入者不日據隱二年莒入向僖三十三年秦入滑昭十八年邾入鄅此何以不月有以來之也已之施人也不以道而後人之報物也失其平春秋獨有察焉故外入國有以來之則不月據十年宋衛入鄭僖二十二年鄭入滑文五年秦入鄀與此同求民情以麗邦法譏禍始而塞亂源王者之事也九月考仲子之宫初獻六羽考者宫成安主而祭之名也仲子三年喪畢以祔廟則無二適祔於女君則非妾以其先君再娶之夫人而子為太子故别立宫以祭之然則禮乎曰非禮也諸侯不再娶先君之失非臣子所得議故以義起為之者也范寧氏曰羽翟羽舞者所執不言六佾者言佾則干在其中婦人無武事獨奏文樂也程子曰魯以天子禮樂祀周公後世遂用於羣廟仲子别宫故不敢同羣廟而用六羽也曰初獻見用八之僭也邾人鄭人伐宋邾人先鄭大夫自以其班也螟音冥螟蟲災也螟不書自莊以前則書之髙抑崇曰春秋書螟三書螽十有一其為災也螟輕而螽重及其久也輕者不勝書書其重者耳冬十有二月辛巳公子彄卒宋人伐鄭圍長葛鄭邑陳氏傳曰宋鄭交怨也伐國不言圍邑從榖梁例自僖以前則書之春秋之初猶以圍國為重也據傳自僖十八年邢狄圍衛菟圃不書至二十六年書椘人伐宋圍緡不書六年春鄭人來渝平渝羊朱反魯鄭合也渝平言變而為平也孫明復曰平翬㑹諸侯伐鄭之怨也胡侍講曰離宋魯之黨也平國月據宣十五年宋人及椘人平昭七年暨齊平定十年及齊平皆月其不月者據定十一年及鄭平與此同魯與諸侯之合散繫焉故不月以異之以月為恆則不月為變也陳氏傳曰平不書據傳明年宋及鄭平宣七年鄭及晉平之類心關於天下之故而後書書鄭渝平以志諸侯之合書及鄭平以志諸侯之散是春秋之所終始也夏五月辛酉公㑹齊侯盟于艾左氏傳曰始平于齊也陳氏傳曰春秋之初宋魯衛陳蔡一黨也齊鄭一黨也於是鄭始平魯鄭方交惡於王而亟平齊魯將以合諸侯焉爾秋七月公羊傳曰此無事何以書春秋雖無事首時過則書春秋編年四時具然後為年冬宋人取長葛長葛不言鄭因上文也七年春王三月叔姬歸于紀叔姬者伯姬之娣也娣姪與適俱行史不書重適也待年於國不與適俱行則書之滕侯卒卒者曷為或名或不名左氏傳曰不書名未同盟也凡諸侯同盟於是稱名故薨則赴以名禮也赴以名則亦書之不然則否避不敏也夏城中丘魯邑土工曰築築邑曰城吳先生曰凡城築必書慎封守重民力也春秋城邑三十四聖人皆存而不削得失因可見矣葉夢得曰魯之城邑多出於畏齊畏晉畏邾畏莒不然則大夫强而自城其邑未有無故而為之者也不能以時舉其政事致而為之備以奪農時春秋所以書也齊侯使其弟年來聘左氏傳曰結艾之盟也諸侯之聘魯者皆必以事焉故施而不報非邦交之舊矣故凡列國來聘皆不月據楚子使薳罷來聘月略之也秋公伐邾內師加小國皆言伐加大國但言侵變文也惟外師悉從其恆稱內變文以示義則外從其恆稱以見實也左氏傳曰公伐邾為宋討也公與儀父盟于蔑矣為宋討而渝蔑之盟則其曰伐者以衆陵寡而已冬天王使凡伯來聘凡伯王卿士也凡王朝公卿不名稱爵以配國邑東遷諸侯不王天子不能討猶加聘問以懷撫之非時聘之舊矣故凡王臣來聘皆不月據宰咺毛伯皆月略之也戎伐凡伯于楚丘以歸此執也其言伐何公羊例變文也諸侯止諸侯曰執雖止天子之大夫亦曰執春秋謹內外之辨故不曰執而變文以異之曰伐曰歸不與戎人之執天使也楚丘衛地也八年春宋公衛侯遇于垂衛邑外特相遇不書書宋衛以其不誠乎瓦屋之盟也瓦屋之盟齊將以平三國也而宋公請先見於衛宋猶未釋于鄭也明年而齊魯㑹防又明年而齊魯與鄭伐宋宋人衛人入鄭則垂之遇為之也三月鄭伯使宛來歸祊祊榖梁作邴祊音崩祊鄭祀太山邑榖梁傳曰邴者鄭所受於天子而祭泰山之邑也公羊傳曰天子有事于泰山諸侯從泰山之下諸侯皆有湯沐之邑焉左氏傳曰鄭伯請釋泰山之祀而祀周公以泰山之祊易許田鄭伯使宛來歸祊不祀泰山也胡侍講曰祊近魯許近鄭各以近者相易也凡外臣以事來言其事不月據僖二十一年楚受冝中獻捷成八年宋使公孫夀納幣之類雖來歸田邑不月據宣十年齊歸濟西田定十年歸鄆歡龜隂田之類鄭莊以祊易許且結許為辭故月以異之庚寅我入祊歸邑不言入據鄆歡龜陰此其入何公羊傳曰難也榖梁傳曰內弗受也祊逺於鄭鄭不能有而後來歸魯人懼其不服故以兵入也其日據取邑入國不日異其事也陳氏傳曰入未有言我者言我交之之辭也夏六月己亥蔡侯考父卒辛亥宿男卒秋七月庚午宋公齊侯衛侯盟于瓦屋周地陳氏傳曰諸侯初參盟也榖梁傳曰諸侯之參盟於是始有參盟然後有盟主矣春秋之初宋魯衛陳蔡一黨也齊鄭一黨也鄭有志於叛王而合諸侯於是渝平於魯齊亦為艾之盟以平魯為瓦屋之盟以平宋衛所謂成三國也東諸侯之交盛矣程子曰自是傾危之俗成民不立矣八月葬蔡宣公九月辛卯公及莒人盟于浮來公及大夫盟不言公據及齊髙徯晉處父盟曷為言公及莒人盟榖梁傳曰可言公及人不可言公及大夫杜元凱曰莒人微者不嫌敵公侯也螟冬十有二月無駭卒九年春天王使南季來聘榖梁傳曰南氏姓也季字也范寧氏曰季之字者明命為大夫也三月癸酉大雨震電庚辰大雨雪雨雪去聲榖梁傳曰癸酉大雨震電庚辰大雨雪志疏數也八日之間再有大變隂陽錯行故謹而日之也杜元凱曰書癸酉始雨日也夏之正月微陽始出未可震電既震電又不當大雨雪也劉子政曰雷未可以出電未可以見雷電既以出則雪不當復降皆失節也雷電陽也雨雪隂也陽不能間隂氣縱逸將為害也挾卒挾音叶榖梁傳曰挾弗大夫者隱不爵大夫也隱之不爵大夫何也曰不成君也夏城郎秋七月冬公㑹齊侯于防內特相㑹也特相㑹不書惟內悉書之左氏傳曰宋公不王鄭伯為王左卿士以王命來告伐宋㑹于防謀伐宋也十年春王二月公㑹齊侯鄭伯于中丘離㑹雖內不月必參㑹而後月以不月為略則月為詳也左氏傳曰㑹于中丘盟于鄧為師期也夏翬帥師㑹齊人鄭人伐宋左氏傳曰羽父先㑹齊侯鄭伯伐宋陳氏傳曰此中丘諸侯也曷為㑹稱君伐稱人略之也春秋舉重一役而再有事不悉書苟再見必前目而後凡也公羊傳例一役而再見但人之略之也六月壬戌公敗宋師于菅菅音奸凡師戰而勝敵皆月敗某師勝敗相當但言戰必大崩也而後言戰言敗績從史文也公敗外師不日據莊十年長勺乘丘僖元年于偃其日甚之也臣既㑹伐而君又親將以自為功故甚之也辛未取郜辛已取防郜音告受之於師曰取據郜大鼎濟西田汶陽田非有人來歸榖梁傳曰取邑不日據僖三十三年伐邾取訾婁不日此其日何也不正其乘敗人而為利取二邑故謹而日也秋宋人衛人入鄭外入國有以來之不月伐宋王命也則入鄭何以不月鄭伯以王命伐宋不能正其罪取二邑不歸天子而歸于魯墮天子之令以報私讎而宋不服於是入鄭故略之也宋人蔡人衛人伐戴鄭伯伐取之伐取之謂俘其衆也於是九月戊寅鄭伯入宋不書明年十月鄭伯以虢師伐宋大敗宋師不書有王命也冬十月壬午齊人鄭人入郕外入國何以日左氏傳曰討違王命也外入國有三以惡入者不日有以來之不月必以王命據此入郕若伯主有討於諸侯據僖二十八年晉侯入曹而後日春秋之初王命猶行於天下也命虢公伐曲沃立哀侯於翼則天子猶有廢置也鄭伯以齊人朝王則諸侯猶享覲也宋公不王鄭伯以王命討之伐宋鄭有辭矣而蔡衛郕不㑹蔡衛固宋之黨也而郕亦不為無罪春秋於伐宋書人入鄭不月譏鄭伯也敗宋師取二邑書日蔽罪於魯也然而王命不可以二君廢故入宋不書入郕書日以謹之各當其罪也春秋之初王命猶行於天下故不王之罪在諸侯罪在諸侯雖小國不可以無討自有伯者而後責歸於齊晉蓋有不得已焉耳十有一年春滕侯薛侯來朝來朝不月據鄫子來朝略之也春秋必小國也而後朝大國來朝非邦交之舊矣榖梁傳曰諸侯來朝犆言同時也纍數皆至也夏公㑹鄭伯于時來鄭地左氏傳曰謀伐許也秋七月壬午公及齊侯鄭伯入許內入國不日據隱二年入極桓二年入杞必公將而後日據此入許哀七年入邾甚之也陳氏傳曰於是許莊公奔衛不書非其罪也凡奔非其罪不書奔非其罪莫甚於被兵者也杜元凱曰還使許叔居之故不言滅也冬十有一月壬辰公薨此弒也而曰薨從史文也魯史之法內大惡諱於是公子翬弒君而桓與聞乎故則桓為逆首故諱之也公羊傳曰公子翬諂乎隱公謂隱公曰百姓安子諸侯說子盍終為君矣隱公曰否吾使修塗裘吾將老焉公子翬恐若其言聞乎桓於是謂桓曰吾為子口隱矣隱曰吾不反也桓曰然則奈何曰請作難弒隱公於鍾巫之祭焉榖梁傳曰公薨不地弒也隱之不忍地也左氏傳曰不書葬不成喪也陳氏傳曰春秋內外恆異辭遇弒君父之大哀則吾何忍言之是故書薨而不地薨十二公所同也不地隱閔所獨也然則雖諱而亂臣賊子之獄具矣春秋集傳卷一
