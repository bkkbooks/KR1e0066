body:
  text: 春秋集傳卷九元趙汸撰成公元年春王正月公即位二月辛酉葬我君宣公無冰終時無冰則志之周之二月夏之季冬也孔頴達氏曰以盛寒之月書之也此月無冰則終無冰矣三月作丘甲志重賦也丘四邑十六井也甲猶兵也古者謂甲兵魯之言丘甲猶晉之言州兵鄭之言丘賦也見僖十五年昭四年周制軍賦起於井而成於甸自天子至於諸侯大夫皆以甸賦之甸四丘也自諸侯不給於征伐而後加賦於民故晉有爰田而後作州兵魯初稅畝而後作丘甲公羊傳曰始丘使之也其車徒卒伍之數不可知矣夏臧孫許及晉侯盟于赤棘不月畧之也凡内大夫特盟諸侯恒畧之惡其伉也秋王師敗績于茅戎夷狄敗中國不日據外相敗日王師敗績于茅戎何以不月王師天下莫得較故異之於諸侯也劉康公曰伐戎不書諱之也公羊傳曰曷為不言敗之者王者無敵莫敢當也穀梁傳曰不言戰莫之敢敵也陳氏傳曰戰然後言敗績此不戰何以書敗績言自敗也劉質夫曰書曰王師敗績于茅戎而尊尊之義與王師自取敗之道咸見矣冬十月二年春齊侯伐我北鄙貳於晉也夏四月丙戌衞孫良夫帥師及齊師戰于新築衞師敗績齊師者齊侯也一役而再有事者畧言之用衆焉稱師齊侯伐魯反過衞衞侯使孫良夫侵齊遇齊師戰焉故但言師也六月癸酉季孫行父臧孫許叔孫僑如公孫嬰齊帥師㑹晉卻克衞孫良夫曹公子首及齊侯戰于鞌齊師敗績内㑹師不月雖君將不月苟㑹戰也則月㑹而日戰據桓十三年公㑹紀鄭及鄭宋衞燕戰此其取戰之日加之㑹之上何不正其四卿帥師㑹戰以自為功故異其事也穀梁傳曰日其悉也曹無大夫據經不書大夫其曰公子何也以吾之四大夫在焉舉其貴者也陳氏傳曰凡帥非卿不書據傳文三年晉救江不書先僕襄十七年衞伐曹不書孫蒯之類雖卿也非元帥亦不書據傳襄元年宋圍彭城書晉欒黶不書荀偃宣三年戰大棘書宋華元不書樂吕之類書四卿是各自帥也㑹伐不言帥師此其言帥師何四卿並出各自為帥也自文之季年而無使介至是而無將佐魯三家之勢成矣於是衞未有大夫將書孫良夫曹無大夫書公子首而賞鞌之功晉於是有六卿征伐在大夫不獨魯也以四國之臣戰齊君甚矣鞌戰之忿也胡侍講曰成公初立四卿興師並出雖無人乎成公之側有不恤也然後政自季氏出矣秋七月齊侯使國佐如師己酉及國佐盟于袁婁如師者講盟也曷為不言來盟于師據楚屈完言來盟于師來盟于師前定也如師者盟非前定也可不可未可知之辭也公羊傳曰逮乎袁婁而後與之盟也穀梁傳曰鞌去國五百里袁婁去國五十里據傳國佐言背城借一則袁婁近齊國都明矣今臨淄縣西有袁婁壹戰綿地五百里焚雍門之茨侵車東至海君子聞之曰夫甚甚之辭焉齊有以取之也齊有以取之何也敗衞師于新築侵我北鄙敖卻獻子齊有以取之也陳氏傳曰齊桓合九國之師以臨楚屈完來盟于師桓不欲以臨楚盟屈完也退而盟召陵以禮於楚子齊侯使國佐如師而進盟之於袁婁以偪齊君桓公之所不敢而四國之臣敢為之甚矣鞌戰之忿也八月壬午宋公鮑卒庚寅衞侯速卒取汶陽田汶陽田本魯田也齊人歸我汶陽之田則其曰取何受之于師其歸非齊人意也魯實乗勝以取之耳冬楚師鄭師侵衞此公子嬰齊也其稱師何楚未書大夫將也侵衞遂侵我以救齊也十有一月公㑹楚公子嬰齊于蜀楚無大夫其曰公子何也嬰齊楚令尹也而以諸侯大夫之禮與之接不可以但名之也不名之而曰公子據楚稱王子則亦假周制以録其君臣焉耳公及大夫盟則諱公㑹之何以不諱盟甚矣㑹不待變文而後為譏也凡春秋辭從主人而善惡自見皆不待變文而後為譏者也故盟諱公以示義則㑹從其恒辭以見實然則公何以㑹嬰齊侵我而與之成也侵我何以不書以公之㑹之諱之也丙申公及楚人秦人宋人陳人衞人鄭人齊人曹人邾人薛人鄫人盟于蜀㑹而後盟間無事則地㑹不地盟據溴梁大夫盟間有事則地㑹地盟據葵丘及諸侯大夫盟于宋此非有事也則其再言地何㑹與盟事異也公與盟自參以上不言及雖㑹大夫不言及據翟泉㑹與盟事異則曷為言公及之一役而再有事者因上文也㑹稱公子嬰齊盟曷為稱人㑹從其恒稱以見實則明變文以示義故宋華元陳公孫寧衞孫良夫鄭公子去疾皆不書楚大夫初㑹盟中國也晉大夫㑹盟王人則不言公楚大夫㑹盟中國則其言公何楚師侵衞遂侵我宿師魯地合南北諸侯之大夫十有一國以為是盟而晉師不出於魯何譏焉故不諱公也其曰以公在也例在僖十一年三年春王正月公㑹晉侯宋公衞侯曹伯伐鄭辛亥葬衞穆公二月公至自伐鄭甲子新宫災三日哭穀梁傳曰新宫災者禰宫也迫近不敢稱諡恭也公羊傳曰宣公之宫也宣公則曷為謂之新宫不忍言也廟災三日哭禮也何以書記災也乙亥葬宋文公夏公如晉鄭公子去疾帥師伐許陳氏傳曰鄭初書大夫將也公至自晉秋叔孫僑如帥師圍棘公羊傳曰棘者何汶陽之不服邑也其言圍之何不聽也趙伯循曰内言圍皆叛也大雩晉卻克衞良夫伐廧咎如冬十有一月晉侯使荀庚來聘衞侯使孫良夫來聘丙午及荀庚盟丁未及孫良夫盟公與大夫盟雖來涖盟猶諱之大夫終不可以盟諸侯也陳氏傳曰聘而遂盟之於是始鄭伐許何休氏曰謂之鄭者惡鄭與楚比周數侵伐諸夏故夷狄之也孫明復曰鄭襄公背華即夷一嵗而再伐許故狄之四年春宋公使華元來聘三月壬申鄭伯堅卒杞伯來朝夏四月甲寅臧孫許卒公如晉葬鄭襄公秋公至自晉冬城鄆戴少望曰鄆有二東鄆莒邑魯所爭也西鄆魯邑今新城者也鄆讙龜隂三邑皆汶陽之田本杜氏魯既得汶陽故城鄆以為固也鄭伯伐許狄之則曰鄭伯何易世矣故著其恒稱也其未踰年而自將以濟惡因可見矣五年春王正月杞伯姬來歸此非罪出也據卒書把叔姬其以出辭書之何婦人之義從一者也苟乖從一之義一以出辭書之於是持書其月據郯伯姬不月以别於罪出者然則叔姬始歸于杞何不書以書來歸故畧其恒辭以異之仲孫蔑如宋夏叔孫僑如㑹晉荀首于穀左氏傳曰晉荀首如齊逆女宣伯餫諸穀然則非國事也書之如國事然政在大夫也梁山崩梁山晉望也曷為不言晉古者名山大川不以封諸侯故不繫之國公羊傳曰為天下記異也秋大水冬十有一月己酉天王崩十有二月己丑公㑹晉侯齊侯宋公衞侯鄭伯曹伯邾子杞伯同盟于蟲牢六年春王正月公至自㑹二月辛巳立武宫公羊傳曰武宫武公之宫也立者不宜立也立武宫非禮也髙抑崇曰武公佐宣王南征北伐有功故諡曰武季孫行父以鞌之功再立武宫與魯公為二祧葢僭天子之禮若文武二世室也劉侍讀曰魯諸侯也而僭天子之禮雖欲尊其祖鬼神不享也而學者習於魯之故更大之曰魯公之廟文世室也武公之廟武世室也久矣夫其以僭偽為典也取鄟衞孫良夫帥師侵宋左氏傳曰以其辭㑹也晉伯宗鄭人不書非卿畧之也夏六月邾子來朝為下日卒月也據來朝著例不月公孫嬰齊如晉左氏傳曰命伐宋也壬申鄭伯費卒秋仲孫蔑叔孫僑如帥師侵宋左氏傳曰晉命也楚公子嬰齊帥師伐鄭陳氏傳曰楚初書大夫將也冬季孫行父如晉晉欒書帥師救鄭七年春王正月鼷鼠食郊牛角改卜牛鼷鼠又食其角乃免牛為不郊言故且記異也吳伐郯陳氏傳曰吳初入伐中國也左氏傳曰吳伐郯郯成季文子曰中國不振旅蠻夷入伐而莫之或恤無弔者也夫吾亡無日矣夏五月曹伯來朝為下事月也不郊猶三望言免牛不言不郊言不郊間有事也秋楚公子嬰齊帥師伐鄭公㑹晉侯齊侯宋公衞侯曹伯莒子邾子把伯救鄭八月戊辰同盟于馬陵公至自㑹吳入州來杜元凱曰州來楚邑陳氏傳曰吳楚之交兵不書據傳伐楚伐巢伐徐子重七奔命至是始書之左氏傳曰是以始大通吳於上國晉人為之也盟於蒲景公將始㑹吳吳不至於鍾離而後至盟於雞澤悼公又逆吳子吳子不至於戚而後至吳之為蠻久矣其不敢自列於諸夏而晉求之急將以罷楚也楚罷晉亦不復伯矣入州來不可以不録其始也冬大雩不月異之也例在桓五年衞孫林父出奔晉見惡於其君也八年春晉侯使韓穿來言汶陽之田歸之于齊晉欒書帥師侵蔡公孫嬰齊如莒宋公使華元來聘夏宋公使公孫壽來納幣來納幣不書據紀伯姬齊子叔姬不書來納幣使卿則書之從史文也晉殺其大夫趙同趙括秋七月天子使召伯來賜公命其曰天子賜之何不請命而來錫也昔者文公即位天王使毛伯來錫之命而叔孫得臣如周拜則以魯人嘗請之也據詩序季孫行父請命于周即此事作頌為將躋僖公成公即位八年矣而召伯以錫命來以錫命來而不往拜則魯人未嘗有請也天子之為天王也賜之為錫也一也向也追命桓公則王不稱天此未嘗有請而來錫其曰天子何也隠桓之際王命數及于魯則猶足以寵諸侯也王命猶足以寵諸侯而追命桓公則非禮莫大乎是故為王惜之伯者不作王室愈卑定王崩魯人葢弔而不葬然且來錫公命自是終春秋無來錫命而王人亦鮮至於魯則王命不足以寵諸侯焉耳王命不足以寵諸侯而不請來錫於王何譏焉故不曰天王而曰天子不曰錫而曰賜異其文以異其事而已冬十月癸夘把叔姬卒内女為夫人來歸卒不繫其國據子叔姬叔姬來歸則曷為以杞卒之非罪出也非罪出而繫之以杞者無絶道也内女來歸不卒此卒而繫之杞則以夫人之禮成其喪也晉侯使士燮來聘左氏傳曰言伐郯也以其事吳故叔孫僑如㑹晉士燮齊人邾人伐郯衞人來媵來媵常事也不志志晉衞與齊人來媵見非常也九年春王正月杞伯來逆叔姬之喪以歸異其事也穀梁傳曰夫無逆出妻之喪而為之也季堯俞曰叔姬既絶矣生不復奉其祭祀死豈可成婦於祖宗乎是則魯不得使逆之杞不得歸葬之杞魯之不正均矣其不書葬何魯不㑹也公㑹晉侯齊侯宋公衞侯鄭伯曹伯莒子杞伯同盟于蒲自馬陵以來諸侯未有二也則其曰同盟何晉懼失諸侯也諸侯之從於晉者類非誠服也晉人亦知自反矣乎馬陵未幾而受孫林父之奔以隙衞反汶陽之田以攜魯志不得於楚而侵蔡威不足以及吳而伐郯以是道宗諸侯雖日同盟無益也故晉主夏盟恒日於是特不日以異之王貫道曰甚哉晉景公之不智也盟而可保蟲牢足矣何必馬陵馬陵足矣何必于蒲五年之間凡三同盟不即乎人心甚矣公至自㑹二月伯姬歸于宋不言逆者親迎也夏季孫行父如宋致女致女常事也不志使卿則志之孫明復曰致女使卿非禮也何休氏曰古者婦人三月而後廟見成婦父母使大夫操禮而致之必三月者取一時足以别貞信也貞信著然後婦禮成故婦人未廟見而死則歸葬女氏之黨晉人來媵秋七月丙子齊侯無野卒晉人執鄭伯於是鄭伯如晉晉人討其貳於楚也執諸銅鞮則其稱人以執何非伯討也中國無伯鄭之反覆乎晉楚之間有自來矣楚人以重賂求鄭鄭伯竊㑹公子成于鄧即往朝于晉鄭非果於叛晉也晉人執鄭伯以伐鄭而歸鍾儀使求成於楚則何以罪鄭為哉故雖討貳但稱人而鄭伯歸于鄭不書晉欒書帥師伐鄭冬十有一月葬齊頃公楚公子嬰齊帥師伐莒庚申莒潰潰者不日據蔡潰沈潰鄆潰皆不日其日以譏晉也同盟潰于荆楚而不能救譏之故日以詳之也楚人入鄆一役而再見者恒稱人秦人白狄伐晉鄭人圍許示晉不急君也城中城中城者郛内之城也髙抑崇曰莒以無備而潰楚人入鄆故懼而城之也十年春衞侯之弟黒臀帥師侵鄭晉命也夏四月五卜郊不從乃不郊榖梁傳曰夏四月不時也五卜强也吳先生曰二月下旬初卜三月上旬二卜三月中旬三卜不從則不郊矣乃於三月下旬四卜四月上旬五卜不從而後不郊瀆神甚矣公羊傳曰其言乃不郊何不免牲故言乃不郊也五月公㑹晉侯齊侯宋公衞侯曹伯伐鄭於是鄭伯歸于鄭曷為不書罪不及失國也執君歸不書據襄十六年莒子邾子十九年邾子哀四年小邾子必伯主釋有罪而後書據曹伯襄衞侯鄭曹伯負芻苟罪不及失國則固宜歸者也公㑹伯國侵伐恒書至此其不致何晉景公疾晉人急於得諸侯乃立太子州蒲為君而㑹伐鄭悖其父子之教異於他君討貳故不致以異之齊人來媵公羊傳曰三國來媵非禮也左氏傳曰凡諸侯嫁女同姓媵之異姓則否丙午晉侯獳卒秋七月公如晉奔喪也不言葬公在晉也左氏傳曰晉人止公使送葬冬葬晉景公公送葬諸侯莫在魯人辱之故不書諱之也冬十月十有一年春王三月公至自晉凡九月乃得歸也其月以奔諸侯喪異之也據公如至至皆不月左氏傳曰晉人以公為貳於楚故止公公請受盟而後使歸晉侯使卻犫來聘己丑及卻犫盟夏季孫行父如晉秋叔孫僑如如齊冬十月十有二年春周公出奔晉不名天子之三公也王者無外此其言出何王人内京師也夏公㑹晉侯衞侯于瑣澤晉楚成也杜元凱曰晉既與楚成合諸侯以申成好然則宋華元克合晉楚之成盟于宋西門之外何以不書陳氏傳曰晉楚嘗同盟矣不書至襄二十七年特書之語出章指秋晉人敗狄于交剛凡外相敗曰此不月何也畧之也陳氏傳曰中國敗狄師皆不書惟晉特書之病晉也楚方聘魯平宋合諸侯之大夫于蜀討陳夏徴舒觀兵于雒矣而晉區區爭地於羣狄是故宣成之春秋晉有事於秦楚或畧不書而甚詳於滅狄以是為晉衰也晉之衰也諸夏之憂也冬十月十有三年春晉侯使卻錡來乞師陳氏傳曰外乞師不書必盟主也而後書乞卑辭也見晉之無以令與國也三月公如京師其月尊京師也諸侯相如不月雖來朝不月必公如京師而後月諸侯朝天子正也范寗氏曰實㑹晉伐秦過京師也因其過而朝故正其文使若本自往然公羊傳曰不敢過天子也夏五月公自京師遂㑹晉侯齊侯宋公衞侯鄭伯曹伯邾人滕人伐秦於是公從劉康公成肅公㑹晉侯伐秦則其但言自京師何不以伐秦累王室也秦晉之交兵以復怨也而晉侯以諸侯朝王而後㑹伐乃若受王命以伐秦然無益於中國之故而使天子受其名故但序諸侯而劉子成子不書不以伐秦累王室也陳氏傳曰於是戰于麻隧秦師敗績則其但書伐何畧之也自秦以來秦晉人相加兵皆畧之是故戰于麻隧秦師敗績但書伐秦戰于櫟晉師敗績但書伐晉以為不足詳也曹伯廬卒于師秋七月公至自伐秦冬葬曹宣公十有四年春王正月莒子朱卒莒初志卒以同盟也徐邈氏曰莒棄周禮君終無諡故不書葬夏衞孫林父自晉歸于衞晉侯强歸之也衞侯如晉晉侯强見孫林父不可既歸使卻犫送而復之秋叔孫僑如如齊逆女鄭公子喜帥師伐許九月僑如以夫人婦姜氏至自齊陳氏傳曰夫人婦姜氏有姑之恒稱若妾姑也則不書氏是故有成風則出姜不氏有敬嬴則穆姜不氏所以别適姑也冬十月庚寅衞侯臧卒秦伯卒十有五年春王二月葬衞定公三月乙巳仲嬰齊卒公羊傳曰仲嬰齊者何公孫嬰齊也公孫嬰齊則曷為謂之仲嬰齊為兄後也為兄後則曷為謂之仲嬰齊為人後者為之子也為人後者為其子則其稱仲何孫以王父字為氏也然則嬰齊孰後後歸父也歸父使乎晉還自晉至檉聞君薨家遣墠帷哭君成踊反命于介自是走之齊魯人徐傷歸父之無後也於是使嬰齊後之也癸丑公㑹晉侯衞侯鄭伯曹伯宋世子成齊國佐邾人同盟于戚晉侯執曹伯歸于京師陳氏傳曰執未有稱爵者此其爵晉侯何討有罪也曹伯之罪不著於春秋曷以為討辭書之曹伯殺太子而自立者也然則負芻之罪曷不著於春秋曹伯廬卒未有即位者公子與太子爭立猶兩下相殺而已矣書殺太子是有二尊也猶兩下相殺而已矣則其討之何不討之則適庶之亂將接迹於天下是故特書晉侯陸淳氏曰稱晉侯者以執當其罪又歸京師得侯伯討罪之禮也公至自㑹夏六月宋公固卒楚子伐鄭背晉成也秋八月庚辰葬宋共公宋華元出奔晉宋華元自晉歸于宋再書宋華元從史文也春秋有因上文者謂一事而再見者也奔大夫有出以罪而歸非其罪者有歸以罪而出非其罪者其事殊其義異則雖無中事不得因上文也華元以宋公卒公室卑不能討有罪而去位僅足以免於罪而已既有許之討者然後歸卒討之庶幾能立法者也大夫歸言所自者必嘗有力者也此未至晉則其言自晉何見其所以得歸也華元非挾晉以自重則為魚石矣大夫出入非罪不書此非有罪也曷為出書之歸書之為其殺一司馬出左師大司寇少師寇大宰少宰五大夫不可不詳其故也宋殺其大夫山此蕩山也不氏例見僖二十八年弱公室殺公子肥則討當其罪也宋魚石出奔楚於是魚石向為人鱗朱向帶魚府出奔楚皆卿也則其但書魚石何魚石左師也其族同其志同則書重而已冬十有一月叔孫僑如㑹晉士燮齊髙無咎宋華元衞孫林父鄭公子鰌邾人㑹吳于鍾離吳者其君也曰吳以號舉也其言㑹又㑹何是兩㑹也大夫㑹大夫一也大夫又相與㑹吳一也不欲與㑹而殊之故自相為㑹然後㑹之也榖梁傳曰㑹又㑹外之也公羊傳曰曷為殊㑹吳外吳也陳氏傳曰晉初以諸侯之大夫㑹吳也於是大夫自為㑹矣左氏傳曰始通吳也許遷于葉遷國月據邢遷于夷儀衞遷于帝丘皆月此何以不月從楚遷也許偪于鄭請遷于楚故遷于葉于夷于白羽于容城皆不月以别於中國之避夷狄而遷者也十有六年春王正月雨木冰榖梁傳曰雨而木冰也志異也夏四月辛未滕子卒鄭公子喜帥師侵宋鄭叛晉也楚人力不足以爭鄭於是以賂求之楚不得鄭則不能圖中國也六月丙寅朔日有食之晉侯使欒黶來乞師甲午晦晉侯及楚子鄭伯戰于鄢陵楚子鄭師敗績榖梁傳曰日事遇晦曰晦楚不言師君重於師也然泓之戰宋公身傷而但言師敗績則為中國諱也此不為楚子諱以外楚也楚殺其大夫公子側秋公㑹晉侯齊侯衞侯宋華元邾人于沙隨不見公謀伐鄭也不見公者晉侯也以公後鄢陵戰期且用僑如之譖也何以書據見止不書譏不在内也程子曰君子正已而無恤乎人魯之後期國難故也晉侯不見公非矣彼曲我直故不恥也公至自㑹公㑹尹子晉侯齊國佐邾人伐鄭王人㑹伐自單伯而後不書據王叔桓公劉康公成肅公此其書尹子何不能服鄭也鄢陵之役自城濮以來於是再見而鄭不服厲公無道其大夫方欲釋楚以為外懼則雖一戰勝楚鄭人固有以量之也厲公不能自反修其所以復伯者而請以王臣㑹師於是三合諸侯伐鄭而鄭人從楚益堅則中國之威頓矣故尹子單伯相繼而出悉書之曹伯歸自京師釋有罪也天子嘗釋衞侯矣不言自京師此何以言自京師負芻之罪宜廢而天子不能正則以累乎京師也但曰曹伯何以天子釋之故不名以别異之也公羊傳曰執而歸者名曹伯何以不名而不言復歸于曹何據曹伯襄復歸于曹易也其言自京師何言甚易也孫明復曰曹伯歸自京師天子釋之之辭也九月晉人執季孫行父舍之于苕丘用僑如之譖也舍寘也劉侍讀曰不稱行人從公也執之者以歸也伐而未至而著舍之于苕丘故不言以歸也榖梁傳曰執者致據婼至而不至公在也執者不舍據晉執叔孫婼囚之於箕不言舍而舍公所也據公在苕丘冬十月乙亥叔孫僑如出奔齊於是出叔孫僑如而盟之則其但書奔何以奔告諸侯也齊出髙無咎放髙止但書奔皆從告也十有二月乙丑季孫行父及晉卻犫盟于扈公至自㑹鄭康成曰伐而致㑹於伐事不成乙酉刺公子偃内殺公子言其故據公子買不卒戍此其但言刺之何其故不可言也公將有行穆姜以僑如之意欲去夫二家者指偃與鉏曰汝不可是皆君也僑如之情非偃與鉏之所知也既魯人出僑如季孫歸而刺偃遷怒也十有七年春衞北宫括帥師侵鄭鄭子駟侵晉虚滑衞北宫括侵鄭救晉也夏公㑹尹子單子晉侯齊侯宋公衞侯曹伯邾人伐鄭王人未有書二卿者其以二子㑹伐何伐鄭而鄭不服也厲公親以六國之師伐鄭而遇楚輒還能驟合諸侯而不敢復當楚則二卿之行失威廢命而已六月乙酉同盟于柯陵不重言諸侯二子與盟也狄泉之盟諱王子虎此其不諱何中國無伯王室之憂也以二卿奉王命以伐鄭而鄭不服於是下盟諸侯不足諱矣自是晉有諸侯之事王人與盟皆不諱矣據雞澤平丘秋公至自㑹齊髙無咎出奔莒九月辛丑用郊用郊者用其禮也郊之祭以祈農事也以其非為農事而以郊禮為之故曰用郊古者天子有大事則類造于上帝類之言類也其禮類乎郊也成公以頻年出師未巳故竊類造之義用郊禮以祈焉僭且異矣晉侯使荀罃來乞師冬公㑹單子晉侯宋公衞侯曹伯齊人邾人伐鄭十有一月公至自伐鄭壬申公孫嬰齊卒于貍脤嬰齊卒于外公實未嘗臨喪其日何勢不得臨非恤典薄也十有二月丁巳朔日有食之邾子貜且卒晉殺其大夫卻錡卻犫卻至楚人滅舒庸楚書大夫將矣此公子橐師也其稱人何橐師未嘗為中國患也春秋書楚與中國異以楚大夫將而稱名氏必其人能為中國患者也春秋為中國而作苟其人為患不及中國春秋奚治焉是故公子嬰齊帥師凡四見公子貞帥師凡七見則雖伐吳從其恒稱而陽丏囊瓦交兵於吳橐師滅舒庸但人之則皆未嘗為中國患者也以其未嘗為中國患則不復詳其名氏志夷狄之相攻滅而已十有八年春王正月晉殺其大夫胥童此欒書中行偃將弑其君而殺其大夫也其曰國殺何書偃之罪不著於春秋則其殺胥童固不以兩下相殺告也庚申晉弑其君州蒲弑君者欒書中行偃也則其稱國以弑何不以賊赴也例在文十六年晉厲公欲盡去諸大夫而立其所嬖一朝而尸三卿書偃為政懼將及也幽厲公而殺其與為亂者既則弑公而葬以庶人不入于兆逆孫周于京師以立之踰月即位是葢以易位來告者也吾魯史也於書偃之事何知焉書曰晉弑其君而有受其惡者矣其日謹之也然則古者有貴戚之卿何也非天子不得廢置諸侯以貴戚之卿而易置人君非臣禮也葢古者有社稷之臣國亡與亡國存與存義足以匡君而弗聽則有易位之權謂若伊尹者然後可也春秋世卿之柄國者皆其君之罪人也欒書搆卻氏而陷之死將以擅晉也與中行偃殺胥童而弑其君以紓死也豈曰社稷之云乎春秋辭從主人苟有受其惡者斯已矣齊殺其大夫國佐公如晉朝嗣君也夏楚子鄭伯伐宋宋魚石復入于彭城於是楚子鄭伯伐宋彭城納宋魚石向為人鱗朱向帶魚府以三百乗戍之則其曰復入何譏不在於納也納者復其位之辭也大夫歸則言復歸入言復入者位已絶者也杜諤氏曰復入重於入入重於復歸復歸重於歸志惡之淺深也此叛也則曷為不言叛罪不止於叛也楚既得鄭即圖宋魚石援仇讎以賊其宗國其事同其罪異則各書其重焉耳是故大夫入邑必言叛據宋公之弟辰晉荀寅士吉射苟言復入則不言叛入必言所自據宋華亥向寧宋公之弟辰及公子地皆言自陳入苟言故則不言所自舍宋魚石言復入者惟晉欒盈皆言故者也公至自晉晉侯使士匄來聘左氏傳曰拜朝也秋把伯來朝八月邾子來朝為下公薨月也據來朝著例不月築鹿囿公羊傳曰譏有囿矣又為也孫莘老曰春秋興作皆書雖城池之固門廏之急無遺焉重民力也況耳目之玩一身之娛哉己丑公薨于路寢冬楚人鄭人侵宋公子嬰齊帥師見於經者詳矣侵宋曷為稱人不足以病宋也於是宋師圍彭城嬰齊侵宋救彭城也既而諸侯圍彭城楚師不復出故畧言之當悼公之興楚將失鄭何宋之及圖是故雖晉侯自將以救宋亦不書畧之也晉侯使士魴來乞師十有二月仲孫蔑㑹晉侯宋公衞侯邾子齊崔杼同盟于虚朾謀救宋也其不日以吾大夫㑹之也陳氏傳曰崔杼嘗奔衞不言歸其再見何齊納以為大夫也齊之禍靈公為之也前年逐髙無咎今年殺國佐而杼當國已而殺髙厚齊無世臣矣於是伐莒伐魯皆杼帥師焉而後弑齊之禍靈公為之也丁未葬我君成公春秋集傳卷九
