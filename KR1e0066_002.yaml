body:
  text: 春秋集傳卷二元趙汸撰桓公元年春王正月榖梁傳曰桓無王其曰王何也謹始也公即位何休氏曰即就也先謁廟明繼祖也還之朝正君臣之位也事畢而反凶服焉桓本貴當立所以為簒者隱權立桓北靣事隱也榖梁傳曰繼故不言即位正也先君不以其道終即子弟不忍即位也繼故而言即位是與聞乎弑也先君不以其道終已正即位之道而即位是無恩於先君也三月公㑹鄭伯于垂衛邑桓以簒立而修好于鄭也鄭伯以璧假許田左氏傳曰卒易祊田也榖梁傳曰非假而曰假諱易地也禮天子在上諸侯不得以地相與也許田者魯朝宿之邑也邴者鄭伯之所受命而祭泰山之邑也用見魯之不朝於周而鄭之不祭泰山也公羊傳曰易之則其言假之何為恭也此魯朝宿之邑也其稱田何田多邑少稱田邑多田少稱邑夏四月丁未公及鄭伯盟于越榖梁傳曰及者内為志焉爾程子曰桓公欲結鄭好以自安故既與許田又為盟也秋大水公羊傳曰記災也冬十月二年春王正月榖梁傳曰桓無王其曰王何也正與夷之卒也戊申宋督弑其君與夷及其大夫孔父督宋大夫其名未賜族也孔父嘉不名者天子之命大夫也及猶并也䝉上文之辭也大夫殺大夫曰兩下相殺兩下相殺不志乎春秋於是督將殺君而并及其大夫則異乎兩下相殺之獄矣故不别言殺而曰及䝉弑君之文以見其罪也左氏傳曰宋殤公十年十一戰民不堪命孔父嘉為司馬督為太宰先宣言曰司馬則然已殺孔父而弑殤公召莊公於鄭而立之榖梁傳曰孔父先死其曰及何也書尊及卑春秋之義也督欲弑君而恐不立於是先殺孔父孔父閑也公羊傳曰及者何累也弑君多矣舎此無累者乎曰有仇牧荀息皆累也舎仇牧荀息無累者乎曰有有則此何以書孔父生而存則殤公不可得而弑也滕子來朝是滕侯也曷為稱子自貶以朝大國也諸侯朝聘之禮以命數為節周制也春秋小國於大國朝而不聘滕國貧懼玉帛之將不足以備數而魯人靳以侯伯之禮接之因貶其爵損其儀以成兩君之好焉庶乎不致絶物以興戎也杞侯也而稱子薛侯也而稱伯自貶以事大國不惟滕也三月公㑹齊侯陳侯鄭伯于稷以成宋亂成平也㑹未有言其所為者其言成宋亂何為㑹稷言故也諸侯之㑹自参以上必言故據十一年㑹袲伐鄭襄三十年㑹澶淵宋災不言故必一事而再見者也隱十年㑹中丘下書伐宋桓十六年㑹曹下書伐鄭非再見也而不言故皆伯者之事也左氏傳曰督以郜大鼎賂公齊陳鄭皆有賂故遂相宋公㑹于稷以成宋亂為賂故立華氏也陳氏傳曰弑君之禍接迹於天下於是焉始向也合五國之君大夫以定州吁而州吁訖於討今也合四國之君以立督督遂相宋莊弑君之禍接迹於天下四君為之也夏四月取郜大鼎于宋戊申納于太廟此宋之賂也不曰宋人歸之受之于㑹也張主一曰郜大鼎郜所造噐也榖梁傳曰桓内弑其君外成人之亂受賂而退以事其祖周公弗受也秋七月為下事月也據來朝著例不月杞侯來朝蔡侯鄭伯㑹于鄧左氏傳曰始懼楚也鄧蔡地也外特相㑹非有關於天下故不書楚為中國之害於是始故書之其月據離㑹不月異其事也九月入杞左氏傳曰討不敬也杞侯爵也而國貧玉帛之將不能備數又以先代之後恥自貶損偃然以侯伯成禮而還以是為不敬也公及戎盟于唐桓之盟皆日其㑹皆月及戎盟何以不日異桓事也春秋日月之法於桓之盟㑹既别治之與諸侯異故盟戎不日亦不使與隱公同也據隱二年盟戎書日冬公至自唐公行何以致或不致以不致為恒則致以見義以致為恒則不致以見義公㑹夷狄恒不致據僖㑹椘哀㑹吳不書至則其致盟戎何春秋華夷之辨莫嚴於吳楚戎非所當先也致盟戎而筆削之情見矣三年春正月公㑹齊侯于嬴齊地左氏傳曰成昬于齊也杜元凱曰以國君娶夫人不由媒介自與齊侯㑹而成昬非禮也夏齊侯衛侯胥命于蒲歃血要誓為盟不盟而相諭為胥命胥命不書據莊二十一年鄭虢胥命于弭此何以書志齊衛之合也六月公㑹杞侯于郕左氏傳曰杞求成也秋七月壬辰朔日有食之既言日言朔食正朔也榖梁傳曰既者盡也有繼之辭也公子翬如齊逆女翬稱公子始命為卿也九月齊侯送姜氏于讙魯地公羊傳曰諸侯越竟送女非禮也此入國矣何以不稱夫人自我言齊父母之於子雖為鄰國夫人猶曰吾姜氏榖梁傳曰禮送女父不下堂母不出祭門諸母兄弟不出闕門送女踰竟非禮也左氏傳曰凡公女嫁于敵國姊妹則上卿送之公子則下卿送之於大國雖公子亦上卿送之於天子則諸卿皆行公不自送於小國則上大夫送之公㑹齊侯于讙胡侍講曰為齊侯來乃逆而㑹之是公之行其重在齊侯而不在姜氏非禮也夫人姜氏至自齊榖梁傳曰其不言翬以之來何也公親受之于齊侯也公羊傳曰翬何以不致得見乎公矣冬齊侯使其弟年來聘左氏傳曰致夫人也杜元凱曰古者女出嫁又使大夫隨加聘問在魯而出則曰致女在他國而來則總曰聘孔頴逹氏曰是行聘禮而致之其意言不堪事宗廟則欲以之歸也吳先生曰齊侯親送女至魯竟歸未幾又使貴介弟致之見其愛女之至情之私非禮之正也有年榖梁傳曰五榖皆熟為有年楊士勛氏曰有年書於冬者五榖畢入計用豐足然後書之公羊傳曰有年以喜書也大有年亦以喜書也有年何僅有年也大有年何大豐年也四年春正月公狩于郎榖梁傳曰四時之田皆為宗廟之事也春曰田夏曰苖秋曰蒐冬曰狩公羊傳曰常事不書此何以書譏逺也杜元凱曰三王異正朔而夏數為得天周禮大司馬仲冬教大閲遂以狩田是田狩從夏時也違其常處故書地以譏之皆䇿書之大體也夏天王使宰渠伯糾來聘左氏傳曰父在故名吳先生曰宰冡宰渠邑伯爵糾名也天子之卿當書邑爵而不名父在子襲其爵邑故特書名以見其有父也杜元凱曰不書秋冬史闕文五年春正月甲戌己丑陳侯鮑卒榖梁傳曰鮑卒何為以二日卒春秋之義信以傳信疑以傳疑左氏傳曰再赴也於是陳亂文公子佗殺太子免而代之公疾病而亂作國人分散故再赴夏齊侯鄭伯如紀外相如何以書以紀之卒滅於齊也左氏傳曰齊侯鄭伯朝于紀欲以襲之紀人知之春秋之初能以詐取人國者惟鄭莊公莊嘗挾齊魯以入許今又輔齊以圖紀紀季之酅猶許叔之東偏也胡侍講曰紀人主魯故來告其事魯史承告故備書於䇿春秋存而不削以著齊侯滅紀之罪明紀侯去國之由也天王使仍叔之子來聘公羊傳曰仍叔之子天子之大夫也其稱仍叔之子何父老子代從政也榖梁傳曰不正父在子代仕之辭程子曰古者士無世官周衰官人以世卿大夫之子得代父任事故仍叔受命來聘而使其子代行也葬陳桓公不書月禮不備也城祝丘髙抑崇曰祝丘近齊邑也秋蔡人衛人陳人從王伐鄭三國稱人皆微者也其言從王伐鄭何榖梁傳曰舉從者之辭也魯方黨鄭故王命不及於魯而三國自以其事來告也王師敗績不書為王室諱也鄭武公莊公相繼為平王卿士平王欲分政於虢而鄭輒叛桓王立虢公為右鄭伯為左以相王室於是鄭伯以王命伐宋討其不庭而取宋二邑以歸魯挾齊入許以自封鄭罪故宜討也王一奪其政而遂不朝王室無人焉爾昔者厲王之禍諸侯釋位以間王室宣王有志而後效官當是之時南征北伐無不如意周室赫然中興焉則以方叔召虎尹吉甫仲山甫之徒為之臣也今王承幽厲傾覆漸靡之後所仗以伐鄭者果何人邪若虢公林父周公黒肩宰渠伯糾者固鄭伯之所弗忌也然而王卒自將以伐鄭戰于繻葛皇輿敗績焉春秋是以為桓文作也大雩孔頴逹氏曰其大何非諸侯之雩也月令曰大雩帝用盛樂是大雩者天子之祭也諸侯雩山川魯雩上帝故稱大雩别山川之雩也孫明復曰諸侯旱而雩禮也大雩於上帝非禮也劉侍讀曰説者皆曰成王賜魯天子禮樂禮有天子諸侯之别自伏羲以來未之有改成王者周之盛王也其惑歟魯之有天子禮樂殆周之末王賜之非成王矣昔者魯惠公請郊廟之禮於天子天子使史角往惠公止之其後在魯實始為墨翟之學使成王之世而魯已郊則惠公奚請據吕氏春秋黄先生曰成王勞周公賜魯重祭祀周公於其廟謂禘也郊與大雩天子之所以有事於上帝者也成王何為賜之其東遷之始王乎然則謂惠公請之者近是以其徼福於成王周公故他國不得與也夫子曰魯之郊禘非禮也周公其衰矣榖梁傳曰雩得雨曰雩不得雨曰旱左氏傳曰書不時也凡祀啓蟄而郊龍見而雩始殺而嘗閉蟄而烝過則書以其嵗事之常書之則不勝書因見過而書以見失禮之中又失禮焉魯史之舊文也雩則曷為或月或不月雩以已月為正據經無七月雩者而八月九月雩皆書月則以别於凡雩繫時者皆七月可知過時之甚者必一月再雩而後日著其瀆也苟甚逺則又不月異冬雩也螽音終公羊傳曰記災也冬州公如曹外相如何以書以其失國所如不可不書也胡侍講曰將有其末故先録其本也杜元凱曰不書奔以朝出也左氏傳曰淳于公如曹度其國危遂不復六年春正月寔來寔音植州公自曹來則曰寔來何不以朝禮接也州公者天子之三公也於是為寓公於曹而來見於魯魯人以王臣之禮接之故但曰來也其月異其事也杜元凱曰寔實也不言州公承上五年冬如曹閒無異事省文從可知也夏四月公㑹紀侯于郕魯地左氏傳曰㑹于郕紀來諮謀齊難也秋八月壬午大閲左氏傳曰大閲簡車馬也劉侍讀曰大閲冬事也秋興之非正也厲農甚矣蔡人殺陳佗佗立嘗踰年矣曷為殺陳佗從史文也史曷為但稱名未有成之為君者也諸簒公子有成之為君者必列於㑹而後爵苟不列於㑹雖踰年但稱名稱名不成君之辭也據齊無知莒展輿皆名榖梁傳曰陳佗者陳君也何以知其是陳君也兩下相殺不道其不地於蔡也左氏傳曰陳厲公蔡出也故蔡人殺五父而立之程子曰蔡桓侯殺陳佗實以私也而書人同於討賊見討賊者衆人之公也陳氏傳曰蔡人殺陳佗是討賊之辭也佗之罪不著於春秋曷為以討辭書之佗殺太子免而立者也然則佗之罪曷不著於春秋陳侯鮑卒公子與太子爭立猶兩下相殺而已矣兩下相殺不道兩下相殺不道則其討之何以庶孽亂正統如之何勿討也九月丁卯子同生子同生何以書存䇿書之大體也程子曰適子生大事也春秋書之以正國本胡侍講曰其不曰世子何也天下無生而貴者誓於天子然後為世子冬紀侯來朝七年春二月己亥焚咸丘魯地焚火田也孔頴逹氏曰禮昆蟲未蟄不以火田是已蟄得火田然非謂焚其一澤也禮天子不合圍諸侯不掩羣劉侍讀曰焚咸丘淫獵之過也古者誅不逐奔追不越防夏榖伯綏來朝鄧侯吾離來朝皆何以名從史文也諸侯同盟則名載於書告終則名於簡䇿未有來朝而名者來朝而名者附庸也據倪黎來此侯伯也則其名之何古者鄰國世相朝春秋小國朝大國非姻鄰則同姓也榖鄧者南方近楚小國逺絶於魯非有往來之舊也終春秋一來朝則亡滅不復見前無其本後無其末故皆名以詳之也桓之二年蔡侯鄭伯㑹于鄧始懼楚也六年而楚人伐隨謂隨人曰今諸侯皆為判相侵或相殺我有敝甲欲以觀中國之政請王室尊吾號隨人為之請王室不聽上無天子下無方伯楚患廹矣小國其獲存乎於是二君逺朝上國而以楚事來焉非鄰國世朝之比矣明年而熊通稱王合諸侯于沈鹿天下之大變也據六年八月傳與史記楚世家不書秋冬史闕文八年春正月己卯烝公羊傳曰烝冬祭也春曰祠夏曰礿秋曰嘗冬曰烝常事不書此何以書譏亟也亟則黷黷則不敬君子之祭也敬而不黷杜元凱曰此夏之仲月非為過而書為夏五月復烝見瀆也趙伯循曰周雖以建子為正祭祀則用夏時本月周書曰夏數得天百王所同亦越我周改正易械以垂三統至於敬授民時廵狩嘗享猶自夏焉天王使家父來聘髙抑崇曰謀納后也夏五月丁丑烝榖梁傳曰烝冬事也夏興之黷祀也志不敬也程子曰非時復烝者必以前烝為不備也其黷甚矣秋伐邾冬十月雨雪雨去聲公羊傳曰記異也何異爾不時也何休氏曰周之十月夏之八月未當雨雪此隂氣大盛祭公來遂逆王后于紀逆后不書據荘十八年原荘公逆惠后宣六年召桓公逆定后此何以書自我為之主也天子取於諸侯使同姓諸侯主之春秋存䇿書之大體天子取后于紀命魯主之不可不書也何以不稱使王者至尊不自為昬主也榖梁傳曰遂繼事之辭也公羊傳曰大夫無遂事此其言遂何成使乎我也在其國稱女此其稱王后何王者無外其辭成矣杜元凱曰天子不親逆使上卿逆而公監之卿不書舉重略輕也九年春紀季姜歸于京師后歸不書據荘十八年陳媯宣六年齊姜不書此何以書自我為之主也春秋存䇿書之大體魯為天子主昬后歸不可不書也不月據内女歸月略於王史也公羊傳曰其辭成矣則其稱紀季姜何自我言紀父母之於子雖為天子后猶曰吾季姜京者大也師者衆也天子之居必以衆大之辭言之夏四月秋七月冬曹伯使其世子射姑來朝射音亦又音夜榖梁傳曰朝不言使言使非正也使世子抗諸侯之禮而來朝曹伯失正矣諸侯相見曰朝以待人父之道待人之子以内為失正矣楊士勛氏曰禮諸侯世子誓於天子而攝其君則下其君一等未命則以皮帛繼子男謂㑹同急趨王命者也曹伯有疾而使世子攝位來朝非正也十年春王正月庚申曹伯終生卒榖梁傳曰桓無王其曰王何也正終生之卒也夏五月葬曹桓公秋公㑹衛侯于桃丘弗遇衛侯何以不遇中背公而更與齊鄭也不月異常事從史文也凡内出盟㑹雖無成事悉書之存䇿書之大體也冬十有二月丙午齊侯衛侯鄭伯來戰于郎戰者以主及客公羊傳例其言來戰何譏不在内也魯自中丘以來於齊鄭未有異也於是齊鄭謀紀㑹于郕紀來謀齊難而魯為紀歸女于京師公㑹衛侯弗遇見伐而及之戰焉非得已也孟子曰春秋無義戰彼善於此則有之彼善於此謂不得已而後戰者也故變其主客恒辭書曰來戰惡在外也十有一年春正月齊人衛人鄭人盟于惡曹外参盟日據隱八年瓦屋有大夫不日據僖十九年曹南此非大夫也則何以不日君奪其恒稱同大夫則不日也據僖二十九年翟泉同陳氏傳曰此郎之諸侯也曷為戰稱君盟稱人凡一役而再見者但人之略之也夏五月癸未鄭伯寤生卒秋七月葬鄭莊公九月宋人執鄭祭仲此宋公也其曰人何略言之也凡執恒稱人諸侯無專執之道也是祭仲足也何以不名天子之命大夫也不稱行人據襄十年良霄十八年石買之類非使人也又執大夫不月凡八著例六此其書月何執而使之廢置其君故異之也左氏傳曰祭仲足有寵於莊公為公取鄧曼生昭公故祭仲立之宋雍氏女於鄭莊公曰雍姞生厲公雍氏宗有寵於宋莊公故誘祭仲而執之曰不立突將死亦執厲公而求賂焉突歸于鄭突公子也不言公子簒也例在隱元不繫鄭䝉上文也以簒入者不言歸據齊小白陽生莒去疾言入此其言歸何簒而言歸則必言故者也曰宋人執祭仲則突歸之故也曰戎侵曹則赤歸之故也突以宋歸赤以戎歸此忽與覊之所由出奔也榖梁傳曰歸易辭也祭仲易其事權在祭仲也死君難臣道也今立惡而黜正惡祭仲也劉侍讀曰祭仲之義宜效死勿聽又不能是則若强許焉還至其國而背之執突而殺之亦可也二皆不能而黜其君以立不正若仲之為者春秋之亂臣也鄭忽出奔衛君在喪恒稱子既葬矣未踰年稱子據僖二十五年衛子踰年矣未葬稱子據文九年毛伯來求金不稱王鄭忽未踰年者也其名之何也以其見出不得後先君也榖梁傳曰其名失國也柔㑹宋公陳侯蔡叔盟于拆柔魯大夫不稱氏未賜族也蔡叔蔡侯之弟攝居者凡諸侯之弟攝居則稱字外參盟有大夫不日雖吾大夫㑹之亦不日内外一治也禮卿不㑹公侯盟甚矣是故惡其伉也陳氏傳曰以大夫㑹諸侯盟於是始公㑹宋公于夫鍾冬十有二月公㑹宋公于闞闞口輶反十有二年春正月夏六月壬寅公㑹杞侯莒子盟于曲池左氏傳曰平杞莒也秋七月丁亥公㑹宋公燕人盟于榖丘燕人南燕大夫八月壬辰陳侯躍卒公㑹宋公于虛冬十有一月公㑹宋公于龜丙戌公㑹鄭伯盟于武父左氏傳曰公欲平宋鄭秋及宋公盟于句瀆之丘宋成未可知也故又㑹于虚冬又㑹于龜宋公辭平故與鄭伯盟于武父遂帥師而伐宋丙戌衛侯晉卒榖梁傳曰再稱日決日義也范寗氏曰明二事皆當日也陳氏傳曰于以見春秋之有日例也十有二月及鄭師伐宋不言公及䝉上文也陳氏傳曰此公及鄭伯也曷為前稱君後稱師略之也一役而再見者但人之用衆焉稱師丁未戰于宋不言宋及鄭戰據哀十一年書齊及吳戰内辭也春秋内外恒異辭伐者為客受伐者為主由外言之也苟吾君在焉則不得從外辭從外辭者必㑹變夷伐中國者也據哀十一年㑹吳伐齊不言師敗績敵也十有三年春二月公㑹紀侯鄭伯己巳及齊侯宋公衛侯燕人戰齊師宋師衛師燕師敗績紀先鄭序爵也則齊曷為先宋以强大而易周班也㑹何以不地以戰㑹也戰何以不地略之也公欲平宋鄭朞嵗之間㑹于夫鍾于闞盟于榖丘又㑹于虛于龜而宋公辭平遂舎宋而㑹鄭以伐宋戰焉勝敗相當而主客之憤未已於是魯鄭連紀宋援齊衛及燕相與刻期一戰以決焉故略之不言地䝉上文一譏之也然則安戰戰于宋也桓弑隱宋莊鄭厲皆以簒立於是同惡相濟又相仇也則齊衛燕紀何為焉燕役於宋紀附於魯二小國者無足議也齊東方大國也嘗合諸侯于稷以立華氏取宋賂而定莊公矣今又挾衛以助宋衛侯朔搆殺其兄以得國父喪在殯而自將以助宋者亦將以定其位焉耳春秋書戰二十二以亂濟亂而亟殘其民未有若斯甚者如是而從其恒辭則不知兩戰為一事不知兩戰為一事則民隱而用法疑矣故凡春秋之變文皆有辨於嫌疑之間者也凡君在喪以師行者稱爵從史文也陳氏傳曰衛朔宋固成三年陳溺襄五年猶踰年也鄭費成四年未踰年亦曰鄭伯甚矣從而志之徒見其悖禮焉爾故凡春秋辭從主人皆實録而非修春秋之辭也三月葬衛宣公胡侍講曰既與衛人戰曷為葬宣公怨不棄義怒不廢禮是知古人以葬為重也夏大水秋七月冬十月十有四年春正月公㑹鄭伯于曹無氷無氷不月終時無氷則志之周之春夏之冬也例在成元年榖梁傳曰無氷時燠也夏五榖梁傳曰夏五傳疑也胡侍講曰春秋之作因舊史有可損不能益也鄭伯使其弟語來盟來盟不月雖内蒞盟不月略之也榖梁傳曰來盟前定也諸侯之尊兄弟不得以屬通其弟云者以其來我舉其貴者也蘇子由曰凡外大夫來盟於魯内大夫蒞盟於他國皆盟其君秋八月壬申御廪災公羊傳曰御廪者粢盛委之所藏也杜元凱曰藏公所親耕以奉粢盛之倉也榖梁傳曰天子親耕以共粢盛王后親蠶以共祭服國非無良農工女也以為人之所盡事其祖禰不若以已所自親者也乙亥嘗杜元凱曰先其時亦過也或謂譏其不易災餘而嘗鄭漁仲曰廟祀必十日戒享越三日而嘗則粢盛已出廪壬申致齊之初乙亥嘗非災之餘也冬十有二月丁巳齊侯禄父卒宋人以齊人蔡人衛人陳人伐鄭曰以何乞師而自將也陳氏傳曰以一國而用諸侯之師於是始上無天子下無方伯有以一國而用諸侯之師此伯之所由興也伯者之令行於天下自是無書以者矣書以者必中國用夷狄者也左氏傳曰宋人以諸侯伐鄭報宋之戰也焚渠門入及大逵伐東郊取牛首十有五年春二月天王使家父來求車王者無求曷為言求車有闕文也俄而天王崩七年而後克葬則諸侯不王之罪大矣其月著非禮也三月乙未天王崩夏四月己巳葬齊僖公五月鄭伯突出奔蔡何以名辨二君也凡一國而二君者其出入史皆名之示有辨也鄭伯突辨於忽也衛侯朔辨於黔牟也衛侯鄭辨於叔武也衛侯衎辨於剽也蔡侯朱辨於東國也莒子庚輿辨於郊公也邾子益辨於革也惟北燕伯款不知所為辨齊晏子曰燕有君矣則亦不可無辨也於是祭仲專鄭伯使其壻雍糾殺之雍姬以告祭仲殺雍糾而鄭伯出奔則其但言奔何春秋無費辭為君而奔未有不見出於其臣者也為臣而奔未有不見出於其君者也但言奔存大體也鄭世子忽復歸于鄭忽嗣君也其出也名之則其歸稱世子何特筆以正名也世子者未嗣位之稱也忽君鄭五月而出奔四年于外而復歸于鄭於史文不得復稱世子魯人於突一則曰鄭伯二則曰鄭伯則魯史必不稱忽為世子探其本正其名書曰鄭世子忽修春秋之特筆也劉侍讀曰忽之出無鄭者也而又不得稱子則忽之可以君國者無幾矣春秋别嫌疑明是非以謂忽嘗為君之世子矣若庶孽得而奪之則天下之適庶亂矣故正其名與之繼世深惡亂臣賊子之意也胡邦衡曰復歸者已失國之辭也據見執不言復歸許叔入于許劉侍讀曰稱入何難也何難焉鄭亂而後入也陳氏傳曰出罪也入罪也則書之據鄭良霄宋魚石晉欒盈之類出非其罪入罪也則但書入據齊小白陽生莒去疾類凡入皆譏也凡入皆譏也則其曰許叔何以是為宜入也昔者齊鄭魯三師入許許莊公奔衛鄭人以許東偏奉許叔而使其大夫獲處許西偏許無君者十有五年忽突之亂於是叔始得許若許叔可謂能復莊公之宇矣是故入未有書字者雖公子也弗謂公子此其曰許叔所以别有罪也叔不書字則疑於齊小白陽生莒去疾公㑹齊侯于艾左氏傳曰謀定許也王貫道曰定許所以撓忽也邾人牟人葛人來朝非國君不言朝此皆微者也則其曰朝何也以子代父也杜元凱曰三人皆附庸之世子其君應稱名故其子降稱人秋九月鄭伯突入于櫟冬十有一月公㑹宋公衛侯陳侯于袲伐鄭袲昌氏反於是謀伐鄭將納厲公弗克而還則其書伐鄭何為㑹袲言故也據襄二十四年二十五年再㑹夷儀伐齊不克不書例在二年惟其為㑹言故而未嘗伐鄭是以不書至以桓之盟㑹恒不致也宋興魯鄭之憾未釋則曷為謀納厲公昭公復國非宋魯之利也故又相與釋怨而為㑹以謀之反覆皆以私也十有六年春正月公㑹宋公蔡侯衛侯于曹左氏傳曰謀伐鄭也夏四月公㑹宋公衛侯陳侯蔡侯伐鄭納厲公再弗克也明年髙渠彌弑昭公立子亹又明年齊人殺子亹以魯人納突故絶不與通皆不告也秋七月公至自伐鄭公㑹伐恒書至也㑹盟不至㑹伐何以致民為重也致伐不月苟致以四時首月則書其月一時無他事不敢廢時首也冬城向十有一月衛侯朔出奔齊衛人立黔牟而朔出奔也公羊傳曰朔得罪於天子也榖梁傳曰天子召而不往也程子曰朔搆其二兄而致於其死罪大矣然父立之諸侯莫得而治也天子治其舊惡而廢之宜也據王人子突救衛朔入于衛放黔牟于周黔牟之立蓋天子之命也十有七年春正月丙辰公㑹齊侯紀侯盟于黄齊地左氏傳曰平齊紀且謀衛故也二月丙午公㑹邾儀父盟于趡趡翠軌反魯地夏五月丙午及齊師戰于奚魯地不言其人疆吏也左氏傳曰疆事也六月丁丑蔡侯封人卒秋八月蔡季自陳歸于蔡陳氏傳曰出罪也歸亦罪也則悉書之據陳黄楚比之類出非其罪歸罪也則但書歸據鄭突曹赤之類凡歸皆譏也凡歸皆譏也則其曰蔡季何以是為宜歸也蔡桓侯卒無子蔡人召季于陳而立之是故歸未有稱字者雖公子也弗謂公子此其曰蔡季所以别有罪也季不稱字則疑於鄭突曹赤癸巳葬蔡桓侯不稱公文誤也及宋人衛人伐邾不言其人微者也左氏傳曰伐邾宋志也冬十月朔日有食之言朔不言日夜食也周人以夜半為朔鄭康成曰朔日日始出其食虧傷之處未復故知以夜食也十有八年春王正月桓無王其曰王何也既謹其始必正其終也公㑹齊侯于濼濼朴洛二音曷為不言公及夫人據公及夫人㑹齊侯于陽榖如齊夫人之志也濼非夫人之志也公與夫人姜氏遂如齊曰與曰遂繼事之辭也㑹不言公及夫人則如齊曷為以繼事之辭言之㑹公之志也如齊非公之志也見公制在夫人而不能自克以及其身也夏四月丙子公薨于齊左氏傳曰公㑹齊侯于濼遂及文姜如齊齊侯通焉公謫之以告夏四月丙子享公使公子彭生乗公公薨于車杜元凱曰彭生多力拉公幹而殺之公羊傳曰夫人與弑公也榖梁傳曰其地於外也據隱弑不地丁酉公之喪至自齊秋七月冬十有二月己丑葬我君桓公嵗首必書王月桓曷為無王見伯者之所由興也伯者之興則何以於桓見之諸侯無王莫甚於桓之世也桓弑隱督弑宋公陳佗殺太子而立鄭突簒其君兄宋鄭之亂諸侯不能討又從而利之而皆不事天子不王之罪莫斯為甚矣而未至於無王也鄭莊不臣繻葛之戰三綱絶矣而諸侯不為變則天下遂至於無王矣於是齊滅王后之家合四國以抗王師而納衛朔人心無所底止而後天下伯者興焉夫伯者之事自古以來未之有也春秋辨實之際明伯者之興實由諸侯之無王故於桓公之䇿略不書王而齊桓晉文有事諸侯悉書之以深絶不臣之諸侯也然則桓之不終無王何也元年者是君之始十八年者是君之終不以無王之罪蔽於一國也二年當宋公之殺不以無王之罪蔽於一人也十年當曹伯之卒不使是君不得正其終也五年陳侯卒不與正者陳侯之卒日疑也甲戌己丑非必皆正月之日則陳侯實卒日不可知故不與正也據長厯甲戌前年十二月二十一日己丑此年正月十六日大衍厯甲戌正月二十一日己丑二月六日桓之盟何以皆日其㑹何以皆月異桓事也桓弑君者也春秋存䇿書之大體内大惡諱之而無以正其罪則是春秋之作徒以私夫魯而已也是故春秋辭有内外而法無不行辭有内外故内大惡諱者一國之私也法無不行則日月之例一以施之者天下之公也雖然春秋為亂臣賊子作也而法之一施乎内者於弑立無辨焉是内之弑其君者獨見釋於春秋也將何以示天下故桓之盟㑹日月皆從其恒辭以異之而桓罪著矣春秋不徒諱内惡而亂臣賊子無留獄矣崔子方氏曰春秋賤桓於桓之事無譏蓋曰桓弟弑兄臣弑君而立乎其位此其大者不治則其餘無足譏焉耳春秋集傳卷二
