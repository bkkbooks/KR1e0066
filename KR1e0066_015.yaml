body:
  text: 春秋集傳卷十五元趙汸撰哀公元年春王正月公即位楚子陳侯隨侯許男圍蔡左氏傳曰報柏舉也杜元凱曰定六年鄭滅許此復見者葢楚存之鼷鼠食郊牛改卜牛夏四月辛巳郊髙抑崇曰魯不當郊天既示變以警之而改卜牛是違天也雖牛猶非郊時況公斬然在衰絰之中乃行天子之禮以見上帝可乎秋齊侯衛侯伐晉傳言欲救范氏師及齊衛伐晉則何以不書師為内諱伐盟主也陳氏傳曰伐夷儀不書書次五氏伐河内不書書次垂葭春秋誠有不忍書也必於是而後書春秋葢將終焉是故春秋之初諸侯無王者齊鄭宋魯衛為之也春秋之季諸侯無伯者亦齊鄭宋魯衛為之也黄震氏曰齊景欲抑晉以代興圖回數年乃助其叛臣范氏而伐之行之不以正可羞也已許翰氏曰晉為伯主而諸侯伐之春秋特書以著中國之無伯也王道既盡伯統復亡春秋之變至是而窮矣冬仲孫何忌帥師伐邾二年春王二月季孫斯叔孫州仇仲孫何忌帥師伐邾取漷東田及沂西田癸巳叔孫州仇仲孫何忌及邾子盟于句繹吾大夫及諸侯盟恒不月此其日之何伐其國而要之盟故異之也左氏傳曰伐邾將伐絞邾人愛其土故賂以漷沂之田而受盟何休氏曰再出大夫名氏者季孫不與盟也陳氏傳曰自是内外盟皆不書不足書也是故鄫衍盟吳不書七年萊門盟吳不書八年甚者㑹于鄖雖三國盟亦不書十二年杜二説皆非是夏四月丙子衛侯元卒滕子來朝晉趙鞅帥師納衛世子蒯聵于戚自蒯聵出奔傳言靈公嘗再欲命立公子郢矣而郢固辭靈公卒夫人欲立之郢終辭且曰亡人之子輒在乃立輒則廢蒯聵而立輒未嘗有靈公之命也蒯聵初不過以疑似之迹出奔以待父之察爾輒為蒯聵子豈不知之見其父奔逃于外而遂以為罪人及靈公薨國人援已以立而遽立於其位則輒之無父可知矣江熈氏曰稱世子明正也孫明復曰其言納于戚者為輒所拒不得入於衛也輒貪國叛父逆人理以滅性故孔子於蒯聵出入皆正其世子之名胡侍講曰蒯聵出奔靈公未嘗有命廢之則蒯聵為未絶故稱世子者所以深罪輒之見立不辭而拒其父也冉有謂子貢曰夫子為衛君乎子貢曰諾吾將問之入曰伯夷叔齊何人也曰古之賢人也曰怨乎曰求仁而得仁又何怨出曰夫子不為也伯夷以父命為尊叔齊以天倫為重仲尼以為求仁得仁者也然則為輒者宜奈何宜辭於國曰若以父為有罪將從王父之命則有社稷之鎮公子在我焉得為君以為無罪則國乃世子之國也天下豈有無父之國哉而使我子立乎其位如此則言順而事成矣若輒利其位以拒父則衛之臣子舍爵禄而去之可也焉有父子爭國而可為者乎陳氏傳曰後十二年而蒯聵自戚入於衛衛侯輒來奔則是輒拒父也屬辭比事則輒萬世不可掩矣秋八月甲戌晉趙鞅帥師及鄭罕達帥師戰于鐵鄭師敗績孫明復曰皆言帥師其衆敵也黄震氏曰鄭既叛晉從齊故轉粟以餉范氏助范氏以抗晉也趙鞅者范氏之仇也故帥師禦之冬十月𦵏衛靈公十有一月蔡遷于州來許請遷於楚不月蔡請遷於吳則其書月何蔡既以吴入郢復其世仇其依吳以避楚非得已也故得與邢衛同書月蔡殺其大夫公子駟左氏傳曰吳洩庸如蔡納聘而稍納師師畢入衆知之蔡侯告大夫殺公子駟以説冬蔡遷于州來杜元凱曰元年蔡請遷于吳中悔故吳人因聘襲之蔡殺駟以説吳言不時遷駟為之也胡侍講曰楚既降蔡使疆于江汝蔡人聽命而還師矣於是請遷于吳而復自悔其謀之不臧甚矣及吳將襲蔡乃追罪於執政其誰之咎也三年春齊國夏衛石曼姑帥師圍戚戚衛邑也齊大夫主兵以圍衛邑而不繫之衛何也修春秋之特筆也時衛世子蒯聵在戚輒據國以拒父而齊卿又為出師助衛人圍之則是齊人助子圍父也昔者楚取宋彭城以居宋之叛臣晉為宋合諸侯之師以圍之其圍也雖有宋人猶必繫彭城於宋晉取鄭虎牢以偪鄭而鄭不服諸侯以伯令戍之猶必繫虎牢於鄭此以齊卿主兵乃獨不繫戚於衛者以蒯聵在戚而輒不當有國父不可圍齊人不當黨逆故也是故蒯聵出入皆稱世子雖魯史舊文夫子實因之正名而於圍戚特不繫衛以異之也學者以鄭世子忽宋彭城鄭虎牢三特筆比而觀之則筆削之情見矣髙抑崇曰齊與晉為仇若蒯聵入則衛從晉矣此齊所以助輒也許翰氏曰晉以君臣稱兵而齊為臣伐君衛以父子爭國而齊助子圍父以是命於諸侯君子是以知齊之不足以伯而將有亂也夏四月甲午地震五月辛卯桓宫僖宫災公羊傳曰不言及據雉門兩觀言及敵也穀梁傳曰言及則祖有尊卑矣由我言之則一也孫莘老曰桓公哀公之十世祖也僖公哀公之七世祖也諸侯五廟而十世七世之廟存焉非禮矣劉侍讀曰桓僖宫曷為不毁三家者出於桓立於僖以是為悦者也季孫斯叔孫州仇帥師城啓陽杜元凱曰魯懼晉故比年四城趙鵬飛曰晉越齊衛而後至魯魯何虞而備晉啓陽在今沂州地近邾元年伐邾取田疑邾伐我故備之許翰氏曰所城近敵故帥師也地震廟災變異弗圖而取田城邑兵役相繼可謂不畏天命矣中失而外鍵本亡而末務此魯之季世也宋樂髠帥師伐曹薛士龍曰討樂大心之亂也秋七月丙子季孫斯卒蔡人放其大夫公孫獵于吳杜元凱曰公子駟之黨也冬十月癸卯秦伯卒叔孫州仇仲孫何忌帥師圍邾四年春王二月庚戌盜殺蔡侯申此公孫翩弑其君也曷為書盜蔡人諱公孫弑君而赴以盜也於是國人殺翩則何為不書不以討賊告也夫盜有司之所詰而不以君臣之禮治也蔡人殺弑君者而不以討賊告則既赴以盜故也是以初為弑君諱而已其不誠莫大焉夫子因而見蔡之無臣子也蔡公孫辰出奔吳陳氏傳曰書公薨夫人姜氏孫于邾公子慶父出奔莒則夫人慶父與聞乎殺矣書盜殺蔡侯申蔡公孫辰出奔呉則辰與聞乎殺矣𦵏秦惠公宋人執小邾子夏蔡殺其大夫公孫姓公孫霍杜元凱曰皆弑君黨晉人執戎蠻子赤歸于楚此隂地大夫也則其曰晉人何有當國者之命也趙孟之謀國如此宜晉之不競也黄震氏曰晉人執戎蠻之君而歸之楚是晉為楚役也家鉉翁氏曰戎蠻雖邇於楚亦嘗服屬諸夏楚乗其亂誘其君而殺之戎於是自拔歸晉晉人苟畏楚拒而弗納可也聽其去而適他國亦可也乃詐而執之以歸於楚是以事京師者而事呉楚矣城西郛六月辛丑亳社災范寗氏曰亳即殷武王克殷班其社於諸侯以為亡國之戒記曰喪國之社屋之不受天陽唯其有屋所以災也秋八月甲寅滕子結卒冬十有二月𦵏蔡昭公𦵏滕頃公五年春城毗夏齊侯伐宋王貫道曰齊方挾諸侯以伐晉而宋人伐曹執小邾子欲爭伯也故齊侯伐宋晉趙鞅帥師伐衛左氏傳曰范氏之故也秋九月癸酉齊侯杵臼卒冬叔還如齊閏月𦵏齊景公六年春城邾瑕髙抑崇曰瑕邾邑而魯遽城之見魯之迫邾也汪仲裕曰魯有負瑕故稱邾以别之晉趙鞅帥師伐鮮虞左氏傳曰治范氏之亂也杜元凱曰四年鮮虞納荀寅于柏人故治其亂吳伐陳左氏傳曰呉之入楚也使召陳懐公逢滑曰晉盟主也以晉辭吳若何陳侯從之及夫差克越乃修先君之怨侵陳春吳伐陳復修舊怨也張主一曰夫差黷兵修怨於中國自取滅亡之道也夏齊國夏及髙張來奔許翰氏曰陳乞將立陽生乃以詐謀逐髙國髙國奔而後陳乞弑君之謀得肆矣陳氏傳曰齊殺其大夫髙厚齊崔杼弑其君光齊國夏及髙張來奔齊陳乞弑其君荼聖人垂誡深矣叔還㑹呉于柤趙鵬飛曰吳既伐陳魯懼兵之及我故叔還往㑹之秋七月庚寅楚子軫卒齊陽生入于齊齊陳乞弑其君荼陽生使朱毛弑荼則曷為書陳乞首惡始謀廢立者陳乞也苟非陳乞則陽生不能篡立而荼亦不至於見弑矣孫莘老曰陽生入齊而陳乞弑君則是陽生與聞乎故也不以陽生首惡者陽生之入陳乞召之荼之弑陳乞為之加陽生以弑君之罪則乞廢立之跡不明也何休氏曰乞為首惡故書弑其君陽生實篡故曰入于齊兩舉其罪也陳氏傳曰衛侯入于夷儀衛寗喜弑其君剽則喜為衛侯弑也齊陽生入于齊齊陳乞弑其君荼則乞為陽生弑也曷為不以罪齊無知者罪陽生於是齊政由陳氏矣彼陽生者亡公子而已乞不有無君之心則陽生為僇矣家鉉翁氏曰陽生於諸子為長景公出長立幼以是召亂穀梁傳曰陽生正荼不正不正則其曰君何也荼雖不正已受命矣冬仲孫何忌帥師伐邾宋向巢帥師伐曹七年春宋皇瑗帥師伐鄭左氏傳曰鄭叛晉故也晉魏曼多帥師侵衛左氏傳曰衛不服也髙抑崇曰衛輒拒父至今六年矣猶未納也晉人不以此致討而以范中行氏故加兵於衛何哉夏公㑹吳于鄫秋公伐邾八月己酉入邾以邾子益來薛士龍曰伐邾本三家之謀而公親之不得已也公内迫於三家三家歸過於公也蘓子由曰其不書滅何也邾大夫茅夷鴻保於茅請救於吳明年吳為之伐魯復邾子故也杜元凱曰他國言歸於魯言來内外之辭也宋人圍曹冬鄭駟𢎞帥師救曹陳氏傳曰書救曹何曹卒滅於宋也自魯救晉凡晉楚之救皆不書六十年矣其再見何以中國無伯而諸侯自相救也諸侯自相救猶可也吳救陳諸夏亦幾於亡矣八年春王正月宋公入曹以曹伯陽歸此滅矣何以不言滅不以滅告也凡滅國而弗有其地者不以滅告滅國而弗有其地必有能興復之者也故狄入衛不言滅吳入郢不言滅公入邾以邾子益來不言滅於是宋公入曹以曹伯陽歸而鄭方救曹侵宋宋人猶未敢言滅曹而有其地也故不以滅告然而曹遂亡而不救則以中國無伯而曹無申包胥茅夷鴻之臣故也吳伐我蘓子由曰不言四鄙而直言伐我兵加於國都也於是為城下之盟而還不書諱之也汪仲裕曰我入邾故吳為邾伐我反已自咎可也夏齊人取讙及闡外取邑不書此何以書取諸我也公羊傳曰為以邾子益來也孫明復曰邾子益齊甥也歸邾子益于邾左氏傳曰齊侯使如吳請師將以伐我乃歸邾子秋七月冬十有二月癸亥把伯過卒齊人歸讙及闡左氏傳曰秋及齊平臧賔如如齊涖盟齊閭丘明來涖盟十二月齊人歸讙及闡然則交涖盟何以不書皆非卿也非卿名氏不登於䇿魯史舊章也九年春王三月𦵏把僖公宋皇瑗帥師取鄭師于雍丘穀梁傳曰取易辭也以師而易取鄭病矣趙伯循曰取悉俘之也許翰氏曰鄭以不義深入敵境而圍其邑此固喪師之道也夏楚人伐陳左氏傳曰陳即吳故也秋宋公伐鄭冬十月十年春王二月邾子益來奔吳人討邾奉太子革為政故邾子來奔公㑹吳伐齊左氏傳曰九年齊侯使辭師於吳吳子曰昔歲寡人聞命今又革之不知所從將進受命於君冬吳子使來儆師伐齊十年春公㑹吳子邾子郯子伐齊南鄙師于鄎杜元凱曰書㑹不與謀也三月戊戌齊候陽生卒弑而書卒從赴也義同鄭伯髠頑楚子麇夏宋人伐鄭汪仲裕曰鄭雖不義宋覆其師而盡取之亦云㦧矣而比歳凡三伐鄭十三年鄭人復取宋師亦其取之也晉趙鞅帥師侵齊髙抑崇曰齊帥諸侯以貳晉可以討矣然趙鞅乗其有喪而加兵焉異乎士匄矣五月公至自伐齊凡㑹伐而書至恒不月據桓十六至伐鄭宣七至伐萊此其月之何以㑹蠻夷伐中國故月以異之髙抑崇曰齊接魯境既聞其喪即遂班師可也所以乆不歸者公之進退制在吳也𦵏齊悼公衛公孟彄自齊歸于衛杜元凱曰書歸齊納之也薛伯夷卒秋𦵏薛惠公冬楚公子結帥師伐陳吳救陳楚比歳伐陳爭陳於吳也故吳救陳吳非能以存中國為義者利陳之私於我而已陳氏傳曰自魯救晉凡救皆不書矣鄭救曹則中國無伯諸侯自相救也中國無伯諸侯自相救春秋憫焉而特書之吳救陳諸夏幾於亡矣春秋之所甚懼也十有一年春齊國書帥師伐我杜元凱曰不書敗勝負不殊也夏陳轅頗出奔鄭五月公㑹吳伐齊㑹戰而但言伐何也公不與戰也㑹伐一義也戰一義也薛士龍曰吳自入郢之後乆不能見公也六年伐陳吾叔還㑹之于柤公又㑹之于鄫吳以邾故伐我而齊取讙闡由是齊魯始睽齊歸二邑我不之寘因與吳合而伐齊故有國書之報於是卒㑹吳而勝齊吳之威加於中夏魯有力焉春秋再書公㑹伐有以見之也甲戌齊國書帥師及吳戰于艾陵齊師敗績獲齊國書於是將戰吳子呼叔孫賜之甲劒鈹則魯與戰矣其不以與戰之辭言之何也諸侯以兵屬夷狄皆不序也既書公㑹吳伐齊而戰則從其恒辭魯人屈於彊夷而求伸於中國其罪不可掩矣秋七月辛酉滕子虞母卒冬十有一月𦵏滕隠公衛世叔齊出奔宋髙抑崇曰春秋書内外大夫出奔者凡六十葢君之股肱故重而書之然春秋之末何其出奔之多也是時政在大夫各欲自專始則相猜相忌終乃相攻相逐也十有二年春用田賦加賦也據傳仲尼曰以丘亦足矣則以丘賦者周制也今改用田賦是加賦也其制則不得而詳知矣何休氏曰田謂一井之田賦者斂取其財物也用田賦言以田為率也不言井者城郭里巷亦有井嫌悉賦之禮稅民田不過什一軍賦十六井不過一乗哀公外慕强吳空畫國儲故復用田賦也杜元凱曰一丘十六井丘賦之法因其土財通出馬一疋牛三頭是常賦之法今欲别其田及家財各為一賦故言用田賦也鄭康成曰見古者不以田為賦而今用田為賦也夏五月甲辰孟子卒左氏傳曰昭公取於吳故不書姓死不赴故不稱夫人不反哭故不言𦵏小君胡侍講曰禮娶妻不娶同姓買妾不知其姓則卜之厚男女之别也綴之以姓而弗别合之以食而弗殊雖百世而㛰姻不通周道然也昭公不謹於禮欲結好强吳乃取同姓以混男女之别禮之本喪矣吳先生曰不書薨𦵏亦以見魯人不以夫人之禮喪之也昭公君也且出之而𦵏不備況夫人乎公㑹吳于橐臯秋公㑹衛侯宋皇瑗于鄖宋向巢帥師伐鄭冬十有二月螽杜元凱曰周十二月今十月是歲應置閏而失不置雖書十二月實今九月之初尚温故得有螽至明年復十二月螽實亦十一月也趙鵬飛曰春秋書螽十有八皆在夏秋獨哀公之世再書螽皆在閉蟄之後此恒燠之證也燠而螽生災異兩興也黄震氏曰蝗蝻在地冬雪乃深入今冬燠而有螽將蔓延為來嵗之災矣十有三年春鄭罕達帥師取宋師于嵒夏許男成卒公㑹晉侯及吳子于黄池吴以號舉君臣同辭故柤之㑹書㑹吳傳以為夀夢也此其稱吳子何始接以諸侯之禮也吳僭王竊號其與諸侯交接往往禮文不典是以中國之君皆自為㑹而後殊㑹之故雖吾君之大夫與之特㑹亦一切以號舉而已黄池晉吳兩主之㑹然其盟而爭先歃也卒先晉人又子服景伯對吳人之辭有曰執事以伯召諸侯葢吳至是始竊侯伯之禮以與諸侯接而魯史亦假子爵以稱之也此盟矣何以不書單平公與㑹矣何以不志陳氏傳曰吳晉之盟春秋終諱之不以吳晉同主盟也公㑹晉侯及吳子雖兩主之之辭而春秋終不以吳晉同主盟也單平公不書不忍書也楚公子申帥師伐陳於越入吳薛士龍曰吳子忘不共戴天之讎爭中國諸侯於外而越卒入吳所謂無逺慮有近憂矣胡侍講曰吳嘗破越遂有輕楚之心既破楚又有驕齊之志既勝齊師復與晉人爭長自謂莫之敵也而越已入其國都矣吳侵中國而越滅之越又不監而楚滅之楚又不監而秦滅之秦又不監而漢滅之曽子曰戒之戒之出乎爾者反乎爾者也秋公至自㑹公㑹吳楚恒不致此以㑹晉侯故致之晉魏曼多帥師侵衛𦵏許元公九月螽冬十有一月有星孛于東方杜元凱曰平旦衆星皆没而孛乃見故不言所在之次凡星變無不書而春秋所書星變者四皆為天下紀異也莊公七年四月辛卯夜恒星不見夜中星隕如雨是時諸侯無王而伯者興雖曰假尊王以示義而天下大權由此實歸齊晉人情絶望於周矣故夫子於莊公之篇初序齊桓伯功而莊王僖王崩𦵏特削不書此天下一大變也文公十四年孛入北斗是時晉君少不在諸侯而楚圖北方中國罷於戰伐齊商人弑其君執天子之使諸侯不為之變王室益以㣲矣故夫子於晉靈㑹盟不序諸侯而楚君將稱君於是始是年頃王崩𦵏復削不書又一大變也昭公十七年有星孛于大辰平丘而後晉不復能主夏盟子朝之亂諸侯無勤王之師而春秋治在夷狄矣哀公之時東方諸侯制於吳越天下將變為戰國而春秋終焉以其時考之皆非常之異也盜殺陳夏區夫十有二月螽十有四年春西狩獲麟春秋曷為止於獲麟春秋固作於獲麟也獲麟則何以作春秋麟為聖人出也昔者有聖人受命則天必為出嘉瑞以應之麟鳳龜龍皆是物也是故庖犧氏王而河出圖大禹興而洛出書文王作而鳳鳴於岐山皆天之所命也當周之衰天下大亂孔子生有聖徳而不得其位諸侯未有能用之者固嘗嘆曰鳳鳥不至河不出圖吾已矣夫猶有待之辭也於是西狩獲麟而夫子老矣乃即魯史作春秋以當瑞應絶筆獲麟文止於所感明不敢廢天命也故王仲淹曰春秋其以天道終乎程子曰終麟感之始也觀西狩之獲而知天瑞之應聖人先天後天而天且弗違春秋之終不外此也杜元凱曰所感而作固所以為終也公羊傳曰麟者仁獸也有王者則至無王者則不至有以告曰有麕而角者孔子曰孰為來哉孰為來哉君子曷為為春秋撥亂世反之正莫近諸春秋制春秋之義以俟後聖以君子之為亦有樂乎此也春秋集傳卷十五
