body:
  text: 春秋集傳卷四元趙汸撰閔公元年春王正月公羊傳曰公何以不言即位繼弒君不言即位孰繼繼子般也孰弒子般慶父也榖梁傳曰親非父也尊非君也繼之如君父也者受國焉爾齊人救邢書救邢據外救不悉書豫伯者以救中國也夏六月辛酉葬我君莊公秋八月公及齊侯盟于落姑齊地公始受盟于伯主也凡受盟伯主恆稱及避外辭也據特相盟外為志日㑹落姑齊地也左氏傳曰請復季友也慶父殺子般季友避之於陳齊人既立其所出乃使魯人以其意請復季友閔公親至齊地受盟而後使召諸陳以慶父在也季子來歸大夫出入非罪不書則其曰季子何稱季子所以别有罪也以是為宜歸也大夫公子反國非有罪書者三據許叔蔡季春秋皆變文以書之以其有關於宗社之存亡也公羊傳曰其稱季子何賢也其言來歸何喜之也陳氏傳曰閔公立尚糿盟齊侯于落姑請復季友未知孰為之也國人之欲歸季子以已亂也而季子雖歸慶父夫人亂未已俄而殺閔公於是以僖公適邾則國人何賢乎季子微季子則慶父之篡成而莊公之統絶慶父之篡不成莊公之統不絶者季子在也是故奔陳不書如邾不書全季子也冬齊仲孫來來未有無辭者此其言來何大夫以事來言其事事不得書但言來從史文也齊人既立閔公復季友而慶父夫人之志未可知也於是仲孫以省難來不言省難存大體也仲孫何以不稱使閔公幼不以賔禮接也不名無所屈也吳先生曰蓋魯人以兩臣相見而不以見君也二年春王正月齊人遷陽夏五月乙酉吉禘于莊公禘者三年大祭之名也禮不王不禘諸侯三年喪畢致新死者於祖廟合羣廟之主而祭之謂之祫東遷諸侯僭天子禮樂魯人以禘禮祀周公其後遂僭用於羣公於是以禘代祫故三年大祭不曰祫而曰禘也吉者未三年也其言于莊公何莊公喪未闋用禘祭之備物盛樂就其主而祭之也郊特牲云諸侯之宫縣而祭以白牡擊玉磬朱干設錫冕而舞大武諸侯之僭禮也晉人亦曰以寡君之未禘祀當時諸侯僭天子以禘為喪畢大祭不惟魯也故曰禘東遷諸侯之僭禮也黃先生曰以魯頌白牡騂剛推之則記禮者言成王賜魯天子禮樂使祀周公過矣禘者殷諸侯之盛祭周公定為不王不禘之法故以祫代之成王蓋命魯以殷諸侯盛祭祀周公故牲用白牡白牡殷牲也魯公以下牲用騂剛雖合食而禮秩異於周公可見矣其禘於羣公則又後來之僭也公羊傳曰言吉者未可以吉也譏始不三年也髙抑崇曰魯人之喪莊公也既葬而絰不入庫門士大夫既卒哭而麻不入則當時未終喪皆吉服矣然則凡三年必以禘何以不悉書既以禘代祫為常祀則史不勝書唯於非禮之中記其又非禮者以詳事變而僭竊之罪因可見矣秋八月辛丑公薨公羊傳曰公薨何以不地隱之也何隱爾弒也孰弒之慶父也九月夫人姜氏孫于邾不日與弒也同文姜於是季友以僖公適邾懼其見討故與慶父俱出奔也公子慶父出奔莒不日與弒也大夫奔非罪不書通乎內外苟其罪有關於一國之大故則不可以無辨也故內大夫奔日有關於一國之大故則不日外大夫奔不月有關於一國之大故則月凡日為恆則不日為變不月為輕則月為重也慶父罪重於叔牙其不書刺何杜元凱曰慶父之罪雖重季友推親親之恩欲同之叔牙存孟氏之族故略其罪也公子牙實殺而書其卒慶父亦殺則其不書卒何不以卿禮成喪也冬齊髙子來盟榖梁傳曰盟立僖公也夫人慶父既出季友乃以僖公入主之其出入皆有請於齊故齊侯使髙子來盟以定公位公羊傳曰髙子者何齊大夫也何以不稱使我無君也吳先生曰其時魯無君季友接之以二臣相見也十有二月狄入衛此滅而曰入何也衛未絶也衛人立戴公以廬于曹齊侯使公子無虧戍之故不言滅也然則敗績不言敗績衛侯死之不言君滅何也略言之也公羊傳曰為桓公諱也春秋之初諸侯有戎難不書自有伯而後書以攘夷狄安中國之義責歸於伯者也則其略之何春秋有一國之故焉有天下之故焉苟一國之故而皆及伯者是諸侯無事守也是故書救邢不書邢潰書城緣陵不書淮夷於是書狄入衛不言君滅與桓公以存亡國之功而略其所不及以為天下之故又有大焉舍桓公無復執其咎者君子議道自己而置法以民略人之不及者所以勸其功也鄭棄其師此髙克出奔陳衆潰而歸則書曰棄其師何民為重也大夫出奔不書必有關於一國之故而後書古者人臣有去國之義苟無關於一國之故春秋奚治焉故特舉其重者言之莫重於棄其師也公羊傳曰鄭棄其師何惡其將也鄭伯惡髙克使之將逐而不納棄師之道也春秋集傳卷四
