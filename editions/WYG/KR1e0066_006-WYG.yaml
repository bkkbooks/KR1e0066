body:
  text: 春秋集傳卷六元趙汸撰僖公下十有九年春王三月宋人執滕子嬰齊執君不名此其名何孫明復曰遂失國也名者諸侯之終事也閔其失國故名以詳之滕子嬰齊戎蠻子赤皆失國者也其月異其事也執而遂失國不月戎也據哀四年晉人執戎蠻子夏六月宋公曹人邾人盟于曹南宋襄公欲求伯也以有微者與盟故月據隱八瓦屋不月鄫子㑹盟于邾公羊傳曰其言㑹盟何後會也己酉邾人執鄫子用之諸侯卒則名雖誘而殺之名蔡侯般此殺矣其不名何也諸侯不相名卒以名赴則名之其以名卒者必以名赴也小國之君不卒則亦不名也故邾人戕鄫子不名公羊傳曰惡乎用之用之社也何休氏曰不言社者本無用人之道言用之重矣榖梁傳曰人因已以求與之盟已迎而執之惡之故謹而日之據宣十八年邾人戕鄫子不日陳氏傳曰宋公使邾子用鄫子春秋舍宋而書邾以為皆國君也可以不受命矣而禀命於宋則邾為戎首杜元凱曰不書宋公使者南面之君善惡自專不得托於他命也左氏傳曰宋公使邾文公用鄫子于次睢之社司馬子魚曰民神之主也用人其誰饗之齊桓公存三亡國以屬諸侯義士猶曰薄德今一㑹而虐二國之君又用諸淫昏之鬼將以求伯不亦難乎得死為幸矣秋宋人圍曹陳氏傳曰宋公欲合諸侯而亟脩怨於曹諸夏之圍國自此始衞人伐邢冬㑹陳人蔡人楚人鄭人盟于齊楚初與諸夏盟也不言㑹之者内微者也稱人外微者也於是陳穆公請脩好於諸侯以無忘齊桓之德而陳人蔡人實先楚則非微者也曷為稱之同微者惡其不量已彼而進蠻荆以瀆齊盟卒為中國之患故奪其恒稱以示義也不月畧其事也不許其得國于夏監據僖二十年于邢二十一年鹿上宣十一年辰陵之類雖吾㑹之不月據此必吾君大夫在焉而後月重内也據僖二十一年盟于薄二十七年盟于宋襄二十七年盟于宋梁亡其言梁亡何不由赴告之辭也不由赴告則何以書叔鞅歸自京師言王室之亂也王室亂於是乎書魯人㑹盟四國大夫于齊聞梁之亡也歸而言之梁亡於是乎書尊王室而錄小國則亂亡有不由赴告而書者矣然則孰亡之秦亡之曷為不言秦亡之梁近秦而逺於中國無為以滅亡告諸侯者於是書之不由赴告則不言其亡之者避不敏也二十年春新作南門穀梁傳曰作為也有加其度也言新有故也杜元凱曰魯城南門也僖公更髙大之今猶不與諸門同改名髙門也劉侍讀曰新其舊而書新作是必有僭制焉二百四十二年興作多矣不必書也僖公修泮宫詩人頌之而春秋不書新宫災大室屋壞不能不修而春秋不書修之得其時制故不書也雉門及兩觀災記新作焉然則修舊不足書其書者皆非禮之制也南門之僭自僖公始故曰新作夏郜子來朝五月乙巳西宫災鄭人入滑不月有以來之也左氏傳曰滑人叛鄭而服於衛鄭公子士洩堵冦帥師入滑陳氏傳曰此鄭公子士洩也不書大夫將恒稱人也秋齊人狄人盟于邢外特相盟不書與狄盟何以書中國無伯傲很相亂也左氏傳曰盟于邢為邢謀衛難也冬楚人伐隨此鬭穀於菟也不書楚大夫將恒稱人也隨自是絀於楚不復通於諸侯矣二十有一年春狄侵衛宋人齊人楚人盟于鹿上齊地二國大夫曷為稱人以宋人求諸侯於楚而卒見詐焉以及於難故奪其恒稱也夏大旱秋宋公楚子陳侯蔡侯鄭伯許男曹伯盟于盂宋地楚稱爵而序于陳蔡之上初以諸侯之禮接也昔者成王舉熊繹以子男田于荆山盟于岐陽也置茆蕝設望表與鮮卑守燎而不與盟是周室之不成子也於是長於陳蔡之君則曷為稱子四夷大者曰子周之制也史惡其傲很僭竊不可通於諸侯則假周爵以稱之故呉亦曰子據吳太伯本非子男外傳命圭曰呉公春秋於侵伐既人之以示義則盟㑹從其恒稱以見實也執宋公以伐宋楚始列于㑹即執宋公以伐其國固楚之惡亦以罪宋之輕信以受侮也陳氏傳曰凡執恒稱人執之於伐則伐稱君執稱人於㑹則㑹稱君執稱人雖大夫也則亦㑹稱大夫執稱人此楚子執宋公則曷為不再言楚人不以蠻荆執諸夏之辭也是故執宋公不再言楚人執齊封亦不申言楚人冬公伐邾楚人使宜申來獻㨗君使大夫何以稱人獻㨗君禮也楚未書君將則雖來獻㨗人之以其伐宋也陳氏傳曰盂㑹稱子矣獻㨗于魯何以稱人盂㑹不稱子無以見楚宋之爭長獻㨗于魯不人之則是遂予楚也自是至椒之聘而後有君大夫榖梁傳曰㨗君得也其不曰宋㨗何也不與楚㨗於宋也胡侍講曰諸侯從楚伐宋魯獨不與故來獻㨗以威魯也十有二月癸丑公㑹諸侯盟于薄釋宋公諸侯不序前目後凡也其日以公與盟也諸侯外相盟不月據僖二十三十二狄宣十一辰陵惟吾君大夫特與之盟則日隱二文八戎此其日之何以兵加中國而公㑹之盟故日以殊之後見二十七宋成二年蜀榖梁傳曰外釋不志此其志何也以公之與之盟目之也不言楚不與楚專釋也二十有二年春公伐邾取須句此滅矣曷為不言滅凡滅國有取而有之者則不書滅以存亡繼絶之義責歸於取之者也故須句不書邾滅向不書莒滅惡其為滅國者受惡而始滅之者不復書也是經之變例也於是取須句反其君則書取何屬之以為附庸也陳氏傳曰春秋嚴義利之辨苟以為利一以取書之是故雖邾人滅須句須句子來奔伐邾取須句反其君書取須句雖莒著丘公立而不撫鄫鄫叛而來書取鄫夏宋公衞侯許男滕子伐鄭以鄭伯如楚故也秋八月丁未及邾人戰于升陘此公及之戰也曷為不言公蒙上文也邾人以須句故出師公禦之及邾人戰于升陘我師敗績故蒙伐邾取須句之文不言公見公以須句戰也不言師敗績為公諱也記曰邾婁復之以矢蓋自戰於升陘始是兩敗也冬十有一月己巳朔宋公及楚人戰于泓宋師敗績楚人伐宋以救鄭則何以不言伐外言戰不言伐也例在十五年榖梁傳曰日事遇朔曰朔陳氏傳曰楚嘗有君矣此楚子也其稱人何楚君將猶稱人也汪仲裕曰宋公身傷而不言宋公敗績據鄢陵言楚子敗績為中國諱也張主一曰惡以夷狄敗中國也二十有三年春齊侯伐宋圍緡伐國不言圍邑此其言圍邑何也以罪齊也齊孝公賴宋襄之力以得國當宋楚有事不能報施救患反乘其敗而伐之所謂以怨報德刑戮之民也故伐國圍邑悉書之以見其罪也夏五月庚寅宋公玆父卒秋楚人伐陳陳氏傳曰此成得臣也不書楚大夫將猶人也冬十有一月杞子卒二十有四年春王正月夏狄伐鄭秋七月冬天王出居于鄭王者無外此其言出何内王都也據昭二十六敬王書入于成周曷為言居而不言奔普天之下莫非王土禮天子適諸侯諸侯避正寢納管鑰而館於廟天子無客禮莫敢于主焉故不言奔而言居也葉少藴曰天子以畿内為國諸侯以封内為國諸侯不以其道去其封内曰出奔天子不以其道去其畿内曰出居子帶之亂方其奔齊也或放焉或封焉親愛之而勿殺可矣古人有行之者舜也而王不能反召之使得終其惡及其以狄伐周則罪在可殺古之人有行之者周公也而王不能反避之使得奪其位若襄王者可謂失其度矣則亦何以王天下哉陳氏傳曰王出不書為尊者諱也據莊二十三年惠王處櫟定六年敬王處姑猶其言出居于鄭何以為無足諱焉耳子頹之難惠王未有過也鄭虢圖之執燕仲父殺子頽踰年而復辟故諱之也襄王以狄伐鄭富辰諫弗聽又德狄以狄女為后諫弗聽子帶以狄師攻王王禦士將禦之又弗聽於是適鄭書曰天王出居于鄭雖然猶未書入也春秋善復正言入未足以言復正也襄王書出已矣而書王必如是而後可以言復正也晉侯夷吾卒不月來赴後也晉侯卒以前年九月文公定位而後來告故即告時書之春秋重喪紀雖後猶書之也二十五年春王正月丙午衞侯燬滅邢燬之名何也絶之也曷為絶之不正其以同姓而滅吾宗之國也邢與衛同出文王為同姓而魯與邢同出周公為同宗於是衛人滅邢而魯不能救疾其滅吾同太祖之國以顧懷周公故絶之也其日甚之也據滅國不日黄先生曰成王以周公有大勲勞於天下既封伯禽於魯又封其支子六人凡蔣邢茅胙祭是也至春秋時多為大國所併今邢又為衛滅矣邢與魯同出周公衞既忍滅周公之後魯不能為之請於天子請於大國請於衛以復存其社稷故書曰衞侯燬滅邢雖罪衞侯而繫於魯也夏四月癸酉衞侯燬卒宋蕩伯姬來逆婦榖梁傳曰宋蕩伯姬來逆婦非正也其曰婦何也縁姑言之之辭也劉侍讀曰書來逆公自主之也伯姬嫁不見于經蓋内女雖親體不敵不書于策所以尊君也今僖公以愛易典下主大夫之昬是卑朝廷而慢宗廟非禮也張主一曰姑自逆婦公不使大夫主之皆非禮也宋殺其大夫秋楚人圍陳納頓子于頓外納不書苟宜納雖伐不書此奔君也則其書圍陳以納之何以諸侯大夫不字小而後荆楚得假存亡之義以間中國也楚成得臣之伐陳也取焦夷城頓而還至是而納頓子則頓子之失國陳為之也陳氏傳曰出罪也納之者亦罪也則書之據北燕伯疑衞世子蒯聵出非其罪納之者罪也則但書納齊桓公卒楚始與諸夏盟于齊盟于鹿上執宋公納頓子侈然欲廢置諸侯矣春秋之所懼也王彦光曰頓子不名以諸侯不得相名也故北燕伯亦不名葬衛文公冬十有二月癸亥公㑹衞子莒慶盟于洮魯地中國無伯參盟復見也榖梁傳曰莒無大夫其曰莒慶何也以公之㑹目之也二十有六年春王正月己未公㑹莒子衛寗速盟于向齊人侵我西鄙公追齊師至酅弗及其侵曰人其追曰師侵言將追言衆也孫明復曰不可言公追齊人也榖梁傳曰人微者也侵淺事也公之追之非正也至酅急辭也杜元凱曰酅齊地也夏齊人伐我北鄙春秋君將稱君有二伯主將而稱君者與之以專征而討罪諸侯將而稱君者詳其自將以見實二者文同而義異故雖外侵伐我皆從其恒稱此齊侯也則其稱人何以魯人乞師于楚以伐中國故略言之也魯人常㑹盟于齊矣於是外附楚而内與衞莒為參盟以擯齊則齊豈無辭乎齊侯方以展喜之言退師而公子遂已乞師于楚故齊侯畧稱人為公以楚師伐齊言故而已衞人伐齊左氏傳曰洮之盟故也公子遂如楚乞師陳氏傳曰乞師不書據成二年臧宣叔如晉乞師此何以書惜魯也外乞師不書必盟主也而後書乞卑辭也以寳國而卑于楚為魯惜其以志楚强也秋楚人滅夔以夔子歸國滅而膚無不名者國滅之罪也膚服辱也而夔何以獨不名夔之所以取滅者乃非其罪故假之也楚祖鬻熊夔祖熊摯是不得祀者也諸侯之祀無過其祖者夔子可謂若于義矣而楚反以是滅之春秋以謂非其罪也故黜楚而伸夔於是乎夔子不名冬楚人伐宋圍緡宋即晉也吳先生曰宋成公忘其父之仇與楚平而往朝之二十四年今而即晉庶幾能徙義者矣故圍邑不書而楚人伐其國圍其邑悉書之以見荆楚之横也公以楚師伐齊取榖公至自伐齊公伐國不致此何以致為其用楚人之師以伐中國故致之也齊桓公合諸侯以伐楚而一匡天下桓公卒楚執宋公以伐宋敗宋于泓及宋平而宋不附伐陳圍陳納頓子而陳不從中國雖無伯而召陵之威烈未泯也魯人乃乞楚師以伐齊取榖寘桓公子雍于榖楚申公叔侯戍之以逼齊則東諸侯鮮不折而入於楚者是春秋之大變也二十有七年春杞子來朝杞伯何以稱子左氏傳曰公卑杞杞不共也襄公之世杞子來盟傳曰賤之也杞侯自貶以朝大國則曰伯魯人卑之則又曰子春秋從史文而魯惡見矣夏六月庚寅齊侯昭卒秋八月乙未葬齊孝公乙巳公子遂帥師入杞内入國不日據無駭帥師入極入杞必公將而後日此大夫也則其日何甚之也杞桓公來朝公卑之以子男禮見使公子遂帥師入杞責無禮焉僖公重小國之幣而薄姑姊妹之恩故日以甚之也冬楚人陳侯蔡侯鄭伯許男圍宋此楚子也其稱人何魯君將猶稱人也楚從陳蔡鄭許之君以圍宋而序諸侯之上則曷為但人之所以正楚之罪也楚强甚矣雖桓公盛時楚猶未嘗一日而忘諸夏桓公卒楚得衛得曹得魯而從陳蔡鄭許之君以圍宋楚之得志於諸夏未有甚於此時者然召陵之烈未泯而晉文之義已信於諸侯宋之不詘於楚者以有晉也楚雖欲一日得志於諸夏不可得也故雖序於諸侯之上猶人之信中國之大義以正其罪也十有二月甲戌公㑹諸侯盟于宋其日以公在也例在二十一年葉少藴曰諸侯不序前目後凡也僖公附楚者也楚子居申而後使子玉去宋則是㑹非觧圍也宋猶在圍則何以宋地盟于宋國之外是于宋矣二十有八年春晉侯侵曹晉侯伐衛侵曹伐衛討其附楚也杜元凱曰再舉晉侯曹衛兩來告也孫明復曰曹衛楚與國也晉侯將救宋故侵曹伐衞不言遂者非繼事也侵曹既反而後伐衛也李堯俞曰遂者因近適逺之辭曹逺衛近不得以為繼事而言遂也公子買戍衞不卒戍刺之晉伐衞而魯戍之欲拒晉以與楚也刺殺也内殺大夫曰刺左氏傳曰楚人救衞不克公懼於晉殺子叢以説焉謂楚人曰不卒戍也其不日何據刺公子偃書日以僖公背晉即楚而賊殺其親以兩説于晉楚故異之也楚人救衞陳氏傳曰楚嘗救鄭不書見傳僖公六年二十二年於是始書以為晉文之伯楚欲救而不能也三月丙午晉侯入曹執曹伯畀宋人其日謹其事也外入國不日雖君將不日據哀八年宋入曹必伯者有討於諸侯而後日謹之也不言執之者蒙上文也公羊傳曰稱侯而執者伯討也稱人而執者非伯討也晉侯侵曹而曹不服於是入曹執曹伯故蒙上文晉侯予之以討罪也孫明復曰晉侯入曹執曹伯不歸于京師而畀宋人甚矣稱晉侯者執得其罪也孫莘老曰晉侯能扶大義以討叛國而尊王室故春秋予之也夏四月己巳晉侯齊師宋師秦師及楚人戰于城濮楚師敗績衞地是宋公齊國歸父秦小子憖也則何以但稱師宋公不與戰大夫將恒稱人也髙抑崇曰城濮衞地及楚人戰者與救衞之師戰也楚之强甚於齊桓之時晉文公一戰勝楚終文以及襄之世楚人不敢復窺中國則功莫盛於此矣董仲舒曰戰不若不戰然而有所謂善戰盟不若不盟然而有所謂善盟故城濮之戰召陵之盟皆春秋之所予者以其俱有攘夷狄之功也楚殺其大夫得臣此成得臣也其不稱氏何據楚殺公子例不去公子討當其罪也禮謀人之軍師敗則死之謀人之邦邑危則亡之晉侯之入曹也楚子使申叔去榖使子玉去宋曰無從晉師子玉不從請戰戰焉楚師大崩則其罪宜討者也春秋稱國以殺大夫有非其罪者矣苟殺之非其罪則譏不止專殺也於是楚以罪討其大夫而與殺非其罪者同文則是非何以辨焉故得臣令尹也但名之以辨於稱國以殺大夫而不當其罪者舍是則楚宜申宋山皆討當其罪者也雖然春秋又有懼焉法以輔治有天下國家者所以興衰也故戰勝而或廢法則終必削雖敗而能用法則後必彊城濮之敗子玉死之楚是以興邲之戰荀林父免焉晉於是為不競矣衞侯出奔楚五月癸丑公㑹晉侯齊侯宋公蔡侯鄭伯衞子莒子盟于踐土鄭地於是王子虎實盟諸侯則曷為不書諱之也據洮之盟書王人周之制諸侯有疑則盟於㑹同王官之伯臨之伯不盟也故齊桓公盟王人不敢盟宰周公不敢以所不信施於尊者晉文公一戰勝楚不能自信於諸侯作王宫致天子而屈王子於盟襄王下勞晉侯策命專征不能委任方伯而以大臣盟諸侯於王所是以天子與斯盟也故王子虎不書使若諸侯自相盟然為天王與晉侯諱之所以尊王室而全伯者之功也其日何以文公尊王定伯不俟再舉同之葵丘也胡侍講曰叔武受盟稱子立以為君也陳侯如㑹劉侍讀曰如㑹聞㑹自至也孫明復曰來不及盟也公朝于王所踐土之諸侯也其但言公何非期㑹不序也曷為先言㑹後言朝得見乎天子而後志之也朝王日據下壬申著例此何以不日盟之日也見諸侯已盟而後見乎天子非㑹盟則不見也天子所在曰王所據覲禮榖梁傳曰朝不言所言所非其所也公羊傳曰曷為不言公如京師天子在是也天子在是則曷為不言天子在是不與致天子也六月衞侯鄭自楚復歸于衞君歸言復已失國之辭也凡執君歸不言復必奔君而後言復執猶未絶于衞也故執不月必奔而後月執而歸不月必奔而歸而後月執未失國也奔已失國也衞侯出奔不名則復歸何以名叔武立矣不可以無辨也歸君不言自此其言自何惡自楚也以其叛中國即蠻荆而得免於誅故言所自以見其罪也何休氏曰刺歸有罪也天子所以陵遲者為善不賞為惡不誅衞侯出奔楚當絶不當廢叔武而反衞侯令殺叔武也衞元咺出奔晉愬殺叔武也殺叔武曷為不書春秋舉重衞侯之罪莫重於叛中國故一見之也由僖公而上政不在大夫故外大夫無書奔者自元咺而後大夫益專其出奔非有罪則彊家相傾苟為不然則亦闗乎一國之故與公子之未命者異故悉書之陳侯款卒秋杞伯姬來來謝過而求平也公子遂如齊冬公㑹晉侯齊侯宋公蔡侯鄭伯陳子莒子邾子秦人于温討衞許也天王狩于河陽晉地於是襄王㑹諸侯于温則其曰狩何非狩也春秋之特筆也以天子而㑹諸侯則上僭以諸侯而致天子則下陵上僭而下陵中國之所以傾也以晉文之伯而君臣兩失之將無以示天下故以狩書也然則踐土曷為不曰王狩㑹可言狩此不可言狩也踐土之盟王子虎在焉不書嫌以天子與斯盟也苟書狩而後盟則是以天子與斯盟矣春秋有二事而一譏者於河陽書狩則踐土之失不待言矣公羊傳曰狩不書此何以書不與再致天子也榖梁傳曰全天王之行也為若將狩而遇諸侯之朝也為天王諱也孫明復曰以王狩為文所以詘彊侯而尊天子也壬申公朝于王所其日謹其事也不月由㑹録也公㑹諸侯不月雖伯者亦不月春秋有為下事月者此獨不為下事月何繫之㑹也明以㑹而後朝非㑹則不朝也榖梁傳曰日繫於月月繫於時壬申公朝于王所其不月失其所繫也以為晉文公之行事為已傎矣晉人執衞侯歸之于京師曷為有言歸于有言歸之于歸于正也歸之于不正也衛侯與元咺訟不勝晉侯殺其坐獄之臣而刑其輔然後執衞侯歸之于京師請以王命殺之是生殺之權名在天子而實在晉侯也故曰歸之于彊辭也公羊傳曰衛侯之罪何殺叔武也文公逐衞侯而立叔武叔武辭立而他人立則恐衞侯之不得反也故於是已立然後治反衞侯衞侯得反曰叔武簒我終殺叔武此晉侯也其稱人何衞之禍文公為之也文公逐衞侯而立叔武使人兄弟相疑放乎殺母弟者文公為之也衞元咺自晉復歸于衞奔大夫歸不書據惠王復周公忌父鄭復公父定叔宋復蕩意諸不書必挾外援以歸然後書元咺言出言歸出入皆有罪也出入皆有罪則其言復歸何凡歸言復者位已絶也咺以臣愬君是自絶於君矣大夫自絶於君無反國之義而咺將易置其君以歸故書歸而言復以罪之也其曰自晉譏在晉也陳氏傳曰歸大夫不言復必諸侯也而後言復君有歸道也大夫言復者伉也是故衛元咺復歸宋魚石晉欒盈復入皆伉辭也諸侯遂圍許遂繼事也諸侯既㑹于温朝天子執衞侯歸元咺而後圍許也曹伯襄復歸于曹遂㑹諸侯圍許執君歸不書據鄭伯襄莒子邾子此何以書釋有罪也國君言歸必嘗失國者也此未失國則曷為不宜歸曹伯附荆楚以拒中國之師則其罪宜絶其罪宜絶而歸之晉侯失刑矣故執君歸不言復於是言復失國非二君不名於是特名之罪之也罪曹伯所以譏晉也二十九年春介葛盧來介東方國名葛盧其君也昔者衞侯來㑹惠公葬隱公不見史不書今公猶在㑹則介人何以書成公意也僖公始作頌而以來淮夷為誇故雖不見公書之以其能來也公至自圍許桓文之㑹不致此以圍許致同於桓之致伐也夏六月㑹王人晉人宋人齊人陳人蔡人秦人盟于翟泉洛陽城内地此公㑹王子虎晉狐偃宋公孫固齊國歸父陳轅濤塗也曷為不序諱以大夫盟王子也諸侯不得盟王子而况於大夫大夫不得㑹公侯而况於盟晉侯功勲已著不能以道事天子撫諸侯而亟於尋盟於是以大夫盟王子而使吾君親之以大夫盟王子而諸侯㑹之是無上下也故内不書公而王子與諸大夫皆稱人若使微者相與盟然諱之者譏之也陳氏傳曰大夫之交政於是始文公為之也不斥言王子虎為尊諱也以其人王子虎不可不徧人諸侯之大夫以其徧人諸侯之大夫不可不没公也秋大雨雹冬介葛盧來以未見公故復來也公羊傳曰不言朝不能乎朝也啖叔佐曰不廟受也三十年春王正月夏狄侵齊秋衞殺其大夫元咺及公子瑕榖梁傳曰稱國以殺罪累上也以是為訟君也衛侯在外其以累上之辭言之何也待其殺而後入也孫莘老曰瑕見立於元咺以咺及之者言瑕之見殺由於咺也王㳂氏曰咺嘗君瑕今與咺同殺故言及而稱公子者不與咺君之也髙抑崇曰殺而書及者以某之故而累及某也據士縠及箕鄭父慶虎及慶寅不書及者其罪同其殺之志均也據趙同趙括郤錡郤犫欲至衞侯鄭歸于衞言歸釋有罪也向也言復歸今歸不言復何不以其罪討也衞侯之罪莫大於叛中國晉侯立叔武而歸衞侯不正其罪而受元咺之愬為臣執君則討之不以其罪矣此歸自京師也曷為不言自京師不以衞侯之獄累京師也晉侯復元咺于衞使立公子瑕而請王命以殺衞侯天子曰不可君臣無獄元咺雖直而不可聽也又為臣而殺君其安用刑晉人乃歸衞侯則衞侯之不君元咺之不臣叔武與瑕之死皆晉人為之故不以累京師也晉人秦人圍鄭此晉侯秦伯也曷為稱人秦遂叛晉也城濮之未集鄭伯如楚致其師鄭非知罪也而晉與之成矣踐土之盟温之㑹鄭無不在焉而翟泉不至以晉猶未釋于鄭也晉侯執曹伯曹人虞其亡執衞侯將寘諸死而皆不能正其罪苟不釋于鄭豈可量也鄭是以不至而晉侯召秦伯與之圍鄭晉為已甚矣此鄭之所以不下晉而私於秦也夫晉率諸侯以攘夷安中國也而使諸侯皆不知其罪而滅亡是懼雖秦人豈能無中變哉於是秦伯私與鄭盟戍鄭而去之蓋秦之叛夏盟於是始是故皆奪其恒稱以秦則有罪矣而晉亦有以致之也介人侵蕭冬天王使宰周公來聘公子遂如京師遂如晉並稱如皆以聘禮行也諸侯於天子有職貢而無聘問聘問者上之所以交乎下也東遷王室日微職貢不歸久矣襄王既朝諸侯使宰周公來聘而後魯人亦以聘禮上問如邦交諸侯之伉也不專使而兼事以行示其禮均也孫明復曰天子至尊非諸侯可得而伉也僖公與襄王交聘伉孰甚焉故曰天子使宰周公來聘公子遂如晉以譏之陳氏傳曰自桓王以下王室無聘魯者於是再聘而宰周公實來則已尊矣公子遂如京師遂如晉以其如京師不敢不如晉是夷周於晉也三十有一年春取濟西田此曹田也不曰曹受之晉也諸侯有罪削地當歸天子非天子不得削人土地晉侯執曹伯解其地以分諸侯晉之分魯之取皆非也以楚師伐齊取榖公子戍衞不卒戌刺之魯之罪不薄於曹而分曹地是非賞罰也見伯者之以利結諸侯也公子遂如晉夏四月四卜郊不從乃免牲猶三望郊者郊祀上帝以祈榖也禮天子以孟春之月元日祈榖于上帝謂夏正斗建寅之月也元日上辛日也魯僭天子之禮然猶不敢直用上辛而卜之卜三月上辛不吉則卜中辛中辛不吉則卜下辛若三卜皆不從則不郊示不敢專也今乃四卜非也免猶放也不郊於是卜免牲卜不吉則繫而待明年具牲時用今卜而吉故放其牲也不言不郊者從可知也猶者可以止之辭三望謂郊時所望祭四方山川魯郊雖僭猶不敢同於天子故闕其一也據周禮四望不郊而望亦非也魯郊非禮也然既歲卜而郊則史不勝書故於失禮之中書其又失禮者於是四卜猶三望故書之也公羊傳曰三卜禮也四卜非禮也求吉之道三禘嘗不卜郊何以卜卜郊非禮也卜郊何以非禮魯郊非禮也天子祭天諸侯祭土天子有方望之事無所不通諸侯山川有不在其方内者則不祭三望者何望祭也然則曷祭祭泰山河海猶者通可以已也何以書譏不郊而望祭也左氏傳曰望郊之細也不郊亦無望可也榖梁傳曰夏四月不時也四卜非禮也免牲者為之緇衣纁裳有司𤣥端奉送至于南郊免牛亦然已牛矣而又免之何也嘗置之上帝矣故卜而免之不敢專也陳氏傳曰諸侯之有郊禘東遷之僭禮也故曰秦襄公始列於諸侯作西畤祠白帝僭端見矣位在藩臣而臚於郊祀君子懼焉則平王以前未有也魯之郊禘惠公請之也據邵氏經世惠公立於秦襄祠白帝之年齊桓公欲封禪而亦郊鯀皆僭禮也然則春秋何以始見於僖公向者莊公之觀齊社也曹劌諫曰天子祀上帝諸侯㑹之受命焉諸侯祀先王先公卿大夫佐之受事焉用見惠公雖請之而魯郊猶未率為常也僖公始作頌以郊為誇焉於是四卜不從猶三望也秋七月冬把伯姬來求婦秋圍衛十有二月衛遷于帝丘三十有二年春王正月夏四月己丑鄭伯捷卒衞人侵狄秋衞人及狄盟冬十有二月己卯晉侯重耳卒三十有三年春王二月秦人入滑杜元凱曰滅而書入不能有其地也齊侯使國歸父來聘夏四月辛巳晉人及姜戎敗秦師于殽晉人者晉子也稱人畧言之也嗣君在喪以師行者稱爵謂得已而不己者也於是秦將襲鄭滅滑而還晉先軫曰秦不哀吾喪而伐吾同姓遂發命遽興姜戎子墨衰絰敗秦師于殽晉伯國也故畧稱人不使與得已不己者同文而日以謹之與之以繼伯而討罪也曰及者明以尊及卑别晉人之嫌也外相敗不書以秦人背晉而戍鄭又將因戍人以襲鄭其反覆乎晉鄭之閒小人之尤也使秦人得志於中國其禍豈減於荆楚哉是故伯國之所宜討者故特書之也癸巳葬晉文公狄侵齊公伐邾取訾婁間晉之有事也秋公子遂帥師伐邾晉人敗狄于箕太原陽邑縣南此晉侯也其稱人何子夏問曰三年之喪卒哭金革之事無辟也者禮與初有司與孔子曰吾聞諸老聃曰昔者魯公伯禽有為為之也今以三年之喪從其利者吾弗知也狄伐晉及箕晉侯敗狄于箕以其有為為之故不與得巳不已者同稱也不月畧其事也據晉敗狄三皆不月陳氏傳曰中國敗戎師不書據隱九年鄭人大敗戎師閔二年虢公敗犬戎之類唯晉特書之特書晉者皆病晉也晉帥天下諸侯以扶義存中國也前年狄侵齊去年狄侵衞而晉不能救於是伐晉蓋僅而後勝之也以是為盟主病矣冬十月公如齊不如晉而如齊謂晉無能為也十有二月公至自齊乙巳公薨于小寢小寢内寢也君薨必於路寢就羣臣百官以明授受所以正其終也僖公秋伐邾冬如齊反而薨於小寢其志荒矣榖梁傳曰小寢非正也左氏傳曰即安也趙伯循曰大位奸之窺也危病邪之伺也若敝於隱是女子小人得行其志也隕霜不殺草李梅實冬燠也榖梁傳曰未可殺舉重也可殺而不殺舉輕也范寗氏曰輕者不死則重者可知也公羊傳曰記異也杜諤氏曰春秋記災異不遺微細所以謹人君之戒也明天地之大動植生殺隂陽之應皆繫人君之身也晉人陳人鄭人伐許討其貳於楚也前年春楚鬭章請平于晉晉陽處父報之晉楚始通文公為之也襄公始有志於諸侯不先定東諸侯之交而有事于許非其序也雖然伐許猶可也伐沈微矣春秋集傳卷六
