body:
  text: 春秋集傳卷十二元趙汸撰昭公上元年春王正月公即位叔孫豹㑹晉趙武楚公子圍齊國弱宋向戌衛齊惡陳公子招蔡公孫歸生鄭罕虎許人曹人于虢左氏傳曰㑹于虢尋宋之盟也楚令尹圍請用牲讀舊書加于牲上而已晉人許之杜元凱曰楚恐晉先歃故不歃此所以不書盟三月取鄆鄆者莒魯所爭邑也文十二年季孫帥師城鄆襄十二年救台遂入鄆莒嘗取之不書外取邑雖取之我猶不書也據成二年齊取龍不書此季孫宿伐莒取鄆則其不言伐莒何為内諱也叔孫豹及諸侯之大夫㑹楚公子圍于虢以弭兵尋宋之盟而宿背叔孫違盟伐莒以取鄆於是莒人愬于㑹叔孫幾為戮賴晉趙武固請於楚而後免故不言伐使若不以師得然而特月以異之據内取邑不月譏在内也夏秦伯之弟鍼出奔晉左氏傳曰書曰秦伯之弟鍼罪秦伯也榖梁傳曰諸侯之尊兄弟不得以屬通其弟云者親之也親而奔之惡也公羊傳曰有千乗之國而不能容其母弟也六月丁巳邾子華卒晉荀呉帥師敗狄于大鹵陳氏傳曰晉自悼公以來狄師不出敗狄至是而再見其再見何晉彌衰也悼公之伯也魏絳諌曰勞師於戎而楚伐陳必弗能救是棄陳也悼公不能用其言卒復有事於無終既失諸侯雖有大鹵之㨗何益至伐鮮虞春秋遂貶晉矣秋莒去疾自齊入于莒公子恒稱公子必篡若爭國而後名之莒犂比公生去疾及展輿展輿弑君而立莒人召去疾于齊則去疾宜入者也曷為稱之與爭國同也春秋美惡不嫌同辭展輿已立矣而去疾自外而入則固書之與爭國者同也苟曰公子去疾則與大夫之以惡入者無辨矣莒展輿出奔呉展輿嘗踰年矣不稱爵未有成之為君者也叔弓帥師疆鄆田榖梁傳曰疆之為言猶竟也公羊傳曰與莒為竟也曷為帥師而往懼不服也髙抑崇曰疆者封溝之也季孫嘗帥師城鄆後復為莒所取今乗莒亂而取之又帥師以疆之者懼不服也葬邾悼公冬十有一月己酉楚子麇卒陳氏傳曰此公子圍弑其君則其書卒何以君薨赴也君弑矣晏然赴於他國之君如恒辭猶鄭騑也而其臣子聽焉相與設應為後之辭甚矣無人紀也從而書卒所以誅楚之臣子聼賊之所為也圍之未弑也魯蔡鄭之大夫固知之矣㑹于甲以齊慶封徇于諸侯曰無或如齊慶封弑其君弱其孤以盟其大夫慶封曰無或如共王之庶子圍弑其君兄之子麇而代之以盟諸侯軍人粲然皆笑史見其事春秋著其心則後世有考矣楚公子比出奔晉比與圍兄弟也而為右尹於是不義圍而出則非其罪矣出非其罪則曷為書之以圍殺立之罪不著於春秋故書比之出以明變也二年春晉侯使韓起來聘夏叔弓如晉秋鄭殺其大夫公孫黑此殺有罪也曷為從其恒稱據楚得臣宜申宋山皆去族不能以時討也劉侍讀曰稱國以殺大夫者罪累上也黑有罪其以累上言之何惡鄭伯也何惡乎鄭伯言不得討有罪以放乎亂也其放乎亂奈何黒伐良霄而逐之君弗誅也以為大夫又與公孫楚爭娶徐吾氏君放楚而盟諸大夫黒於是自以為卿又將為亂疾作而卧子産使吏數諸其家則幸而勝之爾國君専殺大夫非王法所得為也然而春秋或與之所以見君臣之禮扶上而抑下也先王之法不誅不教不誣無罪及其惡成而罪見誅之無留獄矣豈幸而勝之哉冬公如晉至河乃復公如晉弔少姜也及河晉侯使人來辭曰非伉儷也請君無辱乃還晉猶不敢以嬖寵之喪辱國君也以公自卑為己甚矣趙武之卒也鄭伯如晉弔及雍乃復諸侯自卑以事晉者不惟魯也季孫宿如晉三年春王正月丁未滕子原卒夏叔弓如滕五月葬滕成公杜元凱曰卿共小國之葬禮過厚也葬襄公滕子來㑹故魯厚報之秋小邾子來朝八月大雩冬大雨雹北燕伯款出奔齊四年春王正月大雨雹夏楚子蔡侯陳侯鄭伯許男徐子滕子頓子胡子沈子小邾子宋世子佐淮夷㑹于申楚始専合諸侯也申楚地在方城之内合南北諸侯十有二國于方城之内宋世子與淮夷俱繼小國之君盖自楚入中國以來所未有而晉人聽焉則宋之盟為之也晉侯安於宴樂不在諸侯公室以卑政在大夫而軍政日弛於是中實畏難而文以不爭則雖欲不以諸侯與楚不可得矣髙抑崇曰申之㑹非與國則小國而已魯齊衛曹薛邾把不㑹也宋鄭滕小邾雖㑹而終不與也則雖偃然肆志以専諸侯諸侯亦不得已而從之爾楚人執徐子陳氏傳曰楚執舒子呉執鍾離子皆不書此何以書執徐子危㑹申之諸侯也自宋之盟中國無大盟㑹越九年而十二國之君皆受命于楚於是執徐子將以威中國也是故其類相執不志為中國危之故志之也秋七月為滅國月也楚子蔡侯陳侯許男頓子胡子沈子淮夷伐吳再序諸侯有不與伐者也宋華遂鄭大夫從不書凡諸侯以兵屬于楚皆不書也執齊慶封殺之榖梁傳曰為齊討也慶封弑其君而不以弑君之罪罪之者慶封不為靈王服也不與楚討也春秋之義用貴治賤用賢治不肖不以亂治亂也孔子曰懷惡而討雖死不服其斯之謂與陳氏傳曰執齊慶封何以伐吳慶封再奔吳吳予之朱方此執有罪也曷為不再言楚子據㑹于戚晉侯執曹伯再言晉侯不予楚以討齊慶封之辭也猶曰諸侯執之焉耳申之㑹楚始専合諸侯春秋之大變也訖于厥憖諸夏無㑹同者十年而楚執齊慶封放陳招殺蔡般假討賊之義以號于天下由是而滅賴滅陳滅蔡矣遂滅賴遂滅國何以不日據襄十年諸侯㑹于柤遂滅偪陽異其事於中國也諸侯滅國不日必有謂而後日甚則不月呉楚滅國不月必有謂而後月甚則日一滅國也而所以詳略不同春秋治呉楚固與中國異也九月取鄫其言取之何兼之也莒滅鄫不能救於是鄫叛而來不能以興滅繼絶之義請于天子告于方伯而遂兼之是鄫卒滅於我也故特月以異之據内取國不月冬十有二月乙卯叔孫豹卒五年春王正月舎中軍左氏傳曰卑公室也舎中軍則何以為卑公室季孫宿以三分公室為未足於是舎中軍四分公室季氏擇二二子各取其一皆盡征之而貢于公則魯公寄食於三家不復有民矣陳氏傳曰舎中軍從祀先公皆善辭也微國史無以知舎中軍為季氏専魯從祀先公為陽虎専季氏也然則春秋固不可以無史與豈惟春秋孔氏之述六經也則以歴世之史筆削之焉爾史行於天下六經修於聖人萬世之後史與經並傳有以考吾之所去取者矣春秋固東遷之史也舎中軍從祀先公是季孫宿陽虎之事魯史云然我何加損焉不没其實焉爾矣苟其文不可以不是正則有筆削苟不必是正雖無筆削可也楚殺其大夫屈申公如晉夏莒牟夷以牟婁及防兹來奔榖梁傳曰莒無大夫據莒大夫盟㑹皆書人其曰牟夷以地來重地也及防兹以大及小也公羊傳曰其言及不以私邑累公邑也秋七月為下事月也公至自晉戊辰叔弓帥師敗莒師于蚡泉秦伯卒冬楚子蔡侯陳侯許男頓子沈子徐人越人伐呉其曰徐人越人便文也故便文則曰徐人越人復其恒稱則曰徐曰於越皆從史文也劉侍讀曰呉楚徐越雖比於荒裔而其實不同吳太伯之後也楚祝融之後也徐伯益之後也越大禹之後也其上世皆有元徳顯功通乎周室與中國冠帶之君無異徐始稱王楚後稱王吳越因亦稱王王非諸侯可當稱也故春秋擯諸中夏雖然猶不欲絶其類也是以列號則舉其本封書爵則黜其僭竊推之可逺引之可來此聖人慎絶人亦春秋之意也六年春王正月把伯益姑卒葬秦景公始㑹秦葬也夏季孫宿如晉左氏傳曰拜莒田也葬把文公宋華合比出奔衛秋九月大雩楚薳罷帥師伐吳冬叔弓如楚齊侯伐北燕七年春王正月暨齊平燕及齊平也左氏傳曰暨齊平齊求之也榖梁傳曰暨者不得已也不言燕蒙上文也州公如曹六年春正月寔來齊侯伐北燕七年春王正月暨齊平皆蒙上文也陳氏傳曰平不書必闗於天下之故而後書於是燕大夫比以殺公之外嬖公懼奔齊齊侯伐燕納簡公庶㡬天下之大義也而取燕姬與其寳賂而還不書平是與齊以定燕也靈公以來齊首敗伯主之約納晉欒盈叛人也納北燕伯猶庶幾乎天下之大義而卒與之平是黨亂臣逆子也是故昭定而下春秋多罪齊書伐衛遂伐晉圍衛齊襲莒暨齊平盟于鹹次于伍氏皆罪齊也夫子曰齊景公有馬千駟死之日民無得而稱焉盖不予齊也三月公如楚叔孫婼如齊涖盟夏四月甲辰朔日有食之秋八月戊辰衛侯惡卒九月公至自楚冬十有一月癸未季孫宿卒十有二月癸亥葬衛襄公八年春陳侯之弟招殺陳世子偃師榖梁傳曰鄉曰陳公子招今曰陳侯之弟招何也盡其親所以惡招也兩下相殺不志乎春秋此其志何也世子云者惟君之貳也云可以重之存焉志之也陳氏傳曰兩下相殺雖世子不書據陳佗曹負芻此何以書斥君之辭也陳侯鮑卒佗殺太子而自立曹伯盧卒負芻殺太子而自立猶兩下相殺也初哀公元妃生偃師而嬖二妃屬其子留於公子招公子過哀有廢疾招殺其世子偃師而立留哀公經而死哀有世子矣又屬其嬖子於二公子為是殺世子則譏不但其人也書曰陳侯之弟招殺陳世子偃師陳侯溺卒斥君之辭也夏四月辛丑陳侯溺卒叔弓如晉楚人執陳行人干徴師殺之陳公子留出奔鄭留已立矣其曰公子何也據莒展輿出奔不言公子不以留首惡也公子招立公子留使干徴師告于楚楚人執而殺之公子留奔鄭不曰陳留蔽罪於立之者也是故衛公子瑕楚公子比嘗篡立矣苟有立之者則首惡不在其人故其殺皆曰公子秋蒐于紅師田違禮自僖文而後不書者五公矣蒐于紅何以書自僖公救齊而後將帥無公臣凡師皆大夫師之苟軍政不出於公則閱治田狩之事不足譏也於是舎中軍三家分魯而自為師乃蒐于紅以大閱焉盖魯君無民於是始則其事與師田違禮者不侔矣故大蒐于比蒲于昌閒終春秋悉書之詳著其世變以譏大夫之不臣也陳氏傳曰蒐于紅也自根牟至于商衛革車千乗皆三家之師也自是而屢蒐皆三家所以耀武焉爾是故莊桓之狩必言公昭定之蒐不言公矣陳人殺其大夫公子過於是公子招歸罪於公子過而殺之陳無君者五月矣曷為稱人以殺與討亂同辭公子過與殺偃師者也以其罪宜討故不曰招殺而稱人以殺以為猶國人殺之也大雩冬十月壬午楚師滅陳執陳公子招放之于越殺陳孔奐葬陳哀公曰滅曰執曰殺曰葬皆楚子也據傳楚子在師則曷為但稱師異其文以異其事也楚子奉孫呉以討於陳曰將定而國陳人聽命而遂縣之十一年傳文則是楚人以詐滅中國而已是故滅陳滅蔡皆不稱楚子稱楚子則疑於楚莊據滅蕭入陳皆稱楚子于是乎特書日以甚之盖陳蔡非近楚之小國比也以楚滅陳蔡而中國不能救大其變故皆日以謹之陳孔奐者公子招之黨也放招而殺奐見楚人之暴而非能用刑也不言大夫據放與殺皆書大夫略外討也黎錞氏曰葬陳哀公非我徃㑹而書也楚既滅陳以其君在殯因取而葬之事與齊侯葬紀伯姬同經已而書楚滅陳則執陳公子招殺陳孔奐葬陳哀公皆蒙上文云爾九年春叔弓㑹楚子于陳許遷于夷夏四月陳災外災不月其月異亡國也公羊傳曰陳已滅矣其言陳火何存陳也髙抑崇曰陳雖已滅而土地人民猶在焉不與楚滅之故還繫之陳秋仲孫貜如齊冬築郎囿十年春王正月夏齊欒施來奔秋七月季孫意如叔弓仲孫貜帥師伐莒陳氏傳曰舎中軍矣曷為書三卿帥師四分公室叔弓為意如貳也於是伐莒叔弓佐意如序於仲孫貜之上而叔孫婼居守自是訖春秋魯有四卿而權歸三家戊子晉侯彪卒九月叔孫婼如晉葬晉平公十有二月甲子宋公成卒不書冬史闕文十有一年春王二月叔弓如宋葬宋平公夏四月丁巳楚子䖍誘蔡侯般殺之于申此討賊也雖誘殺之疑若無罪春秋深惡楚子貶而稱名何也䖍本心欲圖其國不為討賊舉也名之所以正其罪也故其自相殺不名據十六年楚子誘殺戎蠻子書日謹之也據宣十八邾戕鄫子不日故其自相殺不月亦據殺戎蠻子榖梁傳曰何為名之謹之而名之也稱日稱地謹之也地謹之也公羊傳曰楚子䖍何以名絶曷為絶之為其誘討也此討賊也雖誘則曷為絶之懷惡而討不義君子不與也孫明復曰般之罪不容誅矣楚子貪蔡土地殺之不以其罪故生而名之不得以討賊論當坐誘殺蔡侯般也楚公子棄疾帥師圍蔡五月甲申夫人歸氏薨大蒐于比蒲左氏傳曰齊歸薨大蒐於比蒲非禮也晉叔向曰魯公室其卑乎君有大喪國不廢蒐有三年之喪而無一日之慼仲孫貜㑹邾子盟于祲祥不月略之也例在成元年秋季孫意如㑹晉韓起齊國弱宋華亥衛北宫佗鄭罕虎曹人把人于厥憖謀救蔡而弗克也楚師在蔡晉荀吳曰不能救陳又不能救蔡為盟主而不恤亡國將焉用之於是合九國之大夫于厥憖而不能師使狐父請蔡于楚弗許則韓起之懦也九月己亥葬我小君齊歸冬十有一月丁酉楚師滅蔡執蔡世子有以歸用之曰滅曰執曰用之皆楚子也其稱師何以其懐詐以滅中國而絶其世與爭諸侯之日不同故異其事也其日謹之也孫明復曰言世子有者有未立也父殺國圍拒守危困以至於死未立可知也劉侍讀曰楚子䖍誘蔡侯般殺之世子有守國楚師圍之八月而不能服於是乎虐用之古者父母之仇不與共天下寢苫枕戈終身則有之為者盡於世子矣陳氏傳曰滅而以歸未有言執者言執弗臣之之辭也是故均之為滅國也嘗臣之矣書曰以沈子嘉歸殺之未嘗臣之也書曰執蔡世子有以歸用之十有二年春齊髙偃帥師納北燕伯于陽榖梁傳曰納者内不受也北燕伯何以不名不以髙偃名北燕伯也諸侯不相名而況於大夫其可以名諸侯乎三月壬申鄭伯嘉卒夏宋公使華定來聘公如晉至河乃復五月葬鄭簡公楚殺其大夫成熊秋七月冬十月公子憖出奔齊於是叔仲小南蒯公子憖謀出季氏而憖更其位憖告公而遂從公如晉取郠之役莒人愬于晉晉有平公之喪未之治也故辭公公子憖遂如晉既而南蒯懼不克以費叛如齊子仲還及郊遂奔齊以其罪有闗於一國之故故不日以異之例見閔二年如晉不書據二年公如晉至河乃復季孫宿如晉書不以謀季氏累吾君也楚子伐徐晉伐鮮虞伐鮮虞何以曰晉外之也晉盟主也楚滅陳晉不能救滅蔡欲救而不能棄中國諸侯於楚聽其吞滅莫甚於此時而甘心於羣狄尚得謂主夏盟乎陳氏傳曰晉主諸夏之盟春秋之外秦以晉故也外鄭亦以晉故也則其外晉何晉之君卿無中國之志也楚䖍弑君之賊也而執齊慶封放陳招殺蔡侯般假討賊之名以盟諸夏而晉連年有事於狄鮮虞呉入郢於越入吳晉猶圍鮮虞也詳於狄事而不詳於楚則晉無中國之志也於是外晉是故自成襄之春秋晉雖或競於楚略之不書也而敗狄於交剛于大鹵滅赤狄潞氏滅赤狄甲氏及留吁則詳志之十有三年春叔弓帥師圍費内邑言圍皆叛也費叛曷為不書據獲麟後有成叛家臣叛其大夫而非叛君也是時三家分魯尺地一民皆非魯君之有故家臣得假張公室之美以亢其大夫故圍鄆圍郈皆不言叛苟非叛其君則不足志也劉侍讀曰使周之王必無廢文武之法諸侯雖大國誰敢慢諸侯必無僭天子其大夫孰陵大夫必無脅其君其陪臣孰叛故南蒯雖以費叛入齊而春秋不書非釋蒯不治也事有本末法有原眚其不正相乗非一日之積季氏不得以叛名蒯正已而物正此之謂王者之術夏四月楚公子比自晉歸于楚弑其君䖍于乾谿公子比自晉歸于楚則何以言弑其君以比首惡也楚子䖍弑立而比出奔比與䖍未嘗一日相君臣也則以比首惡何也䖍兄也比弟也䖍君楚十有三年則比一亡公子爾於是比歸自立而䖍縊則比首惡矣比歸自立則其見殺猶曰公子何據篡立者見殺不稱公子比之歸非其意也棄疾脅比而立之又殺而代之則比不得為篡國矣故春秋加比以弑君而不罪比之篡國加以弑君則君臣之義正不罪比之篡國則棄疾之惡萬世不可掩矣弑君者日不日加弑也榖梁傳曰歸一事也弑一事也而遂言之以比之歸弑比不弑也公羊傳曰比之義宜乎效死不立楚公子棄疾殺公子比陳氏傳曰比蒙首惡之名則殺之宜稱人其曰楚公子棄疾殺公子比何靈王之弑棄疾為之也則是以公子殺公子爾非討賊也杜元凱曰不書弑君位未定也左氏傳曰棄疾即位名曰熊居秋公㑹劉子晉侯齊侯宋公衛侯鄭伯曹伯莒子邾子滕子薛伯把伯小邾子于平丘八月甲戌同盟于平丘左氏傳曰齊服也陳氏傳曰晉復合諸侯也晉之合諸侯由是止鄟陵之後參盟復作晉非盟主矣孫明復曰自宋之㑹大夫専盟㑹者十年申之㑹楚子専盟㑹者又十年晉昭公一旦與劉子合諸侯同盟于此乗楚靈弑逆之禍而已晉乗楚靈弑逆之禍與劉子合諸侯同盟果何所為哉故自是訖召陵諸侯復不出者二十四年而為鄟陵之盟矣胡侍講曰其曰同盟劉子與盟也公不與盟陳氏傳曰㑹于沙隨不見公則譏不在魯也於是邾子莒子愬魯于晉晉侯不見公書曰公不與盟譏魯之辭也向也黒壤公不與盟則諱不書盟今也不諱譏魯之辭也於溴梁於祝柯嘗為魯執邾莒矣而魯亟出師又納其叛人於是邾莒愬於晉晉為有辭於魯也而公遂不與盟晉之不自彊於主盟由重丘而後皆大夫爾以晉之不自彊於主盟而復合諸侯於是劉子臨之叔向謀之謀夏猶有屬焉而齊人不可鄭人爭承魯人不與盟晉之合諸侯由是止鄟陵之後參盟復作則魯誠與譏焉爾晉人執季孫意如以歸胡侍講曰稱人以執非伯討也季氏伐莒取鄆以自封殖而使其君民食於家不臣甚矣晉人若按邾莒所愬之狀究南蒯子仲奔叛之因告於諸侯以其罪執之請於天子以大義廢之則方伯之職修矣今乃辭魯君而執意如則是貨財而已非責其無君臣之義也安得為伯討乎公至自㑹蔡侯廬歸于蔡陳侯呉歸于陳廬者蔡靈侯之孫也呉者陳哀侯之孫也其曰蔡侯陳侯既即位後而來告也皆稱名繼絶也此自楚也其不言自楚何楚滅而後楚復之不為功也此皆滅國也其言歸何何休氏曰故使若有國自歸者也孫明復曰二國之命制在楚人以自歸為文所以抑彊楚而存中國也榖梁傳曰此未嘗有國也使如失國辭然者不與楚滅也冬十月葬蔡靈公趙伯循曰既復國以禮改葬魯往㑹也公如晉至河乃復吳滅州來十有四年春意如至自晉陳氏傳曰大夫不至必見執也而後致亦危之也三月曹伯滕卒夏四月秋葬曹武公八月莒子去疾卒冬莒殺其公子意恢殺意恢者蒲餘侯也曷為以國殺書譏不在相殺也莒子卒國人欲出郊公而立莒子之弟庚輿蒲餘侯殺公子意恢郊公奔齊則意恢者郊公之所與存亡者也故書其殺以明變也然則郊公出而庚輿入何以不書春秋公子爭國非有辨於疑似之際則不書也既郊公見出而庚輿以公弟立苟無嫌於亂適春秋奚議焉是故書鄭忽曹羈不書莒郊公書鄭突曹赤不書莒庚輿十有五年春王正月吳子夷末卒二月癸酉有事于武宫籥入叔弓卒去樂卒事左氏傳曰禘于武宫叔弓涖事籥入而卒去樂卒事禮也胡侍講曰衛有太史栁莊疾君曰若疾革雖當祭必告是知禮不告也有事於宗廟大臣涖事籥入而卒於其所去樂卒事可也夏蔡朝吳出奔鄭六月丁巳朔日有食之秋晉荀吳帥師伐鮮虞伐鮮虞嘗狄晉矣曷為復書荀吳一伐鮮虞也當楚人滅中國而晉不能救則狄之以示義當中國無楚患而晉大夫亟從事於戎狄則復其恒稱以見實春秋於晉楚之際無不盡其辭矣冬公如晉春秋集傳卷十二
