body:
  text: 春秋集傳卷十一元趙汸撰襄公下十有九年春王正月諸侯盟于祝柯凡晉主夏盟恒日此以既盟而即執邾子于㑹故不日以異之陳氏傳曰㑹無王卿士其亦申言諸侯何間有事也晉人執邾子不言以歸既服而釋之也劉侍讀曰已得其地故釋之執君取地皆不以王命何以正其罪而服人心乎公至自伐齊取邾田自漷水公羊傳曰自漷水以漷為竟也黄震氏曰晉救魯可也動天下之兵以執邾子而取邾田以歸魯不可也未足以服齊也季孫宿如晉拜師也葬曹成公夏衛孫林父帥師伐齊齊未服也秋七月辛卯齊侯環卒晉士匄帥師侵齊至榖聞齊侯卒乃還公羊傳曰還者善辭也何善爾大其不伐喪也此受命于君而伐齊則何大乎其不伐喪大夫以君命出進退在大夫也榖梁傳曰受命而誅生死無所加其怒不伐喪善之也八月丙辰仲孫蔑卒齊殺其大夫髙厚鄭殺其大夫公子嘉冬葬齊靈公城西郛叔孫豹㑹晉士匄于柯城武城二十年春王正月辛亥仲孫速㑹莒人盟于向夏六月庚申公㑹晉侯齊侯宋公衛侯鄭伯曹伯莒子邾子滕子薛伯把伯小邾子盟于澶淵秋公至自㑹仲孫速帥師伐邾蔡殺其大夫公子燮蔡公子履出奔楚陳侯之弟黄出奔楚奔非其罪不書於是蔡人患公子燮欲以蔡之晉殺之公子履其弟也故出之於楚陳人患公子黄之偪譖於楚曰與蔡司馬同謀亦出之於楚皆非其罪也則何以書惡陳蔡之不國也陳蔡之君有國不能自為政而惟大夫之為有臣不能馭而惟楚之令故國人皆得挾楚以制其君殺其公子之為大夫者出其弟之同母者而其君聽焉則二國之命懸於楚矣故曰家有既亡國有既滅滅而不自知由别之而不别也陳蔡之卒滅於楚則有自來矣叔老如齊冬十月丙辰朔日有食之季孫宿如宋二十有一年春王正月公如晉邾庶其以漆閭丘來奔公羊傳曰庶其者邾婁大夫也邾婁無大夫此何以書重地也榖梁傳曰來奔者不言出舉其接我者也漆閭丘不言及據昭五年莒牟夷以牟婁及防兹來奔小大敵也劉侍讀曰漆一邑閭丘一邑不言及所受於君而食之者也私邑不言及公邑言及杜元凱曰大夫以邑出為叛適魯言來奔内外之辭何休氏曰舉地言奔則魯坐受與庶其叛兩明矣吕大圭氏曰非公命不書此公在晉何以書政在大夫也政在大夫則公雖在内不得為政矣盖自宣成以來志之䇿書之變也黄震氏曰邾庶其莒牟夷邾黒肱所謂三叛人也襄公在晉而邾庶其以漆閭丘來昭公在晉而莒牟夷以牟婁防兹來昭公在乾侯而黒肱以濫來魯之受之皆非君命則為逋逃淵藪者季孫氏也夏公至自晉秋晉欒盈出奔楚九月庚戌朔日有食之冬十月庚辰朔日有食之許翰氏曰比年日食又比月而食盖自是八年之間而日七食為變大矣曹伯來朝公㑹晉侯齊侯宋公衛侯鄭伯曹伯莒子邾子于商任左氏傳曰錮欒盈也二十有二年春王正月公至自㑹夏四月秋七月辛酉叔老卒冬公㑹晉侯齊侯宋公衛侯鄭伯曹伯莒子邾子薛伯把伯小邾子于沙隨於是欒盈自楚適齊㑹于沙隨復錮欒氏也髙抑崇曰晉以一欒盈之故期年之間再合諸侯見晉失伯者之義不足以令諸侯矣齊侯於是終保欒盈明年伐衛遂伐晉也胡侍講曰古者大夫去國君不掃其社稷不收其田邑使人導之出疆又先之於其所往厚人倫也晉人不念欒氏世勲而逐盈又將搏執之而命諸侯無得納焉則亦過矣公至自㑹楚殺其大夫公子追舒二十有三年春王二月癸酉朔日有食之三月己巳把伯匄卒夏邾畀我來朝葬把孝公陳殺其大夫慶虎及慶寅陳侯之弟黄自楚歸于陳於是陳侯如楚公子黄愬二慶於楚楚人召之慶氏以陳叛楚屈建從陳侯圍陳而陳人殺慶虎慶寅則曷為以國殺書之以楚人不釋君而助臣故陳侯得致其討也二慶導陳侯以逃晉即楚者也於是以陳叛不書非叛其君也楚圍陳不書非為冦也曰陳殺其大夫慶虎及慶寅陳侯之弟黄自楚歸于陳則二慶見殺之由可見矣晉欒盈復入于晉入于曲沃先言復入後言入何齊侯潛納欒盈於曲沃欒盈率曲沃之甲以入晉敗而後奔曲沃也不言叛罪不止於叛也齊侯將伐盟主而欒盈因之以賊其國故各書其重也秋齊侯伐衛遂伐晉陳氏傳曰此其書遂何齊始伐盟主也自袁婁以來齊世從晉於是始叛則晉伯之衰而諸侯貳矣晉之衰諸夏之憂也八月叔孫豹帥師救晉次于雍榆先言救後言次次以成救也齊侯伐晉取朝歌為二隊入孟門登大行而晉人不出叔孫豹帥師從晉人次于雍榆與邯鄲勝擊齊之左獲晏㲠焉齊師退而後還則次以成救者晉命也據外傳子服恵伯云陳氏傳曰晉遂失伯也是故自救盟主他救皆不書據傳昭二十一年晉以諸侯之師救宋三十年楚沈尹戌救徐之類己卯仲孫速卒冬十月己亥臧孫紇出奔邾晉人殺欒盈左氏傳曰書曰晉人殺欒盈不言大夫言自外也公羊傳曰不言殺其大夫非其大夫也何休氏曰稱人從討賊辭齊侯襲莒杜元凱曰掩其不備曰襲二十有四年春叔孫豹如晉仲孫羯帥師侵齊晉故也夏楚子伐呉秋七月甲子朔日有食之既齊崔杼帥師伐莒大水八月癸巳朔日有食之公㑹晉侯宋公衛侯鄭伯曹伯莒子邾子滕子薛伯把伯小邾子于夷儀左氏傳曰㑹于夷儀將以伐齊水不克冬楚子蔡侯陳侯許男伐鄭伐鄭以救齊也諸侯還救鄭公至自㑹陳鍼宜咎出奔楚叔孫豹如京師魯不上聘京師再世矣於是榖洛鬭毁王宫齊人叛晉故為王城郟以示義于諸侯魯嘗有惡于齊而懼晉之不競也故使大夫如周聘且賀城將以假寵焉自是終春秋魯大夫無如京師者矣大饑何休氏曰有死傷曰大饑無死傷曰饑二十有五年春齊崔杼帥師伐我北鄙夏五月乙亥齊崔杼弑其君光弑君稱名氏者以賊赴也崔杼弑其君立景公而相之則孰為以崔杼弑君告諸侯者國猶有人也杼盟國人于太宫而不能要晏子以非義之盟殺大史三人而不能止其弟之又書與南史之繼往陳文子有馬十乗棄而違之猶為國有人也公㑹晉侯宋公衛侯鄭伯曹伯莒子邾子滕子薛伯把伯小邾子于夷儀此伐齊也不書伐齊齊人逆服也於是齊人以弑君說于晉晉人重於得齊而輕舍弑君之賊則功利之弊有自來矣六月壬子鄭公孫舍之帥師入陳其日何鄭有辭也鄭伯以陳怨故請伐陳於晉而陳侯㑹楚伐鄭當陳隧者井堙木刋於是鄭子展子産帥師入陳則異乎陵弱暴寡之師矣秋八月己巳諸侯同盟于重丘晉平公之盟不言同據湨梁祝柯雖澶淵服齊猶不言同也此齊成也則曰同盟何以齊之即楚也向也齊雖背晉猶未叛中國也莊公既伐晉而懼遂自通于楚且乞師焉而楚為伐鄭以救之使莊公不見弑則不待盟於宋而諸侯皆楚之從矣其曰同盟晉懼失諸侯也重言諸侯間有事也公至自㑹衛侯入于夷儀㑹于夷儀者剽也則衎入夷儀何以不名據鄭伯突入于櫟名晉逆之也衎之出也不名以大夫無出其君而伐之之道也既而晉人為戚之㑹以定衛自溴梁以來剽無㑹不在衛有二君者十年則固不可以無辨矣故復歸名之於是晉侯使魏舒宛没逆衛侯使衛與之夷儀則於衎何譏焉是故入夷儀不名名之則疑於鄭伯突陳氏傳曰衛侯入國矣而晉納之則異於他入者矣是故衛有二君俄而寗喜之弑械成則晉人為之也楚屈建帥師滅舒鳩楚大夫將稱大夫必嘗為中國患者也屈建未嘗寇中國則滅舒鳩何以稱名氏屈建為宋之盟使南北之從交相見其罪有甚於為冦者則不可以不詳其人也是故薳罷未嘗寇中國也以楚靈吞滅諸夏而罷為之相其罪有甚於為宼者則亦不可以不詳其人也故二子者雖有事蠻夷皆斥其名氏春秋之用法嚴矣冬鄭公孫夏帥師伐陳十有二月呉子遏伐楚門于巢卒榖梁傳曰諸侯不生名取卒之名加之伐楚之上者見以伐楚卒也呉子遏伐楚至巢入其門門人射呉子有矢創反舍而卒非呉子之自輕也陳氏傳曰自入州來至是而書伐楚略之也於是呉子親門于巢巢牛臣隠於短牆以射之則其但書門于巢何不以咎巢人也諸樊始通於上國爭長於楚而喪身於匹夫是自取之也二十有六年春王二月辛卯衛寗喜弑其君剽不與剽之立則其曰寗喜弑其君何寗氏立之諸侯定之衛人戴以為君者十有餘年非喜之所得貳矣左氏傳曰書曰寗喜弑其君剽言罪之在寗氏也劉侍讀曰出衛君而立剽者寗殖也則曷為於喜加稱弑焉嫌以喜之受命于殖而弑剽也夫據其位而享其禄臨禍不死聞難不圖偷得自全之計使篡弑因已而立後雖悔之不可及矣然則為寗喜者宜奈何宜乎效死勿聽爾陳氏傳曰國無二尊春秋之法也衎列於諸侯之㑹十有三而後出其入也將焉名之剽列於諸侯之㑹七而後弑其弑也又將焉名之削一而存一是有予奪矣故春秋不没其實而正不正不與存焉衛孫林父入于戚以叛陳氏傳曰書叛必不能討者也據二十九年季札過衛將宿於戚聞鍾聲焉春秋之季家有藏甲邑有百雉之城矣書叛始於此甲午衛侯衎復歸于衛昔者鄭厲公自櫟侵鄭傅瑕弑子儀而厲公歸皆不書據莊十四年傳文則剽之弑衎之歸何以書春秋之世篡立苟未列於諸侯之㑹魯人始終君突則子儀之弑鄭必不告史必不書子儀之弑既不見於經則突之歸罪不加於奪適不足詳矣衎見出於大臣而剽立列於諸侯之㑹數矣於是見弑而著于經則衎之復歸不可不詳矣榖梁傳曰日歸據莊六年衛侯朔僖二十八年衛侯鄭皆不書日見知弑也孫明復曰喜弑剽四日而衎復歸于衛言辛卯衛寗喜弑其君剽甲午衛侯衎復歸于衛以見衎待弑而歸也夏晉侯使荀呉來聘公㑹晉人鄭良霄宋人曹人于澶淵於是㑹于澶淵以討衛疆戚田取衛西鄙六十以益孫氏晉大夫為之也故趙武稱人宋向戌者武之所善也然則公無譏與季孫之専魯甚於孫氏當荀呉以君命來聘且召公而公無辭焉公進退在季孫矣是故内不諱公見公之為大夫役也胡侍講曰趙武不書諸侯助孫氏也鄭良霄稱名氏者鄭伯為衛侯故如晉知鄭獨不釋君而助臣也秋宋公殺其世子痤晉人執衛寗喜公羊傳曰此執有罪何以不為伯討不以其罪執也劉侍讀曰寗喜如晉晉人執之曰爾曷為納君而伐孫氏云爾非伯討也髙抑崇曰晉人執寗喜非討其弑君也討其伐戚而殺晉戍也王㳂氏曰執衛侯不書者為盟主諱也衛侯之君也林父出之其反也林父叛之晉侯召諸侯殺林父以戚歸衛則方伯之事也今為臣而執其君斯中國為義之士所恥聞也故不書家鉉翁氏曰是時晉趙武為政叔向為之謀主二子者亦何益於人之國乎八月壬午許男寗卒于楚左氏傳曰許靈公如楚請伐鄭也冬楚子蔡侯陳侯伐鄭葬許靈公二十有七年春齊侯使慶封來聘夏叔孫豹㑹晉趙武楚屈建蔡公孫歸生衛石惡陳孔奐鄭良霄許人曹人于宋陳氏傳曰晉楚初同主夏盟也晉楚嘗盟矣㑹于瑣澤之歳宋華元克合晉楚之成士燮㑹公子罷盟于宋西門之外不書猶曰特相盟也兩君之好而非天下之大變也以諸侯分為晉楚之從而交相見也於是始天下之大變也於溴梁而無君臣之分於宋而無内外之辨昭定哀之春秋將以終於呉越焉爾矣髙抑崇曰自是中國諸侯兩事晉楚齊桓晉文數十年之業一朝而壞之生民雖暫免於兵革而天下之勢遂大潰而不可收拾矣衛殺其大夫寗喜榖梁傳曰稱國以殺罪累上也寗喜弑君其以累上之辭言之何也嘗為大夫與之涉公事矣寗喜立君弑君而不以弑君之罪罪之者惡獻公也孫莘老曰喜弑剽而納衎衎反國而復用之既而以其私殺之則殺之不以其罪也故晉里克衛寗喜皆曰殺其大夫衛侯之弟鱄出奔晉公羊傳曰衛殺其大夫寗喜則衛侯之弟曷為出奔晉為殺寗喜出奔也衛寗殖與孫林父逐衛侯而立公孫剽寗殖病將死謂喜曰黜公者非吾意也孫氏為之我即死汝能固納公乎喜曰諾寗殖死喜立為大夫使人謂獻公曰黜公者非寗氏也孫氏為之吾欲納公何如獻公曰子苟納我吾請與子盟喜曰無所用盟請使公子鱄約之獻公謂公子鱄公子鱄辭獻公怒曰黜我者非寗氏與孫氏凡在爾公子鱄不得已而與之約已約歸至殺寗喜公子鱄挈其妻子而去之家鉉翁氏曰鱄自以失信於死者逃其兄而去之書曰衛侯之弟譏不友也公非鱄不得反國既反國而不能安鱄之身不友甚矣秋七月辛巳豹及諸侯之大夫盟于宋凡外相盟不月此其日何兩主之也陳氏傳曰自宋以來晉不専主盟矣虢之盟讀舊書加于牲上而已至鄟陵則齊主諸侯至臯鼬則魯及諸侯晉之不足以主夏盟自宋始宋之盟趙孟之偷也孔子曰庭燎之百由齊桓公始也大夫之奏肆夏由趙文子始也是王伯之所以興衰也豹云者蒙上文也僑如以夫人至自齊婼至自晉皆蒙上文也冬十有二月乙亥朔日有食之二十有八年春無冰夏衛石惡出奔晉左氏傳曰衛人討寗氏之黨故石惡出奔晉邾子來朝秋八月大雩仲孫羯如晉左氏傳曰告將為宋之盟故為楚也冬齊慶封來奔十有一月公如楚公如大國不月如楚月異其事也是故公至不月必至自楚而後月據昭公如楚至自楚書月著例何休氏曰如楚皆月者所以為公危也於是公及漢聞楚子卒公欲反魯人曰我楚國之為豈為一人行也公遂行宋人曰我一人之為非為楚也宋公遂反甚矣魯之不競於諸侯也於是鄭使游吉如楚及漢楚人還之而後鄭伯始行衛侯違三歳而後行而魯人獨汲汲於楚此所以來薳啓疆之召也十有二月甲寅天王崩不書葬魯不㑹也乙未楚子昭卒二十有九年春王三月公在楚何言于公在楚左氏傳曰釋不朝正于廟也吾君嘗以正月在齊在晉矣據莊公二十二年如齊二十三年春至自齊文公三年如晉四年春至自晉之類不書在楚何以書此所以為筆削也以不朝正而釋之者史氏之文雖在齊在晉而必書必在楚乃書者春秋之法譏公之失其所也陳岳氏曰公在外不朝正多矣不書者在中國也在楚則書之楚逺地薛氏曰在楚之書危其在中國之外也夏五月公至自楚庚午衛侯衎卒閽弑呉子餘祭榖梁傳曰閽門者也寺人也不稱名姓閽不得齊於人不稱其君閽不得君其君也禮君不使無恥不近刑人不狎敵不邇怨賤人非所貴也貴人非所刑也刑人非所近也舉至賤而加之吳子呉子近刑人也閽弑吳子餘祭仇之也程允夫曰謂之弑盖其君也不曰其君賤閽也盜殺蔡侯申書殺閽書弑何也以閽食庶人在官者之禄也仲孫羯㑹晉荀盈齊髙止宋華定衛世叔儀鄭公孫段曹人莒人滕人薛人小邾人城把陳氏傳曰㑹盟必有故也春秋書㑹盟而不言故屬辭比事而功過分矣於是書城把於澶淵書宋災衛寗喜弑其君孫林父以邑叛蔡世子般弑其父呉楚之大夫交聘於中國天下亦多故矣晉為盟主而區區於宋把是晉之已細也晉之已細而後有執齊慶封放陳招殺蔡侯般假討賊之義以盟諸夏如楚靈王者矣晉侯使士鞅來聘左氏傳曰拜城把也把子來盟來盟不月者大夫之事也據大夫來盟不月把介大國以治魯歸田而把伯親來涖盟於是魯人卑之以子男之禮接故雖國君不月譏把伯之自同於大夫與魯人之卑之也吳子使札來聘吳子餘祭也孫明復曰先書殺後書聘者呉子既弑而札始至魯也秋九月葬衛獻公齊髙止出奔北燕榖梁傳曰其曰北燕從史文也冬仲孫羯如晉三十年春王正月楚子使薳罷來聘來聘雖吳楚不月此何以月為其以聘報朝疑於中國伯者也伯主以聘報朝自晉悼公始於是公如楚楚人使公親襚與陳侯鄭伯許男送葬于西門之外改歳而薳子來非椒與呉札之比矣故特月以異之夏四月蔡世子般弑其君固世子弑君日此何以不日所由來者異也先王之法内外亂鳥獸行則滅之蔡侯淫而不父播其惡於諸侯故不日以異其事非弑君者法有輕重也以許世子止非故弑而書日則春秋之㫖明矣五月甲午宋災宋伯姬卒其日外災例時為伯姬之卒也榖梁傳曰取卒之日加之災上見以災卒也君子曰災莫大於君母之焚死其日罪宋之君臣不能救其君母而使之逮乎火也然則左氏傳曰伯姬待姆者非與此宋人所以自文也伯姬已老矣使其傅姆在且加老而可待之以下堂乎鄭國之火也子産使子上廵羣屏攝至于大宫使公孫登徙大龜祝史徙主祏於周廟告于先君使府人庫人各儆其事商成公儆司宫出舊宫人寘諸火所不及而況於其君母乎宋公無臣子矣於是懼其惡於諸侯也而為之辭以自文曰伯姬待姆而逮乎火也學者不能察以為伯姬病則曰女而不婦也以為賢伯姬則曰伯姬之婦道盡矣徒以空言為訓而不知其非實豈有合乎春秋天王殺其弟佞夫陳氏傳曰凡王殺不書本何休據傳莊王殺周公黒肩敬王殺召伯盈尹固類雖王子不書據恵王殺子類甚者母弟亦不書據襄王殺母弟帶必殺無罪而後書於是靈王崩景王立儋括欲立王子佞夫佞夫弗知也尹氏劉氏殺佞夫括奔晉左氏傳曰書曰天王殺其弟佞夫罪在王也孫明復曰天子得専殺故天王殺大夫不書此言殺其弟佞夫者譏景王尊為天子不能容一母弟也榖梁傳曰諸侯且不首惡況於天子乎君無忍親之義天子諸侯所親者唯長子母弟爾天王殺其弟佞夫甚之也王子瑕奔晉周公黒肩嘗欲立王子克矣桓十八年莊王殺周公黒肩而王子克奔燕不書罪不在王子也子瑕儋括之黨也佞夫殺而括與瑕奔晉則佚賊矣故書之佚賊則何以不月據莊十二年宋萬奔書月著例蒙上事月也春秋有蒙上事月者以著例決之奔不言出外也儋據不書賤也秋七月叔弓如宋葬宋共姬杜元凱曰卿共葬事禮過度也鄭良霄出奔許自許入于鄭駟良之爭聞於諸侯乆矣於是伯有為政使公孫黒如楚辭將强使之黒以駟氏之甲伐之則出非其罪也其書良霄出奔何為自許入鄭言故也自許入鄭則曷為不申言鄭良霄據宋華元出奔晉書宋華元自晉歸于宋蒙上文也出非其罪入罪也故間無異事得蒙上文以見之明其出入為一事書也是故書入而不言復入者惡入也不言復者位未絶也駟良兄弟也而爭於是良霄未絶于位而出出而以惡入甚矣鄭伯之失政也鄭人殺良霄稱人以殺討賊之辭也故不言其大夫良霄之出入皆為駟氏也則曷為以討賊之辭書之良霄出而駟氏得君鄭伯及其大夫盟于大宫盟國人於師之梁之外而良霄自墓門之瀆入介於襄庫以伐舊北門則鄭人固以賊討也冬十月葬蔡景公晉人齊人宋人衛人鄭人曹人莒人邾人滕人薛人把人小邾人㑹于澶淵宋災故大夫㑹從其恒稱矣此叔孫豹㑹晉趙武齊公孫蠆宋向戌衛北宫佗鄭罕虎也曷為復不序分災侯伯之事也晉為宋災故合諸侯之大夫疑於伯者之㑹故略之凡伯者之㑹不言故於是特言故則非伯者之辭也左氏傳曰為宋災故諸侯之大夫㑹以謀歸宋財既而無歸於宋故不書其人不書魯大夫諱之也陳氏傳曰凡諸侯不序吾君在焉而書吾君大夫不序吾大夫在焉而書吾大夫與有議也據文七年公㑹諸侯晉大夫盟于扈九年公子遂㑹晉人宋人衛人許人救鄭譏不在魯矣則不書吾君吾大夫劉侍讀曰蔡人弑其君而不謀宋災而謀之微矣夫災雖諸侯之所當救然而一時之變一國之禍也非天下之憂彼天下之憂者臣弑其君子弑其父如是則夷狄矣雖有粟吾得而食諸三十有一年春王正月夏六月辛巳公薨于楚宫楚宫者别宫也公朝楚好其宫歸而作之薛士龍曰小寢猶非正也况别宫乎秋九月癸巳子野卒子名者襄公未葬也不薨不地且不書葬未成君也己亥仲孫羯卒冬十月滕子來㑹葬諸侯相㑹葬非禮也左氏傳曰諸侯之喪士弔大夫送葬陳氏傳曰諸侯來㑹葬於是始晉景公之喪成公弔焉亦已卑矣晉於是止公使送葬諸侯莫在魯人辱之雖伯主未有君㑹葬者也葬楚康王也公及陳侯鄭伯許男送於西門之外則天下諸侯有㑹葬於楚者矣於是滕子㑹葬於魯是春秋之季也㑹葬猶可奔喪甚矣癸酉葬我君襄公十有一月莒人弑其君密州稱人以殺君曰苟非微者則不曰據宋人弑其君杵臼此稱人其不日何莒子生去疾及展輿既立展輿又廢之莒子虐展輿因國人以弑之立而以微者告也春秋集傳卷十一
