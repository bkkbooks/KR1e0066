body:
  text: 春秋集傳卷十元趙汸撰襄公上元年春王正月公即位仲孫蔑㑹晉欒黶宋華元衛寗殖曹人莒人邾人滕人薛人圍宋彭城圍有宋人曷為言宋彭城據衛石曼姑圍戚不言衛嫌非宋地也於是晉悼公合諸侯為宋討魚石不與楚之取彭城以置叛人故繫彭城於宋見諸侯之為宋討也諸侯分地有制非惟楚不當取雖晉亦不可受彭城降晉而歸之宋宜也事見襄二十六年傳夏晉韓厥帥師伐鄭仲孫蔑㑹齊崔杼曹人邾人把人次于鄫曰㑹以次何以備楚也鄫鄭地秋楚公子壬夫帥師侵宋救鄭也九月辛酉天王崩邾子來朝冬衛侯使公孫剽來聘晉侯使荀罃來聘二年春王正月葬簡王鄭師伐宋楚令也夏五月庚寅夫人姜氏薨六月庚辰鄭伯睔卒晉師宋師衛寗殖侵鄭秋七月仲孫蔑㑹晉荀罃宋華元衛孫林父曹人邾人于戚己丑葬我小君齊姜叔孫豹如宋冬仲孫蔑㑹晉荀罃齊崔杼宋華元衛孫林父曹人邾人滕人薛人小邾人于戚遂城虎牢虎牢鄭邑也其不繫之鄭何以伯令城之也鄭棄於夷久矣於是悼公有討於鄭以諸侯城其巖邑將以絀鄭焉耳孫明復曰鄭叛中國與楚比晉荀罃再㑹於戚城虎牢以逼之故虎牢不繫鄭使若中國自城邑然劉賔之曰不言伐取且不繫之鄭皆予晉也楚殺其大夫公子申三年春楚公子嬰齊伐呉陳氏傳曰於是楚代呉呉人伐楚取駕則其但書伐呉何春秋於晉楚之際嚴矣於呉楚未嘗無差等也是故楚伐呉悉書之呉伐楚必若遏門于巢卒而後書公如晉髙抑崇曰禮童子侯不朝不可以成人之禮接也其可以朝伯國乎夏四月壬戌公及晉侯盟于長樗蘇子由曰晉侯修禮於諸侯故去其國都而與公盟也公至自晉六月公㑹單子晉侯宋公衛侯鄭伯莒子邾婁子齊世子光己未同盟于雞澤陳侯使袁僑如㑹公羊傳曰其言如㑹何後㑹也杜元凱曰陳疾楚政而來本非召㑹故言如㑹也戊寅叔孫豹及諸侯之大夫及陳袁僑盟公羊傳曰曷為殊及陳袁僑為其與袁僑盟也杜元凱曰諸侯既盟袁僑乃至故使大夫别與之盟殊袁僑者明諸侯之大夫所以盟盟袁僑也陳氏傳曰以大夫盟袁僑晉侯不欲以袁僑絀諸侯也雖然有諸侯在而大夫盟於是始晉悼公為之也諸侯在焉而大夫自為盟而後大夫専盟矣大夫専盟自宋始榖梁傳曰諸侯盟又大夫相與私盟是大夫張也故雞澤之㑹諸侯始失正矣孫明復曰諸侯既盟而陳袁僑至無盟可也據踐土陳穆公如㑹文公不再盟己未諸侯盟戊寅大夫又盟是大夫强也秋公至自㑹冬晉荀罃帥師伐許四年春王三月己酉陳侯午卒夏叔孫豹如晉秋七月戊子夫人姒氏薨葬陳成公八月辛亥葬我小君定姒冬公如晉陳人圍頓五年春公至自晉夏鄭伯使公子發來聘叔孫豹鄫世子巫如晉杜元凱曰俱受命於魯故不書及左氏傳曰覿鄫大子于晉以成屬鄫書曰叔孫豹鄫大子巫如晉言比諸魯大夫也陸淳氏曰鄫列國也使其世子同於我大夫魯與晉俱失正矣仲孫蔑衛孫林父㑹呉于善道杜元凱曰魯衛俱受命子晉故不言及左氏傳曰吳子使壽越如晉辭不㑹於雞澤之故且請聽諸侯之好晉人將為之㑹諸侯使魯衛先㑹吳且告㑹期秋大雩楚殺其大夫公子壬夫楚八年而殺三卿也左氏傳曰君子謂楚共王於是不刑莊王卒以大夫盟諸侯納宋魚石殺公子側公子申公子壬夫楚遂不競而晉復伯是故晉悼公之春秋楚有諸侯之事亦不悉書據傳襄三年公子何忌侵陳不書四年彭名侵陳不書公㑹晉侯宋公陳侯衛侯鄭伯曹伯莒子邾子滕子薛伯齊世子光呉人鄫人于戚呉何以稱人其大夫也以諸侯大夫之禮接故得序於齊世子之下稱人而不殊也鄫人者鄫大夫也魯以屬鄫為不利故使鄫大夫聽命於㑹陳氏傳曰於是盟于戚呉初與諸侯盟也不書盟為晉諱也吳晉之盟春秋終諱之見襄十三年蒲之役將始㑹呉呉不至事在成九年雞澤之役又逆呉子呉不至呉固不敢自列於諸夏也而晉求之急於是滅州來敗頓胡沈蔡陳許之師滅巢入郢矣髙抑崇曰晉之亟於進呉以其能病楚也呉能病楚則亦能病中國矣既伐楚則伐齊伐魯伐衛伐陳以至與晉爭盟則其病中國也甚矣公至自㑹冬戍陳晉命也不言其人微者也榖梁傳曰内辭也公羊傳曰孰戍之諸侯戍之曷為不言諸侯戍之離至不可得而序故言我也陳氏傳曰戍不書桓六年戍齊宣六年戍鄭之類晉悼公之戍陳也特書之君子以悼公之伯業桓文之所不屑為也桓公不戰而屈楚文公戰而屈楚自悼公而通呉以制楚矣㑹于戚于向于柤皆東境也而又戍陳鄭以守之楚誠強而晉亦誠下䇿也楚公子貞帥師伐陳公㑹晉侯宋公衛侯鄭伯曹伯齊世子光救陳十有二月為下卒月也公至自救陳榖梁傳曰善救陳也范寗氏曰善之故以救陳致辛未季孫行父卒六年春王三月壬午杞伯姑容卒左氏傳曰始赴以名同盟故也夏宋華弱來奔秋葬把桓公滕子來朝莒人滅鄫滅國有取而有之者則不言滅例在僖二十二我嘗取鄫矣事見昭四年則其言滅何譏晉也鄫人與莒子同列於㑹而莒卒滅鄫以為悼公病矣冬叔孫豹如邾季孫宿如晉十有二月齊人滅萊公羊傳曰不言萊君出奔國滅君死之正也七年春郯子來朝夏四月三卜郊不從乃免牲榖梁傳曰三卜禮也夏四月不時也孟獻子曰吾乃今而知有卜筮夫郊祀后稷以祈農事也是故啟蟄而郊郊而後耕今既耕而卜郊宜其不從也小邾子來朝城費秋季孫宿如衛八月螽冬十月衛侯使孫林父來聘壬戌及孫林父盟楚公子貞帥師圍陳十有二月公㑹晉侯宋公陳侯衛侯曹伯莒子邾子于鄬救陳也不言救陳者陳侯逃歸不成救也不致無成事也是故盟主之㑹恒不月於是無成事特月以别之鄭伯髠頑如㑹未見諸侯丙戌卒于鄵鄭伯髠頑弑也則其書卒何史承赴而書辟不敏也史承赴而書春秋曷為不正之正之則無以見國之無臣子也春秋於鄭髠頑齊陽生楚子麇實弑書卒者皆從而志之無改焉是併其臣子之不能討賊而姑為隱諱者治之也榖梁傳曰未見諸侯其曰如㑹何也致其志也禮諸侯不生名此其名之何也卒之名也卒之名則何為加之如㑹之上見以如㑹卒也其見以如㑹卒何也鄭伯將㑹中國其臣欲從楚不勝其臣弑而死其地於外也陳氏傳曰此公子騑弑其君也則其書卒何以君薨赴也君弑矣晏然赴於他國但如恒喪自鄭騑始甚矣無人紀也而鄭之臣子聽焉自有討賊至於不討自不討矣至於赴告如恒喪春秋之所甚懼也是故書卒所以誅鄭之臣子聽賊之所為也崔杼弑其君齊大史書之杼殺之其弟嗣書之又殺之南史執簡以徃陳恒弑其君孔子沐浴而朝告於哀公曰請討之弑君天下之大變也名在諸侯之䇿誰能没之史見其事春秋著其心後世有考焉矣陳侯逃歸陳大夫貳於楚而脅其君使逃諸侯以歸也八年春王正月公如晉夏葬鄭僖公鄭人侵蔡獲蔡公子燮此鄭公子發也何以稱人惡其將叛中國而侵蔡以欺盟主也王㳂氏曰鄭人弑其君志欲從楚故侵蔡以致楚楚師至然後告絶於晉而與楚平也公羊傳曰侵而言獲者適得之也季孫宿㑹晉侯鄭伯齊人宋人衛人邾人于邢丘左氏傳曰㑹于邢丘以命朝聘之數使諸侯之大夫聽命鄭伯獻捷于㑹故親聽命大夫不書尊晉侯也陳氏傳曰此齊髙厚宋向戍衛寗殖也其稱人何不以大夫敵盟主也不以大夫敵盟主桓文之盛也自同盟于戚而大夫與諸侯序矣於是再見其再見何復予晉以伯也公至自晉莒人伐我東鄙秋九月大雩冬楚公子貞帥師伐鄭晉侯使士匄來聘左氏傳曰拜公之辱九年春宋災夏季孫宿如晉五月辛酉夫人姜氏薨秋八月癸未葬我小君穆姜冬公㑹晉侯宋公衛侯曹伯莒子邾子滕子薛伯把伯小邾子齊世子光伐鄭十有二月己亥同盟于戲伐鄭而書同盟鄭與盟也其不致何盟後復伐鄭則伐與盟皆非功也楚子伐鄭十年春公㑹晉侯宋公衛侯曹伯莒子邾子滕子薛伯把伯小邾子齊世子光㑹呉于柤左氏傳曰㑹呉子壽夢也夏五月甲午遂滅偪陽其日以譏晉也晉悼公合十有二國為衣裳之㑹以㑹呉而滅小國異其事故日以譏之以偪陽子歸不書略之也以其㑹而遂滅則以歸不足言也公至自㑹楚公子貞鄭公孫輒帥師伐宋晉師伐秦此荀罃也曷為書師以其釋楚而敵秦怨也楚方得鄭而伐宋晉人不圖其所以絀楚者而急於伐秦曰以報其侵也則非伯者之事矣秋莒人伐我東鄙公㑹晉侯宋公衛侯曹伯莒子邾子齊世子光滕子薛伯把伯小邾子伐鄭齊世子光始與盟㑹序于邾子之下諸侯世子未誓於天子之制也於是又以先至躋之滕薛把三君之上明年乃次之曹伯莒子之間則誓於天子而攝其君之制也此禮樂之自諸侯出者也若夫滕薛把三君之後於邾莒則宜悼公不能正也陳氏傳曰隠桓之諸侯皆序爵也伯者作而後小國或序大國之上有以子男長於伯者矣於是以世子長於小國之君則悼公為之也冬盜殺鄭公子騑公子發公子輒盜殺不言其大夫盜賤者不可以上下道也公羊傳曰大夫相殺稱人賤者窮諸盜孫明復曰盜一日而殺三卿故列數之惡鄭伯之失政也戍鄭虎牢公羊傳曰諸侯已取曷為繫之鄭諸侯莫之主有故反繫之鄭左氏傳曰言將歸焉杜元凱曰鄭服則以還鄭故追書繫之以見晉志楚公子貞帥師救鄭陳氏傳曰楚救鄭矣不書傳宣元年蔿賈二年鬭椒成九年子重十六年楚子十七年子重公子申之類於是始書以為晉悼復伯楚欲救而不能也公至自伐鄭十有一年春王正月作三軍作三軍何作中軍也以其言舎中軍昭五年知此為作中軍也作中軍則何以言作三軍始改作也魯人外弊於征伐内擅於三家軍賦之出於三郊三遂者非其舊矣車乗卒伍之成於甸者非周制矣則曷為言改作於是始三家始分魯也前乎此三家之擅魯者専其政爾未嘗有其民也於是乃三分其民家為一軍而盡征之而叔孟之僅不取者以歸公則魯之民皆三家之民矣魯君之所存者亦朝與祭而已此非公命也其書之若公命何政在三家也夏四月四卜郊不從乃不郊鄭公孫舍之帥師侵宋晉人欲服鄭而諸侯皆憚戰於是為分兵敝楚之䇿鄭人欲從晉而畏楚以為必得諸侯盡力於我楚弗敢敵而後可固與也故侵宋以致諸侯之師二國之謀若出於一此晉之所以得鄭也盖晉之師武臣力非復文襄之舊矣公㑹晉侯宋公衛侯曹伯齊世子光莒子邾子滕子薛伯把伯小邾子伐鄭秋七月己未同盟于亳城北公至自伐鄭楚子鄭伯伐宋公㑹晉侯宋公衛侯曹伯齊世子光莒子邾子滕子薛伯把伯小邾子伐鄭㑹于蕭魚公羊傳曰此伐鄭也其言㑹于蕭魚何盖鄭與㑹爾孫明復曰言伐言㑹者得鄭之辭也晉楚爭鄭久矣悼公比歳大合諸侯以伐鄭今始得之雖不能逺斥強楚以紹二伯之烈然亦能有鄭者二十年此悼公之績也陳氏傳曰有地㑹而後伐者矣據㑹于襄伐鄭㑹于召陵侵楚未有伐而後地㑹者也地㑹而後伐未集事之辭也伐而後地㑹集事之辭也伐鄭㑹于蕭魚序績也公至自㑹榖梁傳曰伐而後㑹不以伐鄭致得鄭之辭也楚人執鄭行人良霄冬秦人伐晉以救鄭也於是戰于櫟晉師敗績不書不足書也秦人自絶于中國而為楚救鄭雖戰勝晉師而不足以病晉故略之也十有二年春王二月莒人伐我東鄙圍台外伐我不書圍也據成二年齊伐北鄙圍龍書圍台以病晉也莒人滅鄫晉不問伐我東鄙者再不能討於是圍台也季孫宿帥師救台遂入鄆夏晉侯使士魴來聘秋九月吳子乗卒呉來告喪而徃弔也楚卒日呉何以不日呉始通於上國弔贈之徃來者若楚也冬楚公子貞帥師侵宋公如晉十有三年春公至自晉夏取邿秋九月庚辰楚子審卒冬城防十有四年春王正月季孫宿叔老㑹晉士匄齊人宋人衛人鄭公孫蠆曹人莒人邾人滕人薛人把人小邾人㑹呉于向㑹吳子諸樊也左氏傳曰㑹于向為吳謀楚故也其言二大夫㑹之何並列於㑹也禮卿使則大夫介大夫使則士介同倫不相介同倫相介是為恭也則曷為並列於㑹晉人嘉之也諸侯之大夫惰矣進吾二卿以勵之見悼公之令不行於諸侯也盖蕭魚而後悼徳衰矣抑中國之不競諸侯亦有罪焉故晉鄭大夫書名氏而齊崔杼宋華閱衛北宫括但人之一役之中而有予奪於是始譏不徒在晉也春秋之辨名實所以正伯者之事也苟非伯者之事春秋奚治焉是故自伐秦而後凡大夫將皆從其恒稱澶淵而後大夫之㑹皆從其恒稱苟晉之君卿無志於中國則其名實不足辨矣二月乙未朔日有食之夏四月叔孫豹㑹晉荀偃齊人宋人衛北宫括鄭公孫蠆曹人莒人邾人滕人薛人把人小邾人伐秦左氏傳曰於是齊崔杼宋華閲仲江㑹伐秦不書惰也向之㑹亦如之衛北宫括不書於向書於伐秦攝也陳氏傳曰諸侯之大夫從晉侯伐秦而悼不自將諸侯之師及涇不濟荀偃欒黶二師爭而大還晉人謂之遷延之役則君令不行於大夫矣已未衛侯出奔齊諸侯出奔不日此何以日異其事也春秋諸侯奔走失國者盖有之矣而未有以臣出君如衛孫林父寗殖者衛獻公不禮於孫林父寗殖孫子曰君忌我矣弗先必死公使子矯子伯子皮與孫子盟孫子皆殺之公如鄄使子行於孫子孫子又殺之公出奔齊孫氏追之敗公徒于阿澤故雖鄭祭仲殺雍糾而厲公出燕大夫比以殺公之外嬖而簡公出不日必若孫林父寗殖出其君而後日日之者異之也劉侍讀曰奔而名者兩君之辭也剽已立矣而衎不名何也剽以公孫為貴卿交於諸侯矣逐其君而自取之惡有甚焉故絶其兩君之稱以見所惡也叔武攝位而鄭不名剽篡國而衎不名其不名也同而所以不名也異叔武讓而剽篡也莒人侵我東鄙秋楚公子貞帥師伐呉冬季孫宿㑹晉士匄宋華閱衛孫林父鄭公孫蠆莒人邾人于戚左氏傳曰謀定衛也於是衛人立公孫剽孫林父寗殖相之以聽命於諸侯晉侯問衛故於荀偃對曰衛有君矣不如因而定之晉盟主也不能詢諸國人求衛侯去國之故一大正其君臣乃因之以定衛焉此晉大夫私於孫氏之過而悼公不能察也盖晉人釋君助臣於是始悼公為之也是故大夫皆從其恒稱譏不在大夫也十有五年春宋公使向戌來聘二月己亥及向戌盟于劉此來聘而涖盟也吾君及大夫盟春秋終諱之則曷為及向戌盟于劉向戌伉也去其國以盟諸侯是伯主所以為吾君禮也據公及晉侯盟于長樗以伯主為吾君禮者盟外大夫則向戌伉也三家専襄公弱大夫自相結以卑其君而魯道衰矣劉夏逆王后于齊劉夏者天子之士也左氏傳曰官師從單靖公逆王后于齊卿不行非禮也逆后非我主之不書榖梁傳曰過我故志之也杜元凱曰單靖公不書劉夏獨過魯告昬也胡侍講曰昬姻人倫之本王后天下之母卿徃逆而公監之禮也官師從單靖公逆后也士而逆后也是不重人倫之本矣夏齊侯伐我北鄙圍成書圍成以病晉也左氏傳曰齊侯圍成貳於晉故也公救成至遇言至遇何不成救也季孫宿叔孫豹帥師城成郛公至遇而齊侯還故二子以師進而城之秋八月丁巳日有食之邾人伐我南鄙冬十有一月癸亥晉侯周卒十有六年春王正月葬晉悼公三月公㑹晉侯宋公衛侯鄭伯曹伯莒子邾子薛伯把伯小邾子于溴梁戊寅大夫盟此諸侯㑹而使大夫盟則曷為不言諸侯之大夫據三年雞澤閒無異事也榖梁傳曰溴梁之㑹諸侯失正也諸侯㑹而大夫盟政在大夫也公羊傳曰諸侯皆在是其曰大夫盟何信在大夫也何言乎信在大夫遍刺天下之大夫也曷為遍刺天下之大夫君若贅旒然晉人執莒子邾子以歸為我故也齊侯伐我北鄙夏公至自㑹五月甲子地震叔老㑹鄭伯晉荀偃衛寗殖宋人伐許不能服齊而伐許非務也宋稱人而後於衛大夫將卑師少也秋齊侯伐我北鄙圍郕大雩冬叔孫豹如晉十有七年春王二月庚午邾子牼卒宋人伐陳夏衛石買帥師伐曹秋齊侯伐我北鄙圍桃髙厚帥師伐我北鄙圍防不曰齊髙厚甚之也見齊侯一舉而分兵圍吾之二邑故繫之於齊侯也九月大雩宋華臣出奔陳冬邾人伐我南鄙左氏傳曰為齊故也十有八年春白狄來白狄來者何始來朝魯也何以不言朝不能朝也劉侍讀曰周制于蕃服無事焉其於天子世一見則諸侯雖善其交際不得而通所以懲淫慝一内外也周公致太平越裳氏重九譯而獻其白雉公曰君子徳不及焉不享其贄此乃天子而讓也況列國之君守藩之臣乎夏晉人執衛行人石買左氏傳曰為曹故也秋齊師伐我北鄙此齊侯也曷為稱師齊侯伐我春秋悉從其恒稱其惡著矣於是略言之以同圍齊見義而已冬十月公㑹晉侯宋公衛侯鄭伯曹伯莒子邾子滕子薛伯把伯小邾子同圍齊圍未有言同者其言同圍齊何晉弗伯也猶曰諸侯同圍之焉耳陳氏傳曰自圍齊之後晉師無君將雖大夫之師出無與於諸夏之義矣曹伯負芻卒于師楚公子午帥師伐鄭春秋集傳卷十
